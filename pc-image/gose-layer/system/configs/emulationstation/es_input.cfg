<?xml version="1.0"?>
<inputList>
	<!-- GOSE passthrough pads: uinput devices created by the host-side controller
	     passthrough (pad_passthrough.py / input.pt_open) carry the REAL pad's
	     vid/pid, so their SDL GUID differs from any stock Batocera entry and
	     configgen would refuse to launch ("Could not find controller data...",
	     exit 250 — hit on the first real game-launch attempt, 2026-06-07).
	     Their evdev capabilities are byte-identical to the standard virtual pad
	     layout, so the binds mirror the Microsoft Xbox 360 pad entry.

	     Entries are AUTO-ADDED at pt_open by the agent
	     (agent/gose_agent/capabilities/input.py: ensure_es_input_entry) — any
	     pad brand registers itself on first attach. This seed ships the
	     known-good first entry (the dev DualSense) so fresh images launch with
	     it even before the agent has seen the pad, and documents the entry
	     shape the auto-registration generates. -->
	<inputConfig type="joystick" deviceName="DualSense Wireless Controller" deviceGUID="030000004c050000e60c000000010000">
		<input name="a" type="button" id="1" value="1" code="305" />
		<input name="b" type="button" id="0" value="1" code="304" />
		<input name="down" type="hat" id="0" value="4" code="16" />
		<input name="hotkey" type="button" id="8" value="1" code="316" />
		<input name="joystick1left" type="axis" id="0" value="-1" code="0" />
		<input name="joystick1up" type="axis" id="1" value="-1" code="1" />
		<input name="joystick2left" type="axis" id="3" value="-1" code="3" />
		<input name="joystick2up" type="axis" id="4" value="-1" code="4" />
		<input name="l2" type="axis" id="2" value="1" code="2" />
		<input name="l3" type="button" id="9" value="1" code="317" />
		<input name="left" type="hat" id="0" value="8" code="16" />
		<input name="pagedown" type="button" id="5" value="1" code="311" />
		<input name="pageup" type="button" id="4" value="1" code="310" />
		<input name="r2" type="axis" id="5" value="1" code="5" />
		<input name="r3" type="button" id="10" value="1" code="318" />
		<input name="right" type="hat" id="0" value="2" code="16" />
		<input name="select" type="button" id="6" value="1" code="314" />
		<input name="start" type="button" id="7" value="1" code="315" />
		<input name="up" type="hat" id="0" value="1" code="16" />
		<input name="x" type="button" id="3" value="1" code="308" />
		<input name="y" type="button" id="2" value="1" code="307" />
	</inputConfig>
</inputList>
