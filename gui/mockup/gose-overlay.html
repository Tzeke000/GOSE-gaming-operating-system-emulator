<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE Overlay</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#07070f}
  body{font-family:Inter,system-ui,sans-serif;color:#eef1f8}
  /* frozen screen, lightly blurred + dimmed = the game shows through (Game Bar style) */
  .bg{position:fixed;inset:-30px;background-size:cover;background-position:center;
    filter:blur(7px) brightness(.78) saturate(1.1);transform:scale(1.04);z-index:0}
  .scrim{position:fixed;inset:0;z-index:1;background:rgba(6,8,16,.34)}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .stage{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;
    gap:16px;padding:30px 24px;overflow:auto;transform:translateY(10px);transition:transform .2s ease;will-change:transform}
  /* clean reveal: window opens on solid #07070f (matches GTK bg) → no white flash / half-paint;
     the whole bar + frozen-frame backdrop fade in together once ready, instead of popping in piecemeal */
  body{opacity:0;transition:opacity .18s ease}
  body.ready{opacity:1}
  body.ready .stage{transform:none}
  html[data-motion="reduce"] body,html[data-motion="reduce"] .stage{transition:none!important}
  /* glass material used by the toolbar + cards */
  .glass{background:rgba(22,24,33,.74);backdrop-filter:blur(26px) saturate(1.25);
    -webkit-backdrop-filter:blur(26px) saturate(1.25);border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
  /* top toolbar pill */
  .bar{display:flex;align-items:center;gap:14px;border-radius:16px;padding:10px 18px}
  .bar img{width:26px;height:26px}
  .bar .ttl{font-weight:700;font-size:15px}
  .bar .sep{width:1px;height:22px;background:rgba(255,255,255,.14)}
  .bar .meta{font-size:12.5px;color:#aeb6d4;line-height:1.3}
  .bar .meta b{color:#eef1f8;font-weight:700}
  /* widget cards row */
  .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:1040px}
  .card{width:330px;border-radius:18px;padding:16px 18px}
  .card h3{margin:0 0 12px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#aeb6d4;
    display:flex;align-items:center;gap:8px}
  .card h3 .ic{font-size:15px;color:var(--accent)}
  /* perf widget */
  .stat{display:flex;align-items:center;gap:10px;margin:9px 0}
  .stat .k{width:54px;font-size:12px;color:#aeb6d4}
  .stat .track{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.12);overflow:hidden}
  .stat .track>i{display:block;height:100%;background:linear-gradient(90deg,#5cd0ff,#6a4dff)}
  .stat .v{width:78px;text-align:right;font-size:12.5px;font-weight:700}
  /* control rows */
  .row{border:2px solid transparent;border-radius:12px;padding:10px 12px;margin:7px 0;background:rgba(255,255,255,.05)}
  .row.focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%,transparent);background:rgba(92,208,255,.14)}
  .row.danger.focus{border-color:#ff8e8e;box-shadow:0 0 0 3px #ff8e8e33}
  .lab{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600}
  .lab .ic{font-size:16px;color:var(--accent)}.lab .v{margin-left:auto;color:#aeb6d4;font-weight:700}
  .bar2{height:7px;border-radius:4px;background:rgba(255,255,255,.14);margin-top:9px;overflow:hidden}
  .bar2>i{display:block;height:100%;background:var(--accent)}
  .seg{display:flex;gap:6px;margin-top:9px}
  .seg>span{flex:1;text-align:center;font-size:11px;font-weight:700;padding:6px 0;border-radius:8px;background:rgba(255,255,255,.10);color:#aeb6d4}
  .seg>span.sel{background:var(--accent);color:#06121a}
  .hint{z-index:2;position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#aeb6d4;font-size:12px}
  .hint b{color:#eef1f8}
  .toast{z-index:3;position:fixed;bottom:46px;left:50%;transform:translateX(-50%);background:rgba(22,24,33,.94);
    border:1px solid var(--accent);border-radius:11px;padding:9px 16px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style></head>
<body>
  <div class="bg" id="bg"></div>
  <div class="scrim"></div>
  <div class="stage">
    <div class="bar glass"><img src="assets/brand/gose-core-mark.png" alt="GOSE">
      <span class="ttl">Game Bar</span><span class="sep"></span>
      <div class="meta" id="meta">—</div></div>
    <div class="cards">
      <div class="card glass" id="savescard" style="display:none"><h3><span class="ic" data-i="hard-drive"></span>Save States</h3><div id="saves"></div></div>
      <div class="card glass" id="gfxcard" style="display:none"><h3><span class="ic" data-i="film"></span><span id="gfxtitle">Video &amp; Cheats</span></h3><div id="gfx"></div></div>
      <div class="card glass"><h3><span class="ic" data-i="cpu"></span>Performance</h3><div id="perf"></div></div>
      <div class="card glass"><h3><span class="ic" data-i="volume-2"></span>Audio &amp; Display</h3><div id="av"></div></div>
      <div class="card glass"><h3><span class="ic" data-i="image"></span>Capture</h3><div id="cap"></div></div>
      <div class="card glass"><h3><span class="ic" data-i="settings"></span>System</h3><div id="sys"></div></div>
    </div>
  </div>
  <div class="hint"><b>↑↓</b> move · <b>←→</b> adjust · <b>A</b> select · <b>5</b>/<b>B</b> to resume</div>
  <div class="toast" id="toast"></div>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const $=id=>document.getElementById(id);
  var bgn=(location.search.match(/bg=(\d+)/)||[])[1]||"0";
  var IN_GAME=/[?&]game=1/.test(location.search);   // a game is paused behind us → show save/load state
  $("bg").style.backgroundImage="url(_gbg.jpg?"+bgn+")";
  function api(p,b){return fetch(p,b?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}:{cache:"no-store"}).then(r=>r.json()).catch(()=>({ok:false}));}
  function ico(n){return '<span class="ic" style="-webkit-mask:url(assets/icons/'+n+'.svg) center/contain no-repeat;mask:url(assets/icons/'+n+'.svg) center/contain no-repeat;background:currentColor;display:inline-block"></span>';}
  let S={vol:50,mute:false,bri:null,briHas:true,perf:"balanced",batt:null,charging:false,net:"—",
         cpu:null,gpu:null,ram:null,temp:null,cputemp:null,gpuName:null,powerMode:false,buffer:false,slots:[],
         hud:"off",hudHas:false,quiet:false,hasWifi:false,
         shaderset:"none",shaderList:[],bezel:false,cheats:[],cheatNote:"",cheatsExpanded:false};
  let foc=0, items=[];
  function say(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(say._t);say._t=setTimeout(function(){t.classList.remove("show");},1800);}
  function build(){
    items=[{k:"vol",type:"slider"},{k:"bri",type:"slider"},{k:"perf",type:"seg"}];
    if(S.hudHas)items.push({k:"hud",type:"hudseg"});   // #62 perf/battery HUD (off/FPS/full)
    if(IN_GAME){   // #70 per-game shader + bezel, #72 cheats (inline-expanding under the Cheats row)
      items.push({k:"shader",type:"shadercyc",card:"gfx"});
      items.push({k:"bezel",type:"toggle",card:"gfx"});
      items.push({k:"cheats",type:"act",ic:"sparkles",lab:"Cheats",cheatsopen:true,card:"gfx"});
      if(S.cheatsExpanded)S.cheats.forEach(function(c){items.push({k:"ch"+c.i,type:"cheat",idx:c.i,card:"gfx"});});
    }
    items.push({k:"shot",type:"act",ic:"image",lab:"Screenshot",shot:true,card:"cap"});
    items.push({k:"buffer",type:"act",ic:"rotate-ccw",lab:"Replay buffer",buffer:true,card:"cap"});
    if(S.buffer){
      items.push({k:"c30",type:"act",ic:"scissors",lab:"Clip last 30s",clip:30,card:"cap"});
      items.push({k:"c60",type:"act",ic:"scissors",lab:"Clip last 1m",clip:60,card:"cap"});
      items.push({k:"c120",type:"act",ic:"scissors",lab:"Clip last 2m",clip:120,card:"cap"});
    }
    if(IN_GAME){   // a game is paused behind us → RetroArch save states, live in the Game Bar
      items.push({k:"save",type:"act",ic:"hard-drive",lab:"Save state",savestate:"save",card:"saves"});
      items.push({k:"load",type:"act",ic:"rotate-ccw",lab:"Load state",savestate:"load",card:"saves"});
      items.push({k:"slotprev",type:"act",ic:"chevron-left",lab:"Previous slot",slot:"prev",card:"saves"});
      items.push({k:"slotnext",type:"act",ic:"chevron-right",lab:"Next slot",slot:"next",card:"saves"});
    }
    items.push({k:"wifi",type:"act",ic:"wifi",lab:"Wi-Fi",wifi:true});       // #54 quick-settings
    items.push({k:"quiet",type:"act",ic:"moon",lab:"Quiet mode",quiet:true});
    if(S.powerMode){
      items.push({k:"sleep",type:"act",ic:"moon",lab:"Sleep",act:"sleep"});
      items.push({k:"restart",type:"act",ic:"rotate-ccw",lab:"Restart",act:"restart"});
      items.push({k:"shutdown",type:"act",ic:"power",lab:"Shut down",act:"shutdown",danger:true});
    } else {
      items.push({k:"power",type:"act",ic:"power",lab:"Power",sub:"›",power:true});
    }
    items.push({k:"exit",type:"act",ic:"layout-grid",lab:"Exit to Desktop",exit:true,danger:true});
    if(foc>=items.length)foc=items.length-1;
    render();
  }
  function bar(pct){return '<div class="bar2"><i style="width:'+(pct||0)+'%"></i></div>';}
  function statRow(k,val,pct){return '<div class="stat"><span class="k">'+k+'</span><span class="track"><i style="width:'+(pct||0)+'%"></i></span><span class="v">'+val+'</span></div>';}
  function render(){
    var now=new Date(),hh=now.getHours(),mm=now.getMinutes(),ap=hh>=12?"PM":"AM",h12=((hh+11)%12)+1;
    var batt=S.batt==null?"":(" · "+S.batt+"%"+(S.charging?" ⚡":""));
    $("meta").innerHTML='<b>'+h12+':'+(mm<10?"0":"")+mm+' '+ap+'</b> &nbsp; '+(S.net||"—")+batt;
    // Performance widget — live HOST telemetry from /sys/perf (the real laptop), read-only
    $("perf").innerHTML=
      statRow("CPU", S.cpu==null?"—":S.cpu+"%", S.cpu)+
      statRow("GPU", S.gpu==null?"—":S.gpu+"%", S.gpu)+
      statRow("RAM", S.ram==null?"—":S.ram+"%", S.ram)+
      statRow("Temp", S.temp==null?"—":S.temp+"°C", S.temp)+
      (S.gpuName?'<div style="font-size:10.5px;color:#8b92b0;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+S.gpuName+'">'+S.gpuName+(S.cputemp!=null?' · CPU '+S.cputemp+'°C':'')+'</div>':'');
    // Performance HUD (MangoHud) segment — off/FPS/full, applies next launch
    if(S.hudHas){var hi=items.findIndex(x=>x.k==="hud");if(hi>=0){var hm=[["off","Off"],["fps","FPS"],["full","Full"]];
      $("perf").innerHTML+='<div class="row '+(foc===hi?"focus":"")+'" style="margin-top:11px"><div class="lab">'+ico("monitor")+'On-screen HUD</div><div class="seg">'+
        hm.map(m=>'<span class="'+(S.hud===m[0]?"sel":"")+'">'+m[1]+'</span>').join("")+'</div></div>';}}
    // Audio & Display card
    var av="";[{k:"vol"},{k:"bri"}].forEach(function(o){var it=items.find(x=>x.k===o.k);var i=items.indexOf(it);
      var val=o.k==="vol"?S.vol:S.bri, dis=o.k==="bri"&&!S.briHas;
      var label=o.k==="vol"?(S.mute?"Volume (muted)":"Volume"):"Brightness";
      av+='<div class="row '+(foc===i?"focus":"")+'"><div class="lab">'+ico(o.k==="vol"?"volume-2":"sun")+label+
        '<span class="v">'+(dis?"n/a":(val==null?"…":val+"%"))+'</span></div>'+bar(dis?0:(val||0))+'</div>';});
    $("av").innerHTML=av;
    // System card: perf segment + power/exit
    var sys="";var seg=items.find(x=>x.k==="perf");var si=items.indexOf(seg);
    var modes=[["battery","Battery"],["balanced","Balanced"],["performance","Perf"]];
    sys+='<div class="row '+(foc===si?"focus":"")+'"><div class="lab">'+ico("cpu")+'Performance mode</div><div class="seg">'+
      modes.map(m=>'<span class="'+(S.perf===m[0]?"sel":"")+'">'+m[1]+'</span>').join("")+'</div></div>';
    var cap="", saves="", gfx="";
    // Video & Cheats card (IN_GAME only): shader cycle + bezel toggle (#70), then the loop adds
    // the Cheats row (#72) and, when expanded, each cheat toggle.
    if(IN_GAME){
      var shi=items.findIndex(x=>x.k==="shader");
      if(shi>=0){var sl=(S.shaderList.find(x=>x.id===S.shaderset)||{}).label||S.shaderset;
        gfx+='<div class="row '+(foc===shi?"focus":"")+'"><div class="lab">'+ico("film")+'Shader<span class="v">‹ '+sl+' ›</span></div></div>';}
      var bzi=items.findIndex(x=>x.k==="bezel");
      if(bzi>=0)gfx+='<div class="row '+(foc===bzi?"focus":"")+'"><div class="lab">'+ico("monitor")+'Bezel<span class="v">'+(S.bezel?"On":"Off")+'</span></div></div>';
    }
    items.forEach(function(it,i){
      if(it.type==="cheat"){var c=S.cheats[it.idx]||{};
        gfx+='<div class="row '+(foc===i?"focus":"")+'" style="margin-left:14px"><div class="lab">'+ico("sparkles")+(c.desc||("Cheat "+it.idx))+'<span class="v">'+(c.enable?"On":"Off")+'</span></div></div>';return;}
      if(it.type!=="act")return;
      var sub=it.sub; if(it.buffer) sub=S.buffer?"On":"Off";
      if(it.wifi) sub=S.hasWifi?(S.net||"On"):"n/a";
      if(it.quiet) sub=S.quiet?"On":"Off";
      if(it.cheatsopen) sub=(S.cheats.length?(S.cheats.length+(S.cheatsExpanded?" ▾":" ▸")):"none");
      var html='<div class="row '+(foc===i?"focus":"")+(it.danger?" danger":"")+'"><div class="lab">'+ico(it.ic)+it.lab+
        (sub?'<span class="v">'+sub+'</span>':"")+'</div></div>';
      if(it.card==="cap") cap+=html; else if(it.card==="saves") saves+=html;
      else if(it.card==="gfx") gfx+=html; else sys+=html;});
    $("sys").innerHTML=sys; $("cap").innerHTML=cap;
    var gc=$("gfxcard"); if(gc) gc.style.display=(IN_GAME?"":"none");
    if($("gfx")) $("gfx").innerHTML=gfx;
    var sc=$("savescard"); if(sc) sc.style.display=IN_GAME?"":"none";
    if(IN_GAME){
      var thumbs = S.slots.length
        ? S.slots.map(function(s){return '<div style="text-align:center;font-size:10px;color:#aeb6d4">'+
            (s.thumb_path?'<img src="/fs/file?path='+encodeURIComponent(s.thumb_path)+'" style="width:60px;height:45px;object-fit:cover;border-radius:5px;border:1px solid #ffffff22">':'<div style="width:60px;height:45px;border-radius:5px;background:#ffffff10"></div>')+
            '<div>Slot '+s.slot+'</div></div>';}).join('')
        : '<span style="font-size:11px;color:#8b92b0">No saves yet — Save state to create one.</span>';
      $("saves").innerHTML=saves+'<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'+thumbs+'</div>';
    }
  }
  function loadSlots(){ if(!IN_GAME)return;
    api("/game/state/slots").then(function(d){ if(d&&d.slots){S.slots=d.slots;render();} }); }
  function loadExtras(){   // #62 HUD state, #54 quiet, #70 shader/bezel, #72 cheats (per-game)
    api("/sys/hud").then(d=>{if(d){S.hudHas=!!d.available;if(d.mode)S.hud=d.mode;build();}});
    api("/ui/prefs").then(d=>{if(d&&d.prefs){S.quiet=(d.prefs["gose-snd-quiet"]==="1");render();}});
    if(IN_GAME){
      api("/game/shader").then(d=>{if(d&&d.ok){S.shaderset=d.shaderset||"none";S.shaderList=d.available||[];S.bezel=!!d.bezel;render();}});
      api("/game/cheats").then(d=>{if(d&&d.ok){S.cheats=d.cheats||[];S.cheatNote=d.note||"";render();}});
    }
  }
  function refreshPerf(){   // REAL host stats (laptop CPU/GPU/RAM/temps) — NOT the VM's own /status.json
    api("/sys/perf").then(d=>{if(d&&d.ok){
      if(d.cpu_pct!=null)S.cpu=Math.round(d.cpu_pct);
      if(d.gpu_pct!=null)S.gpu=Math.round(d.gpu_pct);
      if(d.mem_pct!=null)S.ram=Math.round(d.mem_pct);
      if(d.gpu_temp_c!=null)S.temp=Math.round(d.gpu_temp_c);
      if(d.cpu_temp_c!=null)S.cputemp=Math.round(d.cpu_temp_c);
      if(d.gpu_name)S.gpuName=d.gpu_name;
      render();}});}
  function refresh(){
    // status.json's cpu_pct/mem_pct are the GUEST VM (fake) — perf comes from /sys/perf instead.
    api("/status.json").then(d=>{if(d){if(d.battery_pct!=null)S.batt=d.battery_pct;S.charging=!!d.charging;}render();});
    api("/net.json").then(d=>{if(d&&d.ok){S.net=d.connection||(d.online?"Online":"Offline");S.hasWifi=!!d.has_wifi;}render();});
    api("/sys/audio").then(d=>{if(d&&d.ok){S.vol=d.volume==null?S.vol:d.volume;S.mute=!!d.mute;}render();});
    api("/sys/brightness").then(d=>{if(d){S.briHas=d.ok!==false;if(d.ok&&d.level!=null)S.bri=d.level;}render();});
  }
  function setVol(v){v=Math.max(0,Math.min(100,v));S.vol=v;render();clearTimeout(setVol._t);setVol._t=setTimeout(()=>api("/sys/audio",{volume:v}),110);}
  function setBri(v){if(!S.briHas)return;v=Math.max(0,Math.min(100,v));S.bri=v;render();clearTimeout(setBri._t);setBri._t=setTimeout(()=>api("/sys/brightness",{level:v}),110);}
  function setPerf(d){var m=["battery","balanced","performance"],i=Math.max(0,Math.min(2,m.indexOf(S.perf)+d));S.perf=m[i];render();api("/sys/perf",{mode:S.perf});}
  function setHud(d){var m=["off","fps","full"],i=Math.max(0,Math.min(2,m.indexOf(S.hud)+d));if(m[i]===S.hud)return;S.hud=m[i];render();
    api("/sys/hud",{mode:S.hud}).then(x=>{if(x&&x.ok===false)say(x.error||"HUD unavailable");else say("HUD: "+S.hud+" — next launch");});}
  function cycShader(d){if(!S.shaderList.length)return;var ids=S.shaderList.map(x=>x.id),i=(ids.indexOf(S.shaderset)+d+ids.length)%ids.length;S.shaderset=ids[i];render();
    api("/game/shader",{shaderset:S.shaderset}).then(x=>say((x&&x.ok!==false)?("Shader: "+((S.shaderList.find(y=>y.id===S.shaderset)||{}).label||S.shaderset)+" — next launch"):"Shader change failed"));}
  function focusVisible(){var el=document.querySelector(".row.focus");if(el&&el.scrollIntoView)el.scrollIntoView({block:"nearest",inline:"nearest"});}
  function move(d){foc=(foc+d+items.length)%items.length;render();focusVisible();}
  // which visual card a focusable item lives in — for L1/R1 ([ / ]) section hopping
  function secOf(it){if(!it)return"sys";if(it.k==="vol"||it.k==="bri")return"av";if(it.k==="hud")return"perf";if(it.type==="seg")return"sys";return it.card||"sys";}
  function jumpSection(d){if(!items.length)return;
    var order=[];items.forEach(function(it){var s=secOf(it);if(order.indexOf(s)<0)order.push(s);});
    var ci=order.indexOf(secOf(items[foc])),ns=order[(ci+d+order.length)%order.length];
    var ni=items.findIndex(function(it){return secOf(it)===ns;});
    if(ni>=0){foc=ni;render();focusVisible();}}
  function adjust(d){var it=items[foc];if(!it)return;if(it.k==="vol")setVol(S.vol+d*5);else if(it.k==="bri")setBri((S.bri||0)+d*5);else if(it.k==="hud")setHud(d);else if(it.k==="shader")cycShader(d);else if(it.type==="seg")setPerf(d);}
  function enter(){var it=items[foc];if(!it)return;
    if(it.savestate){say(it.savestate==="save"?"Saving state…":"Loading state…");
      api("/game/"+(it.savestate==="save"?"savestate":"loadstate"),{}).then(function(){
        if(it.savestate==="save"){say("State saved");setTimeout(loadSlots,700);}});return;}
    if(it.slot){say(it.slot==="next"?"Next slot →":"← Previous slot");
      api("/game/slot",{dir:it.slot}).then(function(){setTimeout(loadSlots,300);});return;}
    if(it.shot){say("Saving screenshot…");api("/capture/shot",{source:"frozen"}).then(d=>say(d&&d.ok?("Saved to Pictures: "+d.name):"Screenshot failed"));return;}
    if(it.buffer){var on=!S.buffer;say(on?"Starting replay buffer…":"Stopping replay buffer");
      api("/capture/buffer",{on:on}).then(d=>{S.buffer=!!(d&&d.running);build();say(S.buffer?"Replay buffer ON — now recording":"Replay buffer off");});return;}
    if(it.clip){if(!S.buffer){say("Turn on the Replay buffer first");return;}
      var lbl=it.clip>=60?(it.clip/60)+"m":it.clip+"s";say("Saving last "+lbl+" clip…");
      api("/capture/clip",{seconds:it.clip}).then(d=>say(d&&d.ok?("Clip saved to Videos: "+d.name):(d&&d.error||"Clip failed")));return;}
    if(it.k==="bezel"){var bon=!S.bezel;S.bezel=bon;render();api("/game/shader",{bezel:bon}).then(x=>say((x&&x.ok!==false)?("Bezel "+(bon?"on":"off")+" — next launch"):"Bezel change failed"));return;}
    if(it.cheatsopen){if(!S.cheats.length){say(S.cheatNote||"No cheats for this game");return;}S.cheatsExpanded=!S.cheatsExpanded;build();return;}
    if(it.type==="cheat"){var c=S.cheats[it.idx];if(!c)return;var con=!c.enable;c.enable=con;render();
      api("/game/cheat",{index:it.idx,enable:con}).then(x=>say((x&&x.ok!==false)?((c.desc||("Cheat "+it.idx))+": "+(con?"On":"Off")+" — next launch"):"Cheat change failed"));return;}
    if(it.wifi){if(!S.hasWifi){say("No Wi-Fi radio on this device");return;}say("Toggling Wi-Fi…");
      api("/net/wifi/toggle",{}).then(x=>{say((x&&x.ok)?("Wi-Fi "+(x.powered?"on":"off")):((x&&x.error)||"Wi-Fi toggle failed"));refresh();});return;}
    if(it.quiet){var q=!S.quiet;S.quiet=q;render();api("/ui/prefs",{set:{"gose-snd-quiet":q?"1":"0"}}).then(()=>say(q?"Quiet mode on — all sounds off":"Quiet mode off"));return;}
    if(it.act){api("/sys/power",{action:it.act});return;}
    if(it.power){S.powerMode=true;build();return;}
    if(it.exit){api("/game/exit",{});return;}
    if(it.k==="vol"){S.mute=!S.mute;api("/sys/audio",{mute:S.mute});render();}}
  addEventListener("keydown",function(e){var k=e.key;
    if(k==="ArrowDown")move(1);else if(k==="ArrowUp")move(-1);
    else if(k==="ArrowRight")adjust(1);else if(k==="ArrowLeft")adjust(-1);
    else if(k==="Enter"||k===" ")enter();
    else if(k==="]"||k==="PageDown")jumpSection(1);
    else if(k==="["||k==="PageUp")jumpSection(-1);
    else return;e.preventDefault();},true);
  build();refresh();setInterval(refresh,2000);
  refreshPerf();setInterval(refreshPerf,1200);   // live host perf while the bar is open (stays under /sys/perf 60/60 limit)
  api("/capture/buffer").then(d=>{if(d){S.buffer=!!d.running;build();}});   // reflect replay-buffer state on open
  loadSlots();   // populate the saved-states thumbnails when the Game Bar opens over a game
  loadExtras();   // HUD/quiet/shader/bezel/cheats state for the game-bar quick controls
  try{document.body.tabIndex=-1;window.focus();document.body.focus();}catch(e){}   // make sure keys land here
  (function(){var done=false;function go(){if(done)return;done=true;requestAnimationFrame(function(){document.body.classList.add("ready");});}
    var im=new Image();im.onload=go;im.onerror=go;im.src="_gbg.jpg?"+bgn;setTimeout(go,240);})();   // reveal once the frozen frame is ready (or 240ms cap)
</script>
