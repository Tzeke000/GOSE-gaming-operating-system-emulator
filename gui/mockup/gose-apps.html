<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Apps</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:rgba(7,7,15,.78);
    backdrop-filter:blur(18px);display:flex;flex-direction:column;align-items:center}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .wrap{width:920px;max-width:94vw;margin-top:6vh;display:flex;flex-direction:column;flex:1;min-height:0}
  .head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .head img{width:30px;height:30px}.head h1{font-size:18px;margin:0}
  .head .x{margin-left:auto;color:var(--muted);font-size:13px}
  .search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;margin-bottom:18px}
  .search input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font-size:15px}
  .ph{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);margin:0 0 10px 2px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;overflow:auto;padding-bottom:8px}
  .app{background:var(--surface);border:2px solid transparent;border-radius:14px;padding:18px 16px;cursor:pointer;
    display:flex;flex-direction:column;gap:8px;min-height:120px}
  .app:hover{background:var(--surface2)}
  .app.focus{border-color:var(--accent);box-shadow:var(--focusglow)}
  .app .ai{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    background:var(--icon-tile);border:1px solid var(--icon-tile-bd)}
  .app .ai .ic{font-size:22px;color:#dfe5f5}
  .app .nm{font-weight:700;font-size:15px}
  .app .ds{color:var(--muted);font-size:12px;line-height:1.4}
  .app .soon{align-self:flex-start;font-size:10px;font-weight:700;color:var(--accent);background:#5cd0ff1c;
    border:1px solid var(--line);border-radius:8px;padding:2px 7px;margin-top:auto}
  .power{display:flex;gap:10px;margin-top:16px;justify-content:center}
  .power button{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:11px;
    padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}
  .power button:hover{border-color:var(--accent)}
  .foot{margin:10px 0 16px;color:var(--muted);font-size:13px}
  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--accent);border-radius:11px;padding:9px 16px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style></head>
<body>
  <div class="wrap">
    <div class="head"><img src="assets/brand/gose-crystal.png" alt="GOSE"><h1 data-i18n="apps.title">Apps</h1>
      <span class="x"><span class="ic" data-i="apps"></span> <span data-i18n="app.close">Esc — desktop</span></span></div>
    <div class="search"><span class="ic" data-i="search"></span><input id="q" placeholder="Search apps…" autofocus data-i18n-placeholder="apps.search_ph"></div>
    <div class="ph" id="ph" data-i18n="apps.all_apps">ALL APPS</div>
    <div class="grid" id="grid"></div>
    <div class="power">
      <button data-pw="sleep"><span class="ic" data-i="moon"></span><span data-i18n="apps.sleep">Sleep</span></button>
      <button data-pw="restart"><span class="ic" data-i="rotate-ccw"></span><span data-i18n="apps.restart">Restart</span></button>
      <button data-pw="shutdown"><span class="ic" data-i="power"></span><span data-i18n="apps.shut_down">Shut down</span></button>
    </div>
  </div>
  <div class="foot" data-i18n="apps.footer"><b>↑↓←→</b> move · <b>Enter</b> open · type to search · <b>Esc</b> desktop</div>
  <div class="toast" id="toast"></div>
<script src="assets/i18n.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const $=id=>document.getElementById(id);
  var _t=window.GOSE&&GOSE.t?GOSE.t.bind(GOSE):function(k,fb){return fb||k;};
  const APPS=[
    {nm:_t("apps.app.library.nm","Library"),  ds:_t("apps.app.library.ds","Your games, by system"),        ic:"library", href:"gose-library.html"},
    {nm:_t("apps.app.steam.nm","Steam"),     ds:_t("apps.app.steam.ds","PC game store — light/retro in VM, full on real hardware"), ic:"gamepad-2", href:"gose-steam.html"},
    {nm:_t("apps.app.files.nm","Files"),    ds:_t("apps.app.files.ds","Browse, open & edit files + storage map"), ic:"files", href:"gose-files.html"},
    {nm:_t("apps.app.taskman.nm","Task Manager"), ds:_t("apps.app.taskman.ds","Processes, performance, kill tasks"), ic:"cpu", href:"gose-taskman.html"},
    {nm:_t("apps.app.peripherals.nm","Peripherals"), ds:_t("apps.app.peripherals.ds","Controllers, USB, Wi-Fi & Bluetooth"), ic:"usb", href:"gose-peripherals.html"},
    {nm:_t("apps.app.settings.nm","Settings"), ds:_t("apps.app.settings.ds","Personalize the whole OS"),      ic:"settings-app",   href:"gose-settings.html"},
    {nm:_t("apps.app.gallery.nm","Gallery"),  ds:_t("apps.app.gallery.ds","Screenshots & game clips"),       ic:"gallery",    href:"gose-gallery.html"},
    {nm:_t("apps.app.saves.nm","Save Data"), ds:_t("apps.app.saves.ds","Back up, export & sync your game saves"), ic:"hard-drive", href:"gose-saves.html"},
    {nm:_t("apps.app.splice.nm","Splice"),   ds:_t("apps.app.splice.ds","Lossless video trim"),           ic:"scissors", href:"gose-splice.html"},
    {nm:_t("apps.app.browser.nm","Browser"),  ds:_t("apps.app.browser.ds","Couch-friendly web browser — pad + OSK"),   ic:"globe", href:"gose-browser.html"},
    {nm:_t("apps.app.moonlight.nm","Moonlight"), ds:_t("apps.app.moonlight.ds","Stream games from your PC (Sunshine / GeForce)"), ic:"monitor", app:"moonlight"},
    {nm:_t("apps.app.store.nm","Store"),    ds:_t("apps.app.store.ds","Get more apps from Flathub"),     ic:"store", href:"gose-store.html"},
    {nm:_t("apps.app.terminal.nm","Terminal"), ds:_t("apps.app.terminal.ds","Command line — the real shell"),  ic:"terminal-app", href:"gose-term.html"},
    {nm:_t("apps.app.licenses.nm","Licenses"), ds:_t("apps.app.licenses.ds","Open-source credits & licenses"), ic:"file-text", href:"gose-licenses.html"},
    {nm:_t("apps.app.stress.nm","Stress Test"), ds:_t("apps.app.stress.ds","CPU, memory & GL stability and thermal check"), ic:"flame", href:"gose-stress.html"},
    {nm:_t("apps.app.beam.nm","Beam"),     ds:_t("apps.app.beam.ds","Send files to phone & devices"), ic:"send",     soon:true},
    {nm:_t("apps.app.ai.nm","AI Players"), ds:_t("apps.app.ai.ds","Your AI agents — join & play"), ic:"ai", soon:true},
    {nm:_t("apps.app.emulators.nm","Emulators"), ds:_t("apps.app.emulators.ds","Cores & systems — license-aware store"), ic:"emulators", href:"gose-store.html?tab=emulators"},
  ];
  let shown=APPS.slice(), foc=0;
  function paint(){if(window.GICON){GICON.paint(document);return;}document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}
  function say(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(say._t);say._t=setTimeout(()=>t.classList.remove("show"),1800);}
  function render(){
    $("grid").innerHTML=shown.length?shown.map((a,i)=>`<div class="app ${i===foc?'focus':''}" data-i2="${i}">
      <div class="ai">${a.iconUrl
        ? `<img src="${a.iconUrl}" style="width:34px;height:34px;border-radius:8px;object-fit:contain" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'"><span class="ic" data-i="${a.ic}" style="display:none"></span>`
        : `<span class="ic" data-i="${a.ic}"></span>`}</div>
      <div class="nm">${a.nm}</div><div class="ds">${a.ds}</div>${a.soon?'<span class="soon">SOON</span>':''}</div>`).join("")
      :'<div class="ds" style="padding:20px">No apps match.</div>';
    [...$("grid").children].forEach(el=>el.dataset.i2!==undefined&&(el.onclick=()=>{foc=+el.dataset.i2;launch();}));
    const f=$("grid").querySelector(".app.focus");if(f)f.scrollIntoView({block:"nearest"});
    paint();
  }
  function launch(){const a=shown[foc];if(!a)return;
    if(a.soon){say(a.nm+(a.unavail?(" — "+a.unavail):" — coming soon"));return;}
    if(a.app||a.cmd){say("Opening "+a.nm+"…");
      const body=a.app?{app:a.app}:{cmd:a.cmd};
      fetch("/launch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
        .then(r=>r.json()).then(d=>say(d.ok?(d.note||("Opening "+a.nm)):("Couldn't open: "+(d.error||"?"))));return;}
    location.href=a.href;}
  // Moonlight ships on the image as a system binary (not a flatpak), so it won't appear via
  // /apps.json — it's a built-in tile above. Degrade honestly if the binary isn't present.
  fetch("/apps/moonlight",{cache:"no-store"}).then(r=>r.json()).then(d=>{
    if(d&&d.ok&&!d.installed){const m=APPS.find(a=>a.app==="moonlight");
      if(m){m.soon=true;m.unavail="not installed on this image";m.ds="PC game streaming (not installed)";filter();}}
  }).catch(()=>{});
  const ICONMAP={"com.valvesoftware.Steam":"gamepad-2","org.gimp.GIMP":"palette","org.videolan.VLC":"play",
    "net.lutris.Lutris":"gamepad-2","com.usebottles.bottles":"wrench","com.google.Chrome":"globe",
    "org.chromium.Chromium":"globe","org.mozilla.firefox":"globe","com.heroicgameslauncher.hgl":"gamepad-2",
    "com.discordapp.Discord":"users","com.spotify.Client":"volume-2","org.kde.kdenlive":"scissors",
    "com.obsproject.Studio":"monitor","org.blender.Blender":"sparkles","md.obsidian.Obsidian":"file-text"};
  const NAMEMAP={"com.valvesoftware.Steam":"Steam","org.gimp.GIMP":"GIMP","org.videolan.VLC":"VLC",
    "net.lutris.Lutris":"Lutris","com.usebottles.bottles":"Bottles","com.google.Chrome":"Google Chrome",
    "org.chromium.Chromium":"Chromium","org.mozilla.firefox":"Firefox","com.heroicgameslauncher.hgl":"Heroic",
    "com.discordapp.Discord":"Discord","com.spotify.Client":"Spotify","org.kde.kdenlive":"Kdenlive",
    "com.obsproject.Studio":"OBS Studio","org.blender.Blender":"Blender","md.obsidian.Obsidian":"Obsidian"};
  // Flatpak IDs that have a dedicated first-class tile above — skip dynamic duplication.
  const SKIP_FLATPAK_IDS=new Set(["com.valvesoftware.Steam"]);
  function loadInstalled(){fetch("/apps.json",{cache:"no-store"}).then(r=>r.json()).then(d=>{
    (d.apps||[]).forEach(a=>{
      if(SKIP_FLATPAK_IDS.has(a.id))return;  // has a dedicated tile (e.g. Steam → gose-steam.html)
      if(APPS.some(x=>x.cmd==="flatpak run "+a.id))return;
      APPS.push({nm:NAMEMAP[a.id]||a.name||a.id, ds:"Installed app", ic:ICONMAP[a.id]||"layout-grid",
        cmd:"flatpak run "+a.id, iconUrl:"/appicon?id="+a.id});});
    filter();
  }).catch(()=>{});}
  // Windows-Start-style search: apps + Settings pages + a Files search action
  const SETTINGS=[["Display","display"],["Sound & audio","sound"],["Network & Wi-Fi","net"],
    ["Wallpaper & Personalization","personalize"],["Time & Language","time"],["Power & Battery","power"],
    ["Privacy & Security","privacy"],["Accounts","accounts"],["About this device","about"],["Live wallpaper","personalize"]];
  // Reset the cursor to cell 0 ONLY when the query actually changes (real typing).
  // loadInstalled() re-runs filter() with the SAME query every 8s as installed apps
  // stream in; that background refresh must NOT yank the pad's grid focus back to
  // the top — clamp foc into range instead so navigation holds.
  let lastQ=null;
  function filter(){const raw=$("q").value.trim(), q=raw.toLowerCase();
    const qChanged=(q!==lastQ); lastQ=q;
    if(!q){shown=APPS.slice();foc=qChanged?0:Math.min(foc,shown.length-1);$("ph").textContent="ALL APPS";render();return;}
    const apps=APPS.filter(a=>a.nm.toLowerCase().includes(q)||a.ds.toLowerCase().includes(q));
    const sets=SETTINGS.filter(s=>s[0].toLowerCase().includes(q)||("settings".includes(q)))
      .map(s=>({nm:s[0],ds:"Settings",ic:"settings",href:"gose-settings.html#"+s[1]}));
    const files=[{nm:'Search Files for "'+raw+'"',ds:"Open in Files",ic:"folder",href:"gose-files.html"}];
    shown=apps.concat(sets).concat(files);foc=qChanged?0:Math.min(foc,shown.length-1);
    $("ph").textContent="RESULTS — "+(apps.length+sets.length);render();}
  function move(d){if(!shown.length)return;foc=(foc+d+shown.length)%shown.length;render();}
  $("q").addEventListener("input",filter);
  document.querySelectorAll("[data-pw]").forEach(b=>b.onclick=()=>{
    if(b.dataset.pw==="sleep"){location.href="gose-lock.html";return;}
    say(b.dataset.pw[0].toUpperCase()+b.dataset.pw.slice(1)+" — hold to confirm (wired to the agent next)");});
  addEventListener("keydown",e=>{const k=e.key;
    if(k==="Escape"){location.href="gose-home.html";}
    else if(k==="ArrowRight")move(1);
    else if(k==="ArrowLeft")move(-1);
    else if(k==="ArrowDown")move(4);
    else if(k==="ArrowUp")move(-4);
    else if(k==="Enter")launch();
    else return; e.preventDefault();});
  // NO navigator.getGamepads() polling here — ONE input path only. The controller
  // drives this page via the SAME synthesized arrow/Enter/Esc keys as every other
  // GOSE page (gose-pad-nav.py reads the pad via evdev and emits X keys: the
  // universal path, since WebKit2GTK here has no gamepad lib). A raw-gamepad poll
  // would be a SECOND path also calling move()/launch() — on any build where
  // getGamepads is live (Chromium / a libmanette WebKit) that double-fires, moving
  // the grid TWO cells per press. Keydown above is the single source of truth.
  render(); loadInstalled(); setInterval(loadInstalled, 8000);
  (function(){const hq=(location.hash.match(/q=([^&]+)/)||[])[1]; if(hq){$("q").value=decodeURIComponent(hq);filter();}})();
</script>
<script src="assets/a11y.js"></script>
</body></html>
