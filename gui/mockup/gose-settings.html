<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Settings</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-500-normal.woff2) format('woff2');font-weight:500}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:14px;padding:20px 40px 8px}
  .lg{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 0 8px #9a5bff55)}
  .top h1{font-size:21px;margin:0}.top .s{color:var(--muted);font-size:12px}
  .home{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:8px 14px;font-size:13px;color:var(--muted)}
  .wrap{flex:1;display:flex;gap:18px;padding:8px 40px 0;min-height:0}
  .rail{width:230px;flex:none;display:flex;flex-direction:column;gap:6px;padding-top:6px}
  .cat{display:flex;align-items:center;gap:12px;height:46px;padding:0 14px;border-radius:11px;
    border:2px solid transparent;color:var(--muted);cursor:pointer}
  .cat .ic{font-size:20px}.cat .nm{font-weight:600;font-size:14px}
  .cat.on{background:var(--surface2);color:var(--text)}
  .cat.on .ic{color:var(--accent)}
  .cat.kf{border-color:var(--accent)!important;box-shadow:var(--focusglow)}
  .pane{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;overflow:auto}
  .ph{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);padding:10px 10px 6px}
  .set{display:flex;align-items:center;gap:14px;min-height:54px;padding:8px 14px;border-radius:11px;
    border:2px solid transparent;cursor:pointer}
  .set .ic{font-size:20px;color:#b8becc;flex:none}
  .set .lbl{min-width:0}.set .nm{font-weight:600}.set .sub{color:var(--muted);font-size:12px}
  .set .val{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--accent);
    font-weight:600;font-size:14px;white-space:nowrap}
  .set .val .cy{color:var(--muted);font-size:13px}
  .set .off{color:var(--muted)}
  .set.focus{border-color:var(--accent);background:#5cd0ff14;box-shadow:var(--focusglow)}
  .set.focus .ic,.set.focus .nm{color:var(--accent)}
  .agts{display:flex;gap:6px}
  .agts b{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);
    border:1px solid var(--line);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .foot{margin:10px 40px 16px;display:flex;align-items:center;gap:10px;color:var(--muted);
    font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}.foot b{color:var(--text)}
  .toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--accent);border-radius:11px;padding:8px 16px;font-size:13px;opacity:0;
    transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
</style></head>
<body>
  <div class="top"><img class="lg" src="assets/brand/gose-core-mark.png" alt="GOSE Core">
    <div><h1>Settings</h1><div class="s">GOSE · personalize, sound, network, time, power, privacy, accounts &amp; more</div></div>
    <div class="home"><span class="ic" data-i="layout-grid"></span><span>B / Esc — back to desktop</span></div>
  </div>
  <div class="wrap">
    <div class="rail" id="rail"></div>
    <div class="pane" id="pane"></div>
  </div>
  <div class="foot"><span class="ic" data-i="settings"></span> GOSE Settings
    <span class="h"><b>↑↓</b> move · <b>→</b> enter · <b>←</b> back to list · <b>Esc</b> desktop</span></div>
  <div class="toast" id="toast"></div>
<script src="assets/platform.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const THEMES=["onyx","midnight","neon","aurora"];
  // wallpapers — gradients so no asset files needed; the desktop reads the same map
  const WALLS=[
    ["Aurora (default)","radial-gradient(120% 90% at 50% -10%, #1a1f3a 0%, #0c0c1e 55%, #07070f 100%)"],
    ["Deep Space","radial-gradient(120% 90% at 70% 0%, #161033 0%, #0a0a18 60%, #050509 100%)"],
    ["Twilight","linear-gradient(160deg, #241634 0%, #131127 50%, #0a0a16 100%)"],
    ["Carbon","linear-gradient(160deg, #1c1c22 0%, #121216 60%, #0a0a0c 100%)"],
    ["Sunset","linear-gradient(165deg, #2a1730 0%, #1a1330 45%, #0c0c1e 100%)"],
    ["Forest","linear-gradient(160deg, #122318 0%, #0d1820 55%, #080c10 100%)"],
  ];
  // time zones — display label -> IANA id (drives the real desktop clock)
  const TZONES=[
    ["Eastern — New York","America/New_York"],["Central — Chicago","America/Chicago"],
    ["Mountain — Denver","America/Denver"],["Pacific — Los Angeles","America/Los_Angeles"],
    ["UTC","UTC"],["London — GMT","Europe/London"],["Helsinki — EET","Europe/Helsinki"],
    ["Tokyo — JST","Asia/Tokyo"],
  ];
  const CATS=[
    {id:"personalize", ic:"palette", nm:"Personalization", rows:[
      {ic:"monitor", nm:"Wallpaper", sub:"Desktop background — applies to the GOSE home", t:"cycle", v:WALLS.map(w=>w[0]), apply:"wp"},
      {ic:"sparkles", nm:"Live wallpaper", sub:"Animated background — overrides the static wallpaper when on", t:"cycle", v:["Off","Aurora","Starfield","Particles","Nebula"], apply:"live"},
      {ic:"palette", nm:"Theme & accent", sub:"Color scheme, applied live across the whole UI", t:"theme", v:["Onyx","Midnight","Neon","Aurora"]},
      {ic:"sparkles", nm:"Core glow", sub:"Glow around the GOSE Core centerpiece", t:"cycle", v:["Soft","Bright","Off"]},
      {ic:"moon", nm:"Appearance", sub:"GOSE is dark-first; light mode is experimental", t:"cycle", v:["Dark","Light (beta)"]},
    ]},
    {id:"a11y", ic:"eye", nm:"Accessibility", rows:[
      {ic:"eye", nm:"Text size", sub:"Make everything bigger — applies across the whole OS", t:"cycle", v:["Default","Large","Larger","Largest"], apply:"a11y_scale"},
      {ic:"sun", nm:"High contrast", sub:"Stronger text, colors and borders", t:"cycle", v:["Off","On"], apply:"a11y_contrast"},
      {ic:"monitor", nm:"Bold text", sub:"Heavier font weight everywhere", t:"cycle", v:["Off","On"], apply:"a11y_bold"},
      {ic:"palette", nm:"Color filters", sub:"Colorblind-friendly palette, or full-screen correction", t:"cycle", v:["Off","Friendly palette","Deuteranopia","Protanopia","Tritanopia"], apply:"a11y_cb"},
      {ic:"sparkles", nm:"Reduce motion", sub:"Stop animations and live wallpaper", t:"cycle", v:["Off","On"], apply:"a11y_motion"},
      {ic:"monitor", nm:"Reduce transparency", sub:"Make frosted panels solid", t:"cycle", v:["Off","On"], apply:"a11y_opaque"},
      {ic:"target", nm:"Larger focus outline", sub:"Thicker highlight on the selected item", t:"cycle", v:["Off","On"], apply:"a11y_focus"},
    ]},
    {id:"display", ic:"monitor", nm:"Display", rows:[
      {ic:"monitor", nm:"Mode", sub:"PC desktop, or Odin 2 handheld-console feel (VM default: PC)", t:"cycle", v:["PC desktop","Console (handheld)"]},
      {ic:"monitor", nm:"Resolution", sub:"Internal panel / VM window", t:"cycle", v:["1280 x 720","1920 x 1080","1280 x 800"], i:1},
      {ic:"smartphone", nm:"Output", sub:"Where the picture goes", t:"cycle", v:["Auto","Internal","HDMI (dock)"]},
      {ic:"sun", nm:"VSync", sub:"Tear-free at a small latency cost", t:"cycle", v:["On","Off"]},
      {ic:"monitor", nm:"FPS counter", sub:"Show frames-per-second overlay in games — applies on next launch", t:"cycle", v:["Off","On"], apply:"fps"},
      {ic:"sun", nm:"Brightness", sub:"Panel backlight (handheld only)", t:"cycle", v:["40%","60%","80%","100%"], i:2},
    ]},
    {id:"sound", ic:"volume-2", nm:"Sound", rows:[
      {ic:"volume-2", nm:"Output device", sub:"Where audio plays", t:"cycle", v:["Auto","Speakers","HDMI","Headphones","Bluetooth"]},
      {ic:"volume-2", nm:"Master volume", sub:"System-wide level", t:"cycle", v:["25%","50%","75%","100%"], i:2},
      {ic:"bluetooth", nm:"Bluetooth audio", sub:"Pair wireless headphones / earbuds", t:"cycle", v:["On","Off"]},
      {ic:"bell", nm:"UI sounds", sub:"Clicks and navigation feedback", t:"cycle", v:["On","Off"], apply:"sounds"},
    ]},
    {id:"net", ic:"wifi", nm:"Network & internet", rows:[
      {ic:"globe", nm:"Status", sub:"Active connection (live, via connman)", t:"info", val:"—", live:"net"},
      {ic:"wifi", nm:"Wi-Fi", sub:"Connect & manage known networks", t:"link", go:"gose-wifi.html", live:"wifi"},
      {ic:"plane", nm:"Airplane mode", sub:"Turn off wireless radios", t:"cycle", v:["Off","On"], apply:"airplane"},
      {ic:"globe", nm:"Hostname", sub:"How the device is named on the network", t:"info", val:"gose"},
      {ic:"usb", nm:"SSH access", sub:"Console + file push over the network", t:"cycle", v:["Enabled","Disabled"]},
    ]},
    {id:"btdev", ic:"bluetooth", nm:"Bluetooth & devices", rows:[
      {ic:"bluetooth", nm:"Bluetooth", sub:"Wireless radio — pair controllers, audio & accessories", t:"cycle", v:["On","Off"], apply:"bt", live:"bt"},
      {ic:"search", nm:"Add device", sub:"Scan & pair a new controller, headset or accessory", t:"link", go:"gose-bluetooth.html"},
      {ic:"gamepad-2", nm:"My devices", sub:"Paired devices — connect, disconnect, remove", t:"link", go:"gose-bluetooth.html"},
      {ic:"target", nm:"Controllers & remap", sub:"Layout and button remapping", t:"link", go:"gose-remap.html"},
      {ic:"volume-2", nm:"Audio devices", sub:"Wireless headphones & earbuds", t:"link", go:"gose-bluetooth.html"},
    ]},
    {id:"controllers", ic:"gamepad-2", nm:"Controllers", rows:[
      {ic:"target", nm:"Layout & remap", sub:"Pick your controller and remap every button", t:"link", go:"gose-remap.html"},
      {ic:"mouse", nm:"Stick deadzone", sub:"Use the controller's own deadzone, or override with a level", t:"cycle", v:["Controller default","Low","Medium","High"], i:0},
      {ic:"power", nm:"Rumble", sub:"Controller vibration feedback", t:"cycle", v:["On","Off"]},
      {ic:"gamepad-2", nm:"Button prompts", sub:"Icon style shown in menus", t:"cycle", v:["Auto","Xbox","PlayStation","Nintendo"]},
    ]},
    {id:"input", ic:"keyboard", nm:"Input", rows:[
      {ic:"gamepad-2", nm:"Default input mode", sub:"PC default is Keyboard; device is Native", t:"cycle", v:["Keyboard","Controller","Native"]},
      {ic:"keyboard", nm:"On-screen keyboard", sub:"For Wi-Fi passwords / search", t:"cycle", v:["On","Off"]},
    ]},
    {id:"time", ic:"clock", nm:"Time & Language", rows:[
      {ic:"globe", nm:"Set time zone automatically", sub:"From your location when online; else keep the last zone", t:"cycle", v:["On","Off"]},
      {ic:"clock", nm:"Time zone", sub:"Used by the desktop clock", t:"cycle", v:TZONES.map(z=>z[0]), apply:"tz"},
      {ic:"clock", nm:"Time format", sub:"How the clock reads", t:"cycle", v:["12-hour","24-hour"], apply:"clockfmt"},
      {ic:"globe", nm:"Region & language", sub:"Formats and on-screen language", t:"cycle", v:["English (US)","English (UK)","Suomi","日本語"]},
    ]},
    {id:"power", ic:"battery", nm:"Power & Battery", rows:[
      {ic:"battery", nm:"Battery", sub:"Live from the host laptop (hidden on a desktop PC)", t:"info", val:"—", live:"bat"},
      {ic:"power", nm:"Power mode", sub:"Trade performance vs battery life", t:"cycle", v:["Balanced","Performance","Battery saver"], apply:"perf"},
      {ic:"clock", nm:"Sleep after", sub:"Idle time before the screen sleeps", t:"cycle", v:["Never","5 min","10 min","30 min"], i:2},
      {ic:"sun", nm:"Dim on battery", sub:"Lower brightness when unplugged", t:"cycle", v:["On","Off"]},
      {ic:"moon", nm:"Sleep now", sub:"Suspend the device", t:"action", val:"sleep", post:"/sys/power", body:{action:"sleep"}, act:"Sleeping…"},
      {ic:"rotate-ccw", nm:"Restart", sub:"Reboot GOSE", t:"action", val:"restart", post:"/sys/power", body:{action:"restart"}, act:"Restarting…", confirm:true},
      {ic:"power", nm:"Shut down", sub:"Power off the device", t:"action", val:"shutdown", post:"/sys/power", body:{action:"shutdown"}, act:"Shutting down…", confirm:true},
    ]},
    {id:"privacy", ic:"shield", nm:"Privacy & Security", rows:[
      {ic:"shield", nm:"Require approval to join", sub:"Ask you before an agent takes control", t:"cycle", v:["On","Off"]},
      {ic:"lock", nm:"Lock on idle", sub:"Require unlock after sleep", t:"cycle", v:["On","Off"]},
      {ic:"monitor", nm:"Allow screen capture", sub:"Let agents see the screen to assist", t:"cycle", v:["Ask","Always","Never"]},
      {ic:"sparkles", nm:"Usage diagnostics", sub:"Anonymous data to improve GOSE", t:"cycle", v:["On","Off"], i:1},
      {ic:"hard-drive", nm:"Clear local data", sub:"Saves, cache, pairing tokens", t:"action", val:"clear", act:"Local data cleared (demo)"},
    ]},
    {id:"accounts", ic:"users", nm:"Accounts", rows:[
      {ic:"user", nm:"You", sub:"Primary account on this device", t:"info", val:"Zeke"},
      {ic:"sparkles", nm:"AI players", sub:"Wren, Ava, Iris — manage in the AI Hub", t:"agents"},
      {ic:"users", nm:"Add account", sub:"A person or an AI can have their own account", t:"action", val:"add", act:"Opens first-time account setup (OOBE)"},
      {ic:"lock", nm:"Sign-in", sub:"How accounts unlock this device", t:"cycle", v:["None","PIN","Password"]},
    ]},
    {id:"ai", ic:"sparkles", nm:"AI & Remote", rows:[
      {ic:"sparkles", nm:"AI access & players", sub:"Grant or revoke each AI's access — Observe / Play / Admin", t:"link", go:"gose-ai.html"},
      {ic:"plug-zap", nm:"Remote agent control", sub:"Let agents drive this device over the network", t:"cycle", v:["Enabled","Disabled"]},
      {ic:"users", nm:"Allowed agents", sub:"Who may join your session", t:"agents"},
      {ic:"shield", nm:"Require approval to join", sub:"Ask you before an agent takes control", t:"cycle", v:["On","Off"]},
      {ic:"lock", nm:"Pairing token", sub:"Secret agents present to connect", t:"action", val:"reveal", act:"Pairing token shown (demo)"},
      {ic:"volume-2", nm:"Voice", sub:"Agents may speak / listen in-session", t:"cycle", v:["On","Off"]},
    ]},
    {id:"system", ic:"hard-drive", nm:"System", rows:[
      {ic:"hard-drive", nm:"Latest backup", sub:"Most recent GOSE backup saved on this device", t:"info", val:"—", live:"backup"},
      {ic:"download", nm:"Back up GOSE", sub:"Save accounts, grants, favorites & settings to /userdata/backups — not your games or saves", t:"sys", op:"backup", val:"Back up"},
      {ic:"rotate-ccw", nm:"Restore", sub:"Roll GOSE back to the latest backup (press twice to confirm)", t:"sys", op:"restore", val:"Restore"},
      {ic:"triangle-alert", nm:"Reset GOSE", sub:"Wipe accounts, grants & settings to defaults — keeps your games and saves (press twice to confirm)", t:"sys", op:"reset", val:"Reset"},
    ]},
    {id:"about", ic:"info", nm:"About", rows:[
      {ic:"info", nm:"GOSE", sub:"Gaming Operating System Emulator", t:"info", val:"v0.4 (dev)"},
      {ic:"hard-drive", nm:"Base", sub:"Linux platform under the GOSE shell", t:"info", val:"Batocera 43.1 (x86_64)"},
      {ic:"monitor", nm:"Graphics", sub:"How the picture is rendered", t:"info", val:"virtio-vga-gl · host GPU (virgl)"},
      {ic:"cpu", nm:"Processor", sub:"Cores allocated to the VM", t:"info", val:"—", live:"cpu"},
      {ic:"cpu", nm:"Memory", sub:"RAM in use", t:"info", val:"—", live:"mem"},
    ]},
  ];
  const AGENTS=[{n:"Wren",c:"var(--accent)",on:true},{n:"Ava",c:"var(--accent)",on:true},{n:"Iris",c:"#3a3e4c",on:false}];

  const rail=document.getElementById("rail"), pane=document.getElementById("pane"), toast=document.getElementById("toast");
  let cat=0, foc=0, zone="rail";   // two-pane: zone is "rail" (categories) or "pane" (settings)
  const _ci=CATS.findIndex(c=>c.id===(location.hash||"").replace("#",""));
  if(_ci>=0){ cat=_ci; zone="pane"; }   // deep-linked → land in the pane

  function buildRail(){
    rail.innerHTML="";
    CATS.forEach((c,ci)=>{
      const el=document.createElement("div");
      el.className="cat"+(ci===cat?" on":"")+(ci===cat&&zone==="rail"?" kf":"");
      el.innerHTML=`<span class="ic" data-i="${c.ic}"></span><span class="nm">${c.nm}</span>`;
      el.onclick=()=>{cat=ci;foc=0;zone="pane";render();};
      rail.appendChild(el);
    });
  }
  function valHtml(r){
    if(r.t==="info") return `<span class="val">${r.val}</span>`;
    if(r.t==="link") return `<span class="val">Open <span class="ic" data-i="chevron-right"></span></span>`;
    if(r.t==="action") return `<span class="val">${r.val} <span class="ic" data-i="chevron-right"></span></span>`;
    if(r.t==="agents") return `<span class="val agts">`+AGENTS.map(a=>
      `<b><span class="dot" style="background:${a.c}"></span>${a.n}${a.on?"":" <span class='off'>(off)</span>"}</b>`).join("")+`</span>`;
    const i=r.i||0, cur=r.v[i];
    const isOff=/^(off|disabled)$/i.test(cur);
    return `<span class="val"><span class="cy ic" data-i="chevron-left"></span>`+
      `<span class="${isOff?"off":""}">${cur}</span><span class="cy ic" data-i="chevron-right"></span></span>`;
  }
  function buildPane(){
    const c=CATS[cat];
    pane.innerHTML=`<div class="ph">${c.nm.toUpperCase()}</div>`;
    c.rows.forEach((r,ri)=>{
      const el=document.createElement("div");
      el.className="set"+(ri===foc&&zone==="pane"?" focus":"");
      el.innerHTML=`<span class="ic" data-i="${r.ic}"></span>`+
        `<div class="lbl"><div class="nm">${r.nm}</div><div class="sub">${r.sub}</div></div>`+valHtml(r);
      el.onclick=()=>{foc=ri;zone="pane";render();change();};
      pane.appendChild(el);
    });
  }
  function paintIcons(){document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}
  function render(){buildRail();buildPane();paintIcons();}
  function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>toast.classList.remove("show"),1600);}
  function post(url,body){return fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body||{})}).catch(()=>{});}
  function change(dir){
    const r=CATS[cat].rows[foc];
    if(r.t==="cycle"){r.i=((r.i||0)+(dir||1)+r.v.length)%r.v.length;buildPane();paintIcons();
      if(r.apply)applyRow(r); else showToast(r.nm+": "+r.v[r.i]);}
    else if(r.t==="theme"){r.i=((r.i||0)+(dir||1)+r.v.length)%r.v.length;
      const t=THEMES[r.i];document.documentElement.dataset.theme=t;localStorage.setItem("gose-theme",t);
      buildPane();paintIcons();showToast("Theme: "+r.v[r.i]);}
    else if(r.t==="link"){location.href=r.go;}
    else if(r.t==="agents"){showToast("Manage who can join (demo)");}
    else if(r.t==="action"){
      if(r.post){
        if(r.confirm && r._armed!==true){ r._armed=true; showToast("Press again to "+r.nm.toLowerCase());
          clearTimeout(r._t); r._t=setTimeout(()=>{r._armed=false;},2500); return; }
        r._armed=false; showToast(r.act||"OK"); post(r.post, r.body||{});
      } else showToast(r.act||"OK");
    }
    else if(r.t==="sys"){doSys(r);}
    else if(r.t==="info"){showToast(r.nm+": "+r.val);}
  }
  // System: backup / restore / factory reset — wired to the in-VM server endpoints
  let LATEST_BACKUP=null;
  function fmtSize(b){b=b||0;const u=["B","KB","MB","GB"];let i=0;
    while(b>=1024&&i<u.length-1){b/=1024;i++;}return b.toFixed(b<10&&i>0?1:0)+" "+u[i];}
  async function refreshBackups(){
    try{const x=await(await fetch("/system/backups",{cache:"no-store"})).json();
      const list=(x&&x.backups)||[]; LATEST_BACKUP=list[0]||null;
      setLive("backup", LATEST_BACKUP?(LATEST_BACKUP.file+" · "+fmtSize(LATEST_BACKUP.size))
                                     :"None yet — back up to create one");
    }catch(e){}
  }
  async function postJSON(url,body){
    try{const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body||{})});return await r.json();}catch(e){return null;}
  }
  async function doSys(r){
    if(r.op==="backup"){
      showToast("Backing up…");
      const x=await postJSON("/system/backup",{});
      if(x&&x.ok){showToast("Backup saved: "+x.file+" ("+fmtSize(x.size)+")");refreshBackups();}
      else showToast("Backup failed: "+((x&&x.error)||"error"));
    } else if(r.op==="restore"){
      if(!LATEST_BACKUP){showToast("No backup yet — back up first");return;}
      if(r._armed!==true){r._armed=true;showToast("Press again to restore "+LATEST_BACKUP.file);
        clearTimeout(r._t);r._t=setTimeout(()=>{r._armed=false;},3000);return;}
      r._armed=false;showToast("Restoring "+LATEST_BACKUP.file+"…");
      const x=await postJSON("/system/restore",{file:LATEST_BACKUP.file});
      showToast((x&&x.ok)?("Restored "+LATEST_BACKUP.file+" — restart to apply")
                         :("Restore failed: "+((x&&x.error)||"")));
    } else if(r.op==="reset"){
      if(r._armed!==true){r._armed=true;
        showToast("Reset wipes accounts & settings (keeps games). Press again to confirm");
        clearTimeout(r._t);r._t=setTimeout(()=>{r._armed=false;},3500);return;}
      r._armed=false;showToast("Resetting GOSE…");
      const x=await postJSON("/system/factory_reset",{confirm:"RESET"});
      if(x&&x.ok){showToast("GOSE reset — safety backup: "+(x.safety_backup||"none"));refreshBackups();}
      else showToast("Reset failed: "+((x&&x.error)||""));
    }
  }
  // wallpaper / timezone / clock-format actually persist + apply (desktop reads these)
  function applyRow(r){
    if(r.apply==="wp"){const i=r.i||0;localStorage.setItem("gose-wp",i);
      document.body.style.background=WALLS[i][1];document.body.style.backgroundAttachment="fixed";
      showToast("Wallpaper: "+WALLS[i][0]+" — applied to desktop");}
    else if(r.apply==="tz"){const i=r.i||0;localStorage.setItem("gose-tz",TZONES[i][1]);
      showToast("Time zone: "+TZONES[i][0]);}
    else if(r.apply==="clockfmt"){const f=(r.i===1)?"24":"12";localStorage.setItem("gose-clockfmt",f);
      showToast("Clock: "+(f==="24"?"24-hour":"12-hour"));}
    else if(r.apply==="live"){const names=["off","aurora","starfield","particles","nebula"];
      localStorage.setItem("gose-live",names[r.i||0]);showToast("Live wallpaper: "+r.v[r.i]);}
    else if(r.apply==="sounds"){const off=(r.i===1);localStorage.setItem("gose-sounds",off?"off":"on");
      showToast("UI sounds: "+(off?"Off":"On"));if(!off&&window.GOSE&&GOSE.sound)GOSE.sound("select");}
    else if(r.apply==="bt"){const on=(r.i===0);post("/bt",{action:"power",on});  // v:["On","Off"]
      showToast("Bluetooth: "+(on?"On":"Off"));}
    else if(r.apply==="airplane"){const on=(r.i===1);post("/bt",{action:"power",on:!on});  // v:["Off","On"]
      const bt=findRow("bt","apply"); if(bt)bt.i=on?1:0; buildPane(); paintIcons();
      showToast("Airplane mode: "+(on?"On — radios off":"Off"));}
    else if(r.apply==="perf"){const modes=["balanced","performance","battery"];post("/sys/perf",{mode:modes[r.i||0]});
      showToast("Power mode: "+r.v[r.i]);}
    else if(r.apply==="fps"){const on=(r.i===1);post("/game/fps",{on});  // v:["Off","On"]
      showToast("FPS counter: "+(on?"On — shows next game launch":"Off"));}
    else if(r.apply==="a11y_scale"){localStorage.setItem("gose-ui-scale",["1","1.15","1.3","1.5"][r.i||0]);a11y();showToast("Text size: "+r.v[r.i]);}
    else if(r.apply==="a11y_contrast"){localStorage.setItem("gose-contrast",r.i===1?"on":"off");a11y();showToast("High contrast: "+r.v[r.i]);}
    else if(r.apply==="a11y_bold"){localStorage.setItem("gose-bold",r.i===1?"on":"off");a11y();showToast("Bold text: "+r.v[r.i]);}
    else if(r.apply==="a11y_cb"){localStorage.setItem("gose-cb",["off","friendly","deut","prot","trit"][r.i||0]);a11y();showToast("Color filter: "+r.v[r.i]);}
    else if(r.apply==="a11y_motion"){localStorage.setItem("gose-motion",r.i===1?"on":"off");a11y();showToast("Reduce motion: "+r.v[r.i]);}
    else if(r.apply==="a11y_opaque"){localStorage.setItem("gose-opaque",r.i===1?"on":"off");a11y();showToast("Reduce transparency: "+r.v[r.i]);}
    else if(r.apply==="a11y_focus"){localStorage.setItem("gose-focus",r.i===1?"on":"off");a11y();showToast("Larger focus: "+r.v[r.i]);}
  }
  function a11y(){ if(window.GOSE&&GOSE.a11y)GOSE.a11y.apply(); }
  function findRow(tag,key){for(const c of CATS)for(const r of c.rows)if(r[key]===tag)return r;return null;}
  (function initPersist(){
    const wp=parseInt(localStorage.getItem("gose-wp")||"0",10), wi=isNaN(wp)?0:wp;
    const rw=findRow("wp","apply"); if(rw)rw.i=wi;
    document.body.style.background=WALLS[wi][1]; document.body.style.backgroundAttachment="fixed";
    const tz=localStorage.getItem("gose-tz"), rt=findRow("tz","apply");
    if(rt&&tz){const k=TZONES.findIndex(z=>z[1]===tz); if(k>=0)rt.i=k;}
    const rc=findRow("clockfmt","apply"); if(rc)rc.i=(localStorage.getItem("gose-clockfmt")==="24")?1:0;
    const rl=findRow("live","apply"); const lv=["off","aurora","starfield","particles","nebula"].indexOf(localStorage.getItem("gose-live"));
    if(rl&&lv>=0)rl.i=lv;
    const rsnd=findRow("sounds","apply"); if(rsnd)rsnd.i=(localStorage.getItem("gose-sounds")==="off")?1:0;
    const onoff=(k)=>localStorage.getItem(k)==="on"?1:0;
    const rsc=findRow("a11y_scale","apply"); if(rsc){const k=["1","1.15","1.3","1.5"].indexOf(localStorage.getItem("gose-ui-scale")||"1");rsc.i=k<0?0:k;}
    const rct=findRow("a11y_contrast","apply"); if(rct)rct.i=onoff("gose-contrast");
    const rbd=findRow("a11y_bold","apply"); if(rbd)rbd.i=onoff("gose-bold");
    const rcb=findRow("a11y_cb","apply"); if(rcb){const k=["off","friendly","deut","prot","trit"].indexOf(localStorage.getItem("gose-cb")||"off");rcb.i=k<0?0:k;}
    const rmo=findRow("a11y_motion","apply"); if(rmo)rmo.i=onoff("gose-motion");
    const rop=findRow("a11y_opaque","apply"); if(rop)rop.i=onoff("gose-opaque");
    const rfo=findRow("a11y_focus","apply"); if(rfo)rfo.i=onoff("gose-focus");
  })();
  // live readouts in Network / Power / About, pulled from the same /status.json the desktop uses
  function setLive(tag,val){let chg=false;
    for(const c of CATS)for(const r of c.rows)if(r.live===tag&&r.val!==val){r.val=val;chg=true;}
    if(chg&&CATS[cat].rows.some(r=>r.live===tag)){buildPane();paintIcons();}}
  async function pollLive(){
    try{const d=await(await fetch("/status.json",{cache:"no-store"})).json();
      try{const n=await(await fetch("/net.json",{cache:"no-store"})).json();
        setLive("net", n.connection?(n.connection+(n.online?" — online":" — connected")):(d.online?"Connected":"No internet"));
        setLive("wifi", n.has_wifi?"Adapter present — open to scan":"No Wi-Fi adapter (wired via host)");
      }catch(e){ setLive("net", d.online?"Connected":"No internet"); }
      setLive("bat", d.has_battery?(d.battery_pct+"%"+(d.charging?" · charging":" · on battery")):"No battery (desktop PC)");
      setLive("cpu", d.ok?(d.cpu_pct+"% load"):"—");
      setLive("mem", d.ok?(d.mem_used_gb+" / "+d.mem_total_gb+" GB ("+d.mem_pct+"%)"):"—");
      try{const f=await(await fetch("/game/fps",{cache:"no-store"})).json();   // sync the FPS-counter toggle to the real config
        const fr=findRow("fps","apply");
        if(fr && typeof f.on==="boolean"){const idx=f.on?1:0;
          if(fr.i!==idx){fr.i=idx; if(CATS[cat].id==="display"){buildPane();paintIcons();}}}
      }catch(e){}
      try{const b=await(await fetch("/bt/status",{cache:"no-store"})).json();   // sync the Bluetooth toggle to the real radio
        const br=findRow("bt","apply");
        if(br && b.adapter && typeof b.powered==="boolean"){const idx=b.powered?0:1;
          if(br.i!==idx){br.i=idx; if(CATS[cat].id==="btdev"){buildPane();paintIcons();}}}
      }catch(e){}
    }catch(e){}
  }
  pollLive(); setInterval(pollLive, 3000);
  refreshBackups();   // populate the System > Latest backup readout
  function moveCat(d){cat=(cat+d+CATS.length)%CATS.length;foc=0;render();}
  // tab-switch (L1/R1 + [ ] / Tab): change category AND drop focus into its content so D-pad moves within the tab
  function switchCat(d){cat=(cat+d+CATS.length)%CATS.length;foc=0;zone="pane";render();}
  function moveFoc(d){const n=CATS[cat].rows.length;foc=(foc+d+n)%n;buildPane();paintIcons();
    const f=pane.querySelector(".set.focus"); if(f)f.scrollIntoView({block:"nearest"});}

  function enterPane(){zone="pane";foc=0;render();}
  function toRail(){zone="rail";render();}
  addEventListener("keydown",e=>{const k=e.key;
    if(k==="Escape"){location.href="gose-home.html";}
    else if(k==="["||k==="PageUp"){switchCat(-1);}      // global tab prev → land in content
    else if(k==="]"||k==="PageDown"){switchCat(1);}      // global tab next → land in content
    else if(k==="Tab"){switchCat(e.shiftKey?-1:1);}
    else if(zone==="rail"){
      if(k==="ArrowDown")moveCat(1);
      else if(k==="ArrowUp")moveCat(-1);
      else if(k==="ArrowRight"||k==="Enter"||k===" ")enterPane();
      else return;
    } else {  // pane
      if(k==="ArrowDown")moveFoc(1);
      else if(k==="ArrowUp")moveFoc(-1);
      else if(k==="ArrowLeft")toRail();                            // ← always escapes back to the category list
      else if(k==="ArrowRight"||k==="Enter"||k===" ")change(1);
      else return;
    }
    e.preventDefault();});

  let prev={},primed=false;(function pad(){const gp=navigator.getGamepads&&[...navigator.getGamepads()].find(x=>x);
    if(gp){const tap=i=>primed&&gp.buttons[i]&&gp.buttons[i].pressed&&!prev[i];
      if(tap(5)){switchCat(1);} if(tap(4)){switchCat(-1);}   // L1/R1 switch tab → land in tab content (D-pad then moves within)
      if(zone==="rail"){
        if(tap(13))moveCat(1); if(tap(12))moveCat(-1);
        if(tap(15)||tap(0))enterPane();
        if(tap(1))location.href="gose-home.html";
      } else {
        if(tap(13))moveFoc(1); if(tap(12))moveFoc(-1);
        if(tap(15)||tap(0))change(1); if(tap(14))toRail();
        if(tap(1))toRail();
      }
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);primed=true;}
    requestAnimationFrame(pad);})();

  render();
</script>
<script src="assets/a11y.js"></script>
</body></html>
