<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Settings</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-500-normal.woff2) format('woff2');font-weight:500}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:14px;padding:20px 40px 8px}
  .lg{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 0 8px #9a5bff55)}
  .top h1{font-size:21px;margin:0}.top .s{color:var(--muted);font-size:12px}
  .home{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:8px 14px;font-size:13px;color:var(--muted)}
  .wrap{flex:1;display:flex;gap:18px;padding:8px 40px 0;min-height:0}
  .rail{width:230px;flex:none;display:flex;flex-direction:column;gap:6px;padding-top:6px}
  .cat{display:flex;align-items:center;gap:12px;height:46px;padding:0 14px;border-radius:11px;
    border:2px solid transparent;color:var(--muted);cursor:pointer}
  .cat .ic{font-size:20px}.cat .nm{font-weight:600;font-size:14px}
  .cat.on{background:var(--surface2);color:var(--text)}
  .cat.on .ic{color:var(--accent)}
  .cat.kf{border-color:var(--accent)!important;box-shadow:var(--focusglow)}
  .pane{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;overflow:auto}
  .ph{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);padding:10px 10px 6px}
  .set{display:flex;align-items:center;gap:14px;min-height:54px;padding:8px 14px;border-radius:11px;
    border:2px solid transparent;cursor:pointer}
  .set .ic{font-size:20px;color:#b8becc;flex:none}
  .set .lbl{min-width:0}.set .nm{font-weight:600}.set .sub{color:var(--muted);font-size:12px}
  .set .val{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--accent);
    font-weight:600;font-size:14px;white-space:nowrap}
  .set .val .cy{color:var(--muted);font-size:13px}
  .set .val.sld{gap:10px}
  .set .track{position:relative;width:120px;height:6px;border-radius:4px;background:var(--surface2);
    border:1px solid var(--line);overflow:hidden;cursor:pointer}
  .set .fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:4px}
  .set .pct{min-width:40px;text-align:right}
  .set.focus .track{box-shadow:var(--focusglow);border-color:var(--accent)}
  .set .off{color:var(--muted)}
  .set.focus{border-color:var(--accent);background:#5cd0ff14;box-shadow:var(--focusglow)}
  .set.focus .ic,.set.focus .nm{color:var(--accent)}
  .set.dim{opacity:.55}
  .set.dim .nm{color:var(--muted)}
  .agts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;white-space:normal}
  .agts b{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);
    border:1px solid var(--line);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .sw{width:13px;height:13px;border-radius:50%;display:inline-block;border:1px solid #ffffff44}
  .foot{margin:10px 40px 16px;display:flex;align-items:center;gap:10px;color:var(--muted);
    font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}.foot b{color:var(--text)}
  .toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--accent);border-radius:11px;padding:8px 16px;font-size:13px;opacity:0;
    transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  /* core picker modal — pad-drivable; layered-Escape per docs/27 §3.10 */
  .scrim{position:fixed;inset:0;background:#05050acc;display:none;align-items:center;justify-content:center;z-index:60}
  .scrim.show{display:flex}
  .modal{width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column;background:var(--surface);
    border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 80px #000a;overflow:hidden}
  .modal h2{margin:0;font-size:16px;padding:16px 18px 8px}
  .modal .mh{color:var(--muted);font-size:12px;padding:0 18px 10px;border-bottom:1px solid var(--line)}
  .modal .mf{border-top:1px solid var(--line);color:var(--muted);font-size:11px;padding:9px 18px}
  .modal .body{overflow:auto;padding:8px;min-height:0}
  .pick{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
    border:2px solid transparent;cursor:pointer}
  .pick.focus{border-color:var(--accent);background:#5cd0ff14;box-shadow:var(--focusglow)}
  .pick.dim{opacity:.5}
  .pick .nm{font-weight:600}
  .pick .meta{margin-left:auto;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .pick .lic{color:var(--muted);font-size:12px}
  .pick .cur{color:var(--accent);font-size:12px;font-weight:700}
  .badge{font-size:11px;font-weight:700;border-radius:8px;padding:2px 7px;border:1px solid var(--line);white-space:nowrap}
  .badge.ok{color:#37d39b}.badge.rev{color:#ffce5c}.badge.pu{color:#ff7a9c}
</style></head>
<body>
  <div class="top"><img class="lg" src="assets/brand/gose-crystal.png" alt="GOSE">
    <div><h1>Settings</h1><div class="s">GOSE · personalize, sound, network, time, power, privacy, accounts &amp; more</div></div>
    <div class="home"><span class="ic" data-i="layout-grid"></span><span>B / Esc — back</span></div>
  </div>
  <div class="wrap">
    <div class="rail" id="rail"></div>
    <div class="pane" id="pane"></div>
  </div>
  <div class="foot"><span class="ic" data-i="settings"></span> GOSE Settings
    <span class="h"><b>↑↓</b> move · <b>←→</b> change value · <b>L1/R1</b> section · <b>Esc</b> back</span></div>
  <div class="scrim" id="scrim"></div>
  <div class="toast" id="toast"></div>
<script src="assets/platform.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/sound.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const THEMES=["onyx","midnight","neon","aurora"];
  // accents — same palette the OOBE personalize step offers ("" = the theme's own color)
  const ACCENTS=[["Theme default",""],["Sky","#5cd0ff"],["Indigo","#7d8cff"],["Mint","#37d39b"],
    ["Rose","#ff7a9c"],["Gold","#ffce5c"],["Violet","#b388ff"]];
  // wallpapers — gradients so no asset files needed; the desktop reads the same map
  const WALLS=[
    ["Aurora (default)","radial-gradient(120% 90% at 50% -10%, #1a1f3a 0%, #0c0c1e 55%, #07070f 100%)"],
    ["Deep Space","radial-gradient(120% 90% at 70% 0%, #161033 0%, #0a0a18 60%, #050509 100%)"],
    ["Twilight","linear-gradient(160deg, #241634 0%, #131127 50%, #0a0a16 100%)"],
    ["Carbon","linear-gradient(160deg, #1c1c22 0%, #121216 60%, #0a0a0c 100%)"],
    ["Sunset","linear-gradient(165deg, #2a1730 0%, #1a1330 45%, #0c0c1e 100%)"],
    ["Forest","linear-gradient(160deg, #122318 0%, #0d1820 55%, #080c10 100%)"],
  ];
  // time zones — display label -> IANA id (drives the real desktop clock + batocera.conf)
  const TZONES=[
    ["Eastern — New York","America/New_York"],["Central — Chicago","America/Chicago"],
    ["Mountain — Denver","America/Denver"],["Pacific — Los Angeles","America/Los_Angeles"],
    ["UTC","UTC"],["London — GMT","Europe/London"],["Helsinki — EET","Europe/Helsinki"],
    ["Tokyo — JST","Asia/Tokyo"],
  ];
  // Row types: cycle (←/→ or A steps values) · slider (←/→ adjusts, A nudges) · link · action ·
  // info (A reads it back) · agents (live AI roster, A opens the Hub) · sys (backup ops) ·
  // dis (honestly disabled: a real backend doesn't exist yet — A explains why; never a dead toggle)
  const CATS=[
    {id:"personalize", ic:"palette", nm:"Personalization", rows:[
      {ic:"monitor", nm:"Wallpaper", sub:"Desktop background — applies to the GOSE home", t:"cycle", v:WALLS.map(w=>w[0]), apply:"wp"},
      {ic:"sparkles", nm:"Live wallpaper", sub:"Animated background — overrides the static wallpaper when on", t:"cycle", v:["Off","Aurora","Starfield","Particles","Nebula"], apply:"live"},
      {ic:"palette", nm:"Theme", sub:"Color scheme — canonical store, applies on every page incl. lock", t:"cycle", v:["Onyx","Midnight","Neon","Aurora"], apply:"theme"},
      {ic:"palette", nm:"Accent color", sub:"Your color (from setup or here) — applies OS-wide, survives reloads", t:"cycle", v:ACCENTS.map(a=>a[0]), apply:"accent"},
      {ic:"sparkles", nm:"Core glow", sub:"Glow around the GOSE Core centerpiece on the desktop", t:"cycle", v:["Soft","Bright","Off"], apply:"glow"},
      {ic:"moon", nm:"Appearance", sub:"Dark = Onyx, Light (beta) = Aurora — shorthand for the Theme row", t:"cycle", v:["Dark","Light (beta)"], apply:"appearance"},
    ]},
    {id:"a11y", ic:"eye", nm:"Accessibility", rows:[
      {ic:"eye", nm:"Text size", sub:"Make everything bigger — applies across the whole OS", t:"cycle", v:["Default","Large","Larger","Largest"], apply:"a11y_scale"},
      {ic:"sun", nm:"High contrast", sub:"Stronger text, colors and borders", t:"cycle", v:["Off","On"], apply:"a11y_contrast"},
      {ic:"monitor", nm:"Bold text", sub:"Heavier font weight everywhere", t:"cycle", v:["Off","On"], apply:"a11y_bold"},
      {ic:"palette", nm:"Color filters", sub:"Colorblind-friendly palette, or full-screen correction", t:"cycle", v:["Off","Friendly palette","Deuteranopia","Protanopia","Tritanopia"], apply:"a11y_cb"},
      {ic:"sparkles", nm:"Reduce motion", sub:"Stop animations and live wallpaper", t:"cycle", v:["Off","On"], apply:"a11y_motion"},
      {ic:"monitor", nm:"Reduce transparency", sub:"Make frosted panels solid", t:"cycle", v:["Off","On"], apply:"a11y_opaque"},
      {ic:"target", nm:"Larger focus outline", sub:"Thicker highlight on the selected item", t:"cycle", v:["Off","On"], apply:"a11y_focus"},
      {ic:"sparkles", nm:"First-time tips", sub:"Show one-time hints on new screens", t:"cycle", v:["On","Off"], apply:"tips"},
      {ic:"sparkles", nm:"Show tips again", sub:"Replay the one-time hints you've already seen", t:"action", val:"Reset", tips:true, act:"Tips reset — they'll show again on new screens"},
    ]},
    {id:"display", ic:"monitor", nm:"Display", rows:[
      {ic:"monitor", nm:"Mode", sub:"PC desktop, or Odin 2 handheld-console feel — pages adopt it as they load", t:"cycle", v:["PC desktop","Console (handheld)"], apply:"platform"},
      {ic:"monitor", nm:"Resolution", sub:"Real panel mode via xrandr — press twice to switch (it applies immediately)", t:"cycle", v:["1280 x 720"], apply:"resmode", confirm:true},
      {ic:"smartphone", nm:"Output", sub:"Where the picture goes — one virtual output on this VM", t:"dis", tag:"[needs hardware]", why:"The VM exposes a single virtual display; output switching needs real HDMI/dock hardware"},
      {ic:"sun", nm:"VSync", sub:"Tear-free in games (RetroArch) at a small latency cost — applies next launch", t:"cycle", v:["On","Off"], apply:"vsync"},
      {ic:"monitor", nm:"FPS counter", sub:"Show frames-per-second overlay in games — applies on next launch", t:"cycle", v:["Off","On"], apply:"fps"},
      {ic:"sun", nm:"Brightness", sub:"Display backlight — controls the real laptop panel (←/→ to adjust)", t:"slider", min:0, max:100, step:5, get:"/sys/brightness", post:"/sys/brightness", key:"level", live:"brightness"},
    ]},
    {id:"sound", ic:"volume-2", nm:"Sound", rows:[
      {ic:"volume-2", nm:"Output device", sub:"Where audio plays", t:"dis", tag:"[needs build]", why:"Output routing isn't built yet — audio follows the system default device"},
      {ic:"volume-2", nm:"Master volume", sub:"Real ALSA mixer level (←/→ to adjust)", t:"slider", min:0, max:100, step:5, get:"/sys/audio", post:"/sys/audio", key:"volume"},
      {ic:"bluetooth", nm:"Bluetooth audio", sub:"Pair wireless headphones / earbuds", t:"link", go:"gose-bluetooth.html"},
      {ic:"moon", nm:"Quiet mode", sub:"Silence ALL GOSE sounds — overrides the per-category levels", t:"cycle", v:["Off","On"], apply:"snd_quiet"},
      {ic:"power", nm:"System sounds", sub:"Boot, login, sleep / wake, shutdown & restart", t:"cycle", v:["Mute","25%","50%","75%","100%"], apply:"snd_system"},
      {ic:"bell", nm:"Notification sounds", sub:"Pings, downloads done, warnings & errors", t:"cycle", v:["Mute","25%","50%","75%","100%"], apply:"snd_notify"},
      {ic:"battery", nm:"Battery alerts", sub:"Charging, low & critical battery", t:"cycle", v:["Mute","25%","50%","75%","100%"], apply:"snd_battery"},
      {ic:"gamepad-2", nm:"UI & navigation sounds", sub:"Clicks and cursor feedback (auto-ducked while a game is open)", t:"cycle", v:["Mute","25%","50%","75%","100%"], apply:"snd_ui"},
      {ic:"music", nm:"Menu music", sub:"Shell soundtrack volume", t:"cycle", v:["Mute","25%","50%","75%","100%"], apply:"snd_music"},
    ]},
    {id:"net", ic:"wifi", nm:"Network & internet", rows:[
      {ic:"globe", nm:"Status", sub:"Active connection (live, via connman)", t:"info", val:"—", live:"net"},
      {ic:"wifi", nm:"Wi-Fi", sub:"Connect & manage known networks", t:"link", go:"gose-wifi.html", live:"wifi"},
      {ic:"plane", nm:"Airplane mode", sub:"VM: turns Bluetooth off — Wi-Fi rides the host laptop's radio", t:"cycle", v:["Off","On"], apply:"airplane"},
      {ic:"globe", nm:"Hostname", sub:"How the device is named on the network (live)", t:"info", val:"—", live:"host"},
      {ic:"shield", nm:"SSH (remote console)", sub:"Owner-gated remote console — manage it under Settings › Security", t:"link", go:"gose-settings.html#security"},
    ]},
    {id:"btdev", ic:"bluetooth", nm:"Bluetooth & devices", rows:[
      {ic:"bluetooth", nm:"Bluetooth", sub:"Wireless radio — pair controllers, audio & accessories", t:"cycle", v:["On","Off"], apply:"bt", live:"bt"},
      {ic:"search", nm:"Add device", sub:"Scan & pair a new controller, headset or accessory", t:"link", go:"gose-bluetooth.html"},
      {ic:"gamepad-2", nm:"My devices", sub:"Paired devices — connect, disconnect, remove", t:"link", go:"gose-bluetooth.html"},
      {ic:"target", nm:"Controllers & remap", sub:"Layout and button remapping", t:"link", go:"gose-remap.html"},
      {ic:"volume-2", nm:"Audio devices", sub:"Wireless headphones & earbuds", t:"link", go:"gose-bluetooth.html"},
    ]},
    {id:"controllers", ic:"gamepad-2", nm:"Controllers", rows:[
      {ic:"target", nm:"Layout & remap", sub:"Pick your controller and remap every button", t:"link", go:"gose-remap.html"},
      {ic:"gamepad-2", nm:"Controller test & latency", sub:"See what GOSE hears + measure input lag", t:"link", go:"gose-padtest.html"},
      {ic:"mouse", nm:"Stick deadzone", sub:"Override the bridge's stick deadzone", t:"dis", tag:"[needs build]", why:"Deadzone is a bridge constant (gose-pad-nav.py) — a settable override needs a bridge build"},
      {ic:"power", nm:"Rumble", sub:"Controller vibration feedback", t:"dis", tag:"[needs build]", why:"No OS-level rumble switch exists yet — games drive vibration directly"},
      {ic:"gamepad-2", nm:"Button prompts", sub:"Icon style shown in menus", t:"dis", tag:"[needs build]", why:"Menus don't render per-brand button icons yet, so a style picker would do nothing"},
    ]},
    {id:"input", ic:"keyboard", nm:"Input", rows:[
      {ic:"gamepad-2", nm:"Default input mode", sub:"What pages assume you navigate with — pages adopt it as they load", t:"cycle", v:["Keyboard","Controller","Native"], apply:"inputmode"},
      {ic:"keyboard", nm:"On-screen keyboard", sub:"Auto-opens on text fields", t:"dis", tag:"[needs build]", why:"The shared OSK is always available on text fields — an off switch needs cursor.js work"},
    ]},
    {id:"emulators", ic:"cpu", nm:"Emulators", rows:[
      // per-system default-core rows are loaded live from GET /emulators (loadCores); only
      // systems with >1 core get a picker. This placeholder shows until the catalog loads.
      {ic:"cpu", nm:"Default cores", sub:"Which emulator core each system runs by default", t:"info", val:"Loading…"},
    ]},
    {id:"time", ic:"clock", nm:"Time & Language", rows:[
      {ic:"globe", nm:"Set time zone automatically", sub:"Needs a location source", t:"dis", tag:"[needs build]", why:"No location source is wired (and it would be opt-in) — set the zone manually below"},
      {ic:"clock", nm:"Time zone", sub:"Desktop & lock clock live; the OS side (batocera.conf) applies at boot", t:"cycle", v:TZONES.map(z=>z[0]), apply:"tz"},
      {ic:"clock", nm:"Time format", sub:"How the clock reads", t:"cycle", v:["12-hour","24-hour"], apply:"clockfmt"},
      {ic:"globe", nm:"Region & language", sub:"Formats and on-screen language", t:"dis", tag:"[needs build]", why:"GOSE has no translation layer yet — English (US) is the only real language"},
    ]},
    {id:"power", ic:"battery", nm:"Power & Battery", rows:[
      {ic:"battery", nm:"Battery", sub:"Live from the host laptop (hidden on a desktop PC)", t:"info", val:"—", live:"bat"},
      {ic:"power", nm:"Power mode", sub:"CPU governor — applies where cpufreq exists (recorded on this VM)", t:"cycle", v:["Balanced","Performance","Battery saver"], apply:"perf"},
      {ic:"clock", nm:"Sleep after", sub:"Idle time before the screen sleeps", t:"dis", tag:"[needs build]", why:"No idle watcher exists yet — nothing would act on this timer"},
      {ic:"sun", nm:"Dim on battery", sub:"Lower brightness when unplugged", t:"dis", tag:"[needs build]", why:"Needs a battery watcher on the host bridge — not built yet"},
      {ic:"moon", nm:"Sleep now", sub:"Suspend the device (VM: simulated — no battery hardware)", t:"action", val:"sleep", post:"/sys/power", body:{action:"sleep"}, act:"Sleeping…"},
      {ic:"rotate-ccw", nm:"Restart", sub:"Reboot GOSE", t:"action", val:"restart", post:"/sys/power", body:{action:"restart"}, act:"Restarting…", confirm:true},
      {ic:"power", nm:"Shut down", sub:"Power off the device", t:"action", val:"shutdown", post:"/sys/power", body:{action:"shutdown"}, act:"Shutting down…", confirm:true},
    ]},
    {id:"privacy", ic:"shield", nm:"Privacy & Security", rows:[
      {ic:"shield", nm:"Require approval to join", sub:"An AI never self-elevates — you grant every tier (docs/16). No off switch by design.", t:"info", val:"Always on"},
      {ic:"lock", nm:"Lock on idle", sub:"Require unlock after sleep", t:"dis", tag:"[needs build]", why:"No idle watcher exists yet — lock manually from the desktop power menu"},
      {ic:"monitor", nm:"Allow screen capture", sub:"Never blocks captures & the replay buffer; Ask behaves as Always until prompts land", t:"cycle", v:["Ask","Always","Never"], apply:"cap", i:1},
      {ic:"image", nm:"Download missing cover art", sub:"Sends game names to thumbnails.libretro.com when on (opt-in, docs/24)", t:"cycle", v:["Off","On"], apply:"boxart"},
      {ic:"sparkles", nm:"Usage diagnostics", sub:"Records your choice — GOSE sends nothing today", t:"cycle", v:["Off","On"], apply:"diag"},
      {ic:"hard-drive", nm:"Clear UI data", sub:"Reset theme, accent, sounds & UI prefs to defaults (press twice) — games & saves untouched", t:"action", val:"clear", clear:true, confirm:true},
    ]},
    {id:"security", ic:"shield", nm:"Security", rows:[
      // Owner-only switches that change WHO can reach the device. An AI can never flip these —
      // the server gates them on an owner secret, not an AI tier (docs/16 + docs/31 SB-1).
      {ic:"shield", nm:"Owner-only controls", sub:"These switches change who can reach your device. Only you can flip them — an AI never can (docs/16/31).", t:"info", val:"Owner-gated"},
      {ic:"usb", nm:"SSH (remote console)", sub:"Off by default. Remote root console + file push over the network. You sign in with your device PIN/password — one credential, rate-limited.", t:"ssh2"},
    ]},
    {id:"accounts", ic:"users", nm:"Accounts", rows:[
      {ic:"user", nm:"You", sub:"Primary account on this device", t:"info", val:"—", live:"owner"},
      {ic:"sparkles", nm:"AI players", sub:"Paired agents & their access tier — manage in the AI Hub", t:"agents"},
      {ic:"users", nm:"Add account", sub:"More people / profiles on one device", t:"dis", tag:"[needs build]", why:"GOSE is single-owner today — multi-account needs the auth backend (docs/24 §1.5)"},
      {ic:"lock", nm:"Sign-in", sub:"What the lock screen asks for — real credential auth lands with docs/24 §1.5", t:"cycle", v:["None","PIN","Password"], apply:"signin"},
    ]},
    {id:"ai", ic:"sparkles", nm:"AI & Remote", rows:[
      {ic:"sparkles", nm:"AI access & players", sub:"Grant or revoke each AI's access — Observe / Play / Admin", t:"link", go:"gose-ai.html"},
      {ic:"plug-zap", nm:"Remote agent control", sub:"Master switch — Disabled refuses every new AI session join", t:"cycle", v:["Enabled","Disabled"], apply:"airemote", confirm:true},
      {ic:"users", nm:"Allowed agents", sub:"Who may join your session (live roster)", t:"agents"},
      {ic:"shield", nm:"Require approval to join", sub:"You grant every tier (docs/16). No off switch by design.", t:"info", val:"Always on"},
      {ic:"lock", nm:"Pairing token", sub:"Shown once, at pairing — rotate by revoke + re-pair in the AI Hub (docs/16)", t:"link", go:"gose-ai.html"},
      {ic:"volume-2", nm:"Voice", sub:"Agents speaking / listening in-session", t:"dis", tag:"[needs build]", why:"No voice pipeline exists in GOSE yet"},
    ]},
    {id:"system", ic:"hard-drive", nm:"System", rows:[
      {ic:"hard-drive", nm:"Storage", sub:"See what's using space & free it up", t:"link", go:"gose-storage.html"},
      {ic:"bell", nm:"Notifications", sub:"Review history · clear all · auto-DND in games", t:"link", go:"gose-home.html#notif"},
      {ic:"hard-drive", nm:"BIOS files", sub:"Check which systems need a BIOS", t:"link", go:"gose-bios.html"},
      {ic:"hard-drive", nm:"Latest backup", sub:"Most recent GOSE backup saved on this device", t:"info", val:"—", live:"backup"},
      {ic:"download", nm:"Back up GOSE", sub:"Save accounts, grants, favorites & settings to /userdata/backups — not your games or saves", t:"sys", op:"backup", val:"Back up"},
      {ic:"rotate-ccw", nm:"Restore", sub:"Roll GOSE back to the latest backup (press twice to confirm)", t:"sys", op:"restore", val:"Restore"},
      {ic:"triangle-alert", nm:"Reset GOSE", sub:"Wipe accounts, grants & settings to defaults — keeps your games and saves (press twice to confirm)", t:"sys", op:"reset", val:"Reset"},
    ]},
    {id:"about", ic:"info", nm:"About", rows:[
      {ic:"info", nm:"How to use GOSE", sub:"Controller guide — every button, in one screen", t:"link", go:"gose-help.html"},
      {ic:"info", nm:"GOSE", sub:"Gaming Operating System Emulator", t:"info", val:"—", live:"ver"},
      {ic:"hard-drive", nm:"Base", sub:"Linux platform under the GOSE shell", t:"info", val:"—", live:"base"},

    const onoff=(k)=>localStorage.getItem(k)==="on"?1:0;
    const rsc=findRow("a11y_scale","apply"); if(rsc){const k=["1","1.15","1.3","1.5"].indexOf(localStorage.getItem("gose-ui-scale")||"1");rsc.i=k<0?0:k;}
    const rct=findRow("a11y_contrast","apply"); if(rct)rct.i=onoff("gose-contrast");
    const rbd=findRow("a11y_bold","apply"); if(rbd)rbd.i=onoff("gose-bold");
    const rcb=findRow("a11y_cb","apply"); if(rcb){const k=["off","friendly","deut","prot","trit"].indexOf(localStorage.getItem("gose-cb")||"off");rcb.i=k<0?0:k;}
    const rmo=findRow("a11y_motion","apply"); if(rmo)rmo.i=onoff("gose-motion");
    const rop=findRow("a11y_opaque","apply"); if(rop)rop.i=onoff("gose-opaque");
    const rfo=findRow("a11y_focus","apply"); if(rfo)rfo.i=onoff("gose-focus");
  })();
  // live readouts in Network / Power / About, pulled from the same /status.json the desktop uses
  function setLive(tag,val){let chg=false;
    for(const c of CATS)for(const r of c.rows)if(r.live===tag&&r.val!==val){r.val=val;chg=true;}
    if(chg&&CATS[cat].rows.some(r=>r.live===tag)){buildPane();paintIcons();}}
  function rerowIf(id){ if(CATS[cat].id===id){buildPane();paintIcons();} }
  async function pollLive(){
    try{const d=await(await fetch("/status.json",{cache:"no-store"})).json();
      try{const n=await(await fetch("/net.json",{cache:"no-store"})).json();
        setLive("net", n.connection?(n.connection+(n.online?" — online":" — connected")):(d.online?"Connected":"No internet"));
        setLive("wifi", n.has_wifi?"Adapter present — open to scan":"No Wi-Fi adapter (wired via host)");
        if(n.hostname)setLive("host", n.hostname);
      }catch(e){ setLive("net", d.online?"Connected":"No internet"); }
      setLive("bat", d.has_battery?(d.battery_pct+"%"+(d.charging?" · charging":" · on battery")):"No battery (desktop PC)");
      setLive("cpu", d.ok?(d.cpu_pct+"% load"):"—");
      setLive("mem", d.ok?(d.mem_used_gb+" / "+d.mem_total_gb+" GB ("+d.mem_pct+"%)"):"—");
      try{const f=await(await fetch("/game/fps",{cache:"no-store"})).json();   // sync the FPS-counter toggle to the real config
        const fr=findRow("fps","apply");
        if(fr && typeof f.on==="boolean"){const idx=f.on?1:0;
          if(fr.i!==idx){fr.i=idx; rerowIf("display");}}
      }catch(e){}
      try{const b=await(await fetch("/bt/status",{cache:"no-store"})).json();   // sync the Bluetooth toggle to the real radio
        const br=findRow("bt","apply");
        if(br && b.adapter && typeof b.powered==="boolean"){const idx=b.powered?0:1;
          if(br.i!==idx){br.i=idx; rerowIf("btdev");}}
      }catch(e){}
    }catch(e){}
  }
  // one-shot loads: real backend state into the rows that mirror it
  (async function initBackend(){
    try{const s=await(await fetch("/security/ssh",{cache:"no-store"})).json();
      let r=null; for(const c of CATS)for(const rr of c.rows)if(rr.t==="ssh2"){r=rr;break;}
      if(r&&s&&s.ok){r.enabled=!!s.enabled; rerowIf("security");}}catch(e){}
    try{const v=await(await fetch("/sys/vsync",{cache:"no-store"})).json();
      const r=findRow("vsync","apply"); if(r&&v&&v.ok){r.i=v.on?0:1; rerowIf("display");}}catch(e){}
    try{const d=await(await fetch("/sys/display",{cache:"no-store"})).json();
      const r=findRow("resmode","apply");
      if(r&&d&&d.ok&&d.modes&&d.modes.length){r.v=d.modes.map(m=>m.replace("x"," x "));
        const k=d.mode?d.modes.indexOf(d.mode):-1; r.i=k<0?0:k; rerowIf("display");}}catch(e){}
    try{const p=await(await fetch("/privacy",{cache:"no-store"})).json();
      if(p&&p.ok&&p.privacy){const c=findRow("cap","apply");
        if(c){const k=["ask","always","never"].indexOf(p.privacy.screen_capture||"always");c.i=k<0?1:k;}
        const b=findRow("boxart","apply"); if(b)b.i=p.privacy.boxart_scrape?1:0;
        const g=findRow("diag","apply"); if(g)g.i=p.privacy.diagnostics?1:0; rerowIf("privacy");}}catch(e){}
    try{const o=await(await fetch("/oobe/status",{cache:"no-store"})).json();
      const u=o&&o.owner; if(u)setLive("owner",(u.username||u.display||"Owner")+" — owner");
      else setLive("owner","Owner (run first-time setup)");}catch(e){}
    try{const v=await(await fetch("/version",{cache:"no-store"})).json();
      if(v&&v.version){setLive("ver","v"+v.version+(v.build?(" · "+v.build):""));
        if(v.base)setLive("base",v.base);}}catch(e){}
  })();
  async function refreshAgents(){
    try{const d=await(await fetch("/ai/grants",{cache:"no-store"})).json();
      const g=(d&&d.grants)||{};
      AGENTS=Object.keys(g).sort().map(n=>({n,tier:(g[n].tier||"observe")}));
      if(CATS[cat].rows.some(r=>r.t==="agents")){buildPane();paintIcons();}}catch(e){}
  }
  pollLive(); setInterval(pollLive, 3000);
  loadSliders(); setInterval(loadSliders, 3000);   // keep brightness + volume synced to the real device
  refreshBackups();   // populate the System > Latest backup readout
  refreshAgents(); setInterval(refreshAgents, 6000);   // live AI roster for the agents rows
  loadCores();   // build the per-system default-core rows (Emulators category) from /emulators
  function moveCat(d){cat=(cat+d+CATS.length)%CATS.length;foc=0;render();}
  // tab-switch (L1/R1 + [ ] / Tab): change category AND drop focus into its content so D-pad moves within the tab
  function switchCat(d){cat=(cat+d+CATS.length)%CATS.length;foc=0;zone="pane";render();}
  function moveFoc(d){const n=CATS[cat].rows.length;foc=(foc+d+n)%n;buildPane();paintIcons();
    const f=pane.querySelector(".set.focus"); if(f)f.scrollIntoView({block:"nearest"});}

  function enterPane(){zone="pane";foc=0;render();}
  function toRail(){zone="rail";render();}

  // ===== Per-system default-core picker (tasks 55+77) =====
  // Rows are built live from GET /emulators (license-aware, same catalog the store's Emulators
  // tab shows). A opens a pad-drivable picker; pick -> POST /emulators/default; row reflects.
  // Only systems with >1 core get a picker (a single-core system has nothing to choose).
  const scrim=document.getElementById("scrim");
  scrim.onclick=(e)=>{if(e.target===scrim){if(SSH.open)closeSshModal();else closeCorePicker();}};   // click the backdrop to dismiss
  const PICK={open:false,row:null,foc:0};
  async function loadCores(){
    try{const d=await(await fetch("/emulators",{cache:"no-store"})).json();
      const sys=(d&&d.systems)||[]; const ec=CATS.find(c=>c.id==="emulators"); if(!ec)return;
      const rows=[];
      sys.forEach(s=>{
        // es_systems lists the same core under multiple emulator labels → dedupe by core name,
        // so "two identical mame entries" isn't mistaken for a real choice.
        const seen={}, cores=[];
        (s.cores||[]).forEach(c=>{ const e=seen[c.core];
          if(e){ if(c.installed)e.installed=true; if(c.active)e.active=true; }
          else { seen[c.core]=Object.assign({},c); cores.push(seen[c.core]); } });
        if(cores.length<2)return;   // need a real choice between distinct cores
        rows.push({ic:"cpu", nm:s.name, sub:"Default emulator core for "+s.name, t:"core",
                   system:s.system, cores:cores, cur:s.default}); });
      ec.rows = rows.length ? rows
        : [{ic:"info", nm:"No alternate cores", sub:"Every installed system has a single core — add more in the Store.", t:"info", val:"—"}];
      if(CATS[cat] && CATS[cat].id==="emulators"){ if(foc>=ec.rows.length)foc=0; buildPane(); paintIcons(); }
    }catch(e){}
  }
  function coreBadge(c){
    if(c.verdict==="review") return `<span class="badge rev">Review</span>`;
    if(c.commercial_ok) return `<span class="badge ok">Commercial-OK</span>`;
    return `<span class="badge pu">Personal-use</span>`;   // non-commercial — fenced, but user may run it
  }
  function openCorePicker(r){
    if(!r.cores||!r.cores.length)return;
    PICK.open=true; PICK.row=r;
    PICK.foc=Math.max(0,r.cores.findIndex(c=>c.core===r.cur));
    if(window.GOSE&&GOSE.modalPush)GOSE.modalPush(); else document.body.dataset.goseModal="1";  // docs/27 §3.10
    renderPicker(); scrim.classList.add("show");
  }
  function closeCorePicker(){
    if(!PICK.open)return; PICK.open=false; scrim.classList.remove("show");
    if(window.GOSE&&GOSE.modalPop)GOSE.modalPop(); else delete document.body.dataset.goseModal;
  }
  function renderPicker(){
    const r=PICK.row, cs=r.cores||[];
    scrim.innerHTML=`<div class="modal" role="dialog" aria-modal="true">`+
      `<h2>Default core — ${r.nm}</h2>`+
      `<div class="mh">↑↓ choose · A set · B / Esc back — uninstalled cores: add them in the Store first</div>`+
      `<div class="body" id="pickbody"></div>`+
      `<div class="mf">Commercial-OK ships in the paid build · Personal-use cores are non-commercial-licensed (anyone may add them for their own use)</div>`+
    `</div>`;
    const body=scrim.querySelector("#pickbody");
    cs.forEach((c,i)=>{ const el=document.createElement("div");
      el.className="pick"+(i===PICK.foc?" focus":"")+(c.installed?"":" dim");
      el.innerHTML=`<span class="nm">${c.core}</span><span class="meta">`+
        (c.core===r.cur?`<span class="cur">current</span>`:``)+
        (c.installed?``:`<span class="lic">not installed</span>`)+
        `<span class="lic">${c.license}</span>`+coreBadge(c)+`</span>`;
      el.onclick=()=>{PICK.foc=i;chooseCore();};
      body.appendChild(el); });
    const f=body.querySelector(".pick.focus"); if(f)f.scrollIntoView({block:"nearest"});
  }
  function pickMove(d){const n=(PICK.row.cores||[]).length; if(!n)return;
    PICK.foc=(PICK.foc+d+n)%n; renderPicker();}
  function pickChoose(){chooseCore();}
  async function chooseCore(){
    const r=PICK.row, c=(r.cores||[])[PICK.foc]; if(!c)return;
    if(!c.installed){showToast(c.core+" isn't installed — add it in the Store first");return;}
    if(c.core===r.cur){closeCorePicker();return;}
    showToast("Setting "+r.nm+" → "+c.core+"…");
    const x=await postJSON("/emulators/default",{system:r.system,core:c.core});
    if(x&&x.ok){ r.cur=x.core; r.cores.forEach(cc=>cc.active=(cc.core===x.core));
      closeCorePicker();
      if(CATS[cat] && CATS[cat].id==="emulators"){buildPane();paintIcons();}
      showToast(r.nm+" default core: "+x.core+(x.warn?(" — "+x.warn):""));
    } else showToast("Couldn't set core: "+((x&&x.error)||"failed"));
  }
  // ===== Owner-gated SSH (Security, docs/31 SB-1 + #87 unify) =====
  // The toggle is just the front-end; the SERVER refuses any enable/disable that can't prove
  // owner identity (the device PIN, or the dev/owner token) — so an AI can never flip SSH.
  // THE UNIFY (#87): enabling sets the SSH/root credential to the SAME device PIN/password you just
  // signed in with — sign in with X, SSH with X. No separate password is generated or shown. If that
  // PIN is short & numeric we warn (weak for remote SSH) but let you proceed. Auth is rate-limited.
  const SSH={open:false,row:null,state:"view",foc:0,items:[],pinSet:false,busy:false,pin:null,info:null};
  async function openSshModal(r){
    SSH.open=true; SSH.row=r; SSH.state="view"; SSH.foc=0; SSH.pin=null; SSH.info=null; SSH.busy=false;
    if(window.GOSE&&GOSE.modalPush)GOSE.modalPush(); else document.body.dataset.goseModal="1"; // docs/27 §3.10
    try{const s=await(await fetch("/security/ssh",{cache:"no-store"})).json();
      if(s&&s.ok){r.enabled=!!s.enabled;}}catch(e){}
    try{const ps=await(await fetch("/auth/pin",{cache:"no-store"})).json(); SSH.pinSet=!!(ps&&ps.set);}catch(e){SSH.pinSet=false;}
    sshRender(); scrim.classList.add("show");
  }
  function closeSshModal(){ if(!SSH.open)return; SSH.open=false; SSH.pin=null; SSH.info=null; scrim.classList.remove("show");
    if(window.GOSE&&GOSE.modalPop)GOSE.modalPop(); else delete document.body.dataset.goseModal;
    buildPane(); paintIcons(); }
  function sshItems(){
    const on=SSH.row&&SSH.row.enabled===true;
    if(SSH.state==="result") return [{label:"Done",act:"close"}];
    if(SSH.state==="auth")   return [{label:"Confirm",act:"confirm",kind:"primary"},{label:"Cancel",act:"close"}];
    if(SSH.state==="warn")   return [{label:"Enable anyway",act:"proceed",kind:"warn"},{label:"Cancel",act:"close"}];
    if(SSH.state==="nopin")  return [{label:"Open Accounts → Sign-in",act:"toaccounts"},{label:"Cancel",act:"close"}];
    return [{label:(on?"Disable SSH":"Enable SSH"),act:(on?"disable":"enable"),kind:on?"":"warn"},{label:"Cancel",act:"close"}];
  }
  function sshRender(){
    const on=SSH.row&&SSH.row.enabled===true; SSH.items=sshItems();
    if(SSH.foc>=SSH.items.length)SSH.foc=0;
    const warnBox=(msg)=>`<div style="margin:10px 8px;padding:11px 13px;border:1px solid var(--accent);`+
      `border-radius:10px;background:var(--surface2);font-size:13px;line-height:1.5">⚠ ${msg}</div>`;
    let head="", body="";
    if(SSH.state==="result"){
      const i=SSH.info||{};
      head="SSH is on — use your device PIN";
      body=`<div class="mh">Network SSH is enabled. Log in as <b>root</b> with <b>your device sign-in PIN/password</b> — `+
        `the same one you unlock GOSE with. There's no separate password to copy, and GOSE stores none.</div>`+
        (i.weak_credential?warnBox(i.weak_warning||"Your PIN is short — weak for remote SSH."):"")+
        `<div class="mh" style="opacity:.8">Auth is rate-limited (${(i.ssh_rate_limit_args||"-T "+(i.auth_max_tries||3))}). `+
        `Turn SSH off here when you're done.</div>`;
    } else if(SSH.state==="auth"){
      head="Confirm it's you";
      body=`<div class="mh">Enter your device PIN to ${on?"disable":"enable"} network SSH. Only the owner can.`+
        `${on?"":" Enabling makes <b>this PIN</b> your remote SSH login — one credential."}</div>`+
        `<input id="sshpin" type="password" inputmode="numeric" autocomplete="off" data-osk-primary `+
        `placeholder="Device PIN" style="width:calc(100% - 16px);margin:8px;padding:11px 12px;border-radius:10px;`+
        `border:2px solid var(--line);background:var(--surface2);color:var(--text);font-size:16px">`;
    } else if(SSH.state==="warn"){
      head="Short PIN — weak for remote SSH";
      body=warnBox("Your device PIN is short and numeric. As a <b>remote SSH</b> login it can be brute-forced "+
        "over the network. A longer sign-in password or an SSH key is far stronger. Auth is rate-limited, "+
        "but you can also set a longer Sign-in password under Accounts.")+
        `<div class="mh">Enable SSH with this PIN anyway?</div>`;
    } else if(SSH.state==="nopin"){
      head="Set a sign-in PIN first";
      body=`<div class="mh">Network SSH exposes remote root, so only the owner may turn it on. `+
        `Set a device sign-in PIN (Accounts → Sign-in) so GOSE can confirm it's you — and so SSH has a `+
        `credential — then come back here.</div>`;
    } else {
      head="Remote SSH access";
      body=`<div class="mh">SSH is <b>${on?"ON":"OFF"}</b>. ${on?"Anyone with your device PIN/password can reach a root console over the network.":"Enabling exposes a remote root console. You'll sign in with your <b>device PIN/password</b> — one credential, no separate password. Auth is rate-limited."}</div>`;
    }
    scrim.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><h2>${head}</h2>${body}`+
      `<div class="body" id="sshbody"></div>`+
      `<div class="mf">Owner-only (docs/16/31) — an AI can never enable SSH. ↑↓ choose · A select · B / Esc back</div></div>`;
    const b=scrim.querySelector("#sshbody");
    SSH.items.forEach((it,i)=>{const el=document.createElement("div");
      el.className="pick"+(i===SSH.foc?" focus":"");
      el.innerHTML=`<span class="nm">${it.label}</span>`+(it.kind==="warn"?`<span class="meta"><span class="badge rev">caution</span></span>`:``);
      el.onclick=()=>{SSH.foc=i;sshActivate();}; b.appendChild(el);});
    paintIcons();
    if(SSH.state==="auth"){const pin=scrim.querySelector("#sshpin");
      if(pin){pin.onkeydown=(ev)=>{if(ev.key==="Enter"){ev.preventDefault();sshDo("confirm");}};
        try{pin.focus();}catch(e){}}}
  }
  function sshMove(d){const n=SSH.items.length; if(!n)return; SSH.foc=(SSH.foc+d+n)%n; sshRender();}
  function sshActivate(){const it=SSH.items[SSH.foc]; if(it)sshDo(it.act);}
  // client-side mirror of the server's _credential_is_weak: a short (<=6) all-numeric PIN is weak
  // for REMOTE SSH. We warn before submitting so it's the owner's informed choice (docs/31); the
  // server returns weak_credential as a backstop too.
  const sshWeak=(pin)=>/^\d{1,6}$/.test(pin||"");
  async function sshSubmit(action,pin){
    if(SSH.busy)return; SSH.busy=true;
    const x=await postJSON("/security/ssh",{action,pin});
    SSH.busy=false; SSH.pin=null;
    if(x&&x.ok){
      SSH.row.enabled=!!x.enabled;
      if(action==="enable"){SSH.info=x;SSH.state="result";SSH.foc=0;sshRender();}
      else {showToast("SSH "+(x.enabled?"enabled":"disabled"));closeSshModal();}
    } else if(x&&x.code==="ERR_NOT_OWNER"){showToast("Owner authorization required");}
    else {showToast("SSH: "+((x&&x.error)||"failed"));}
  }
  async function sshDo(act){
    if(SSH.busy)return;
    if(act==="close")return closeSshModal();
    if(act==="toaccounts"){closeSshModal();location.href="gose-settings.html#accounts";return;}
    if(act==="enable"||act==="disable"){
      if(!SSH.pinSet){SSH.state="nopin";SSH.foc=0;sshRender();return;}
      SSH._pending=act; SSH.state="auth"; SSH.foc=0; sshRender(); return;
    }
    if(act==="confirm"){
      const pin=(scrim.querySelector("#sshpin")||{}).value||"";
      if(!pin){showToast("Enter your device PIN");return;}
      const action=SSH._pending||"enable";
      SSH.pin=pin;
      if(action==="enable"&&sshWeak(pin)){   // weak PIN -> warn first, but let the owner proceed
        SSH.state="warn"; SSH.foc=0; sshRender(); return;
      }
      await sshSubmit(action,pin);
    }
    if(act==="proceed"){   // owner chose to enable despite the short-PIN warning
      const pin=SSH.pin; if(!pin){closeSshModal();return;}
      await sshSubmit(SSH._pending||"enable",pin);
    }
  }
  // Pad nav per docs/27: L1/R1 own section switching; ←/→ change the focused value
  // (← NEVER jumps to the rail — the rail double-drove tab switching, owner walkthrough
  // 2026-06-07); B/Esc backs out one level (pane → rail → desktop) and never traps.
  addEventListener("keydown",e=>{
    let k=e.key; if(/^(Up|Down|Left|Right)$/.test(k))k="Arrow"+k;   // accept both spellings (docs/27 §3.8)
    if(SSH.open){   // SSH modal owns the pad while open (docs/27 §3.10)
      const onPin=document.activeElement&&document.activeElement.id==="sshpin";
      if(k==="Escape"||k==="Backspace"){closeSshModal();}
      else if(onPin){return;}   // typing the PIN — let the field/OSK have the keys
      else if(k==="ArrowDown")sshMove(1);
      else if(k==="ArrowUp")sshMove(-1);
      else if(k==="Enter"||k===" "||k==="ArrowRight")sshActivate();
      else return;
      e.preventDefault();e.stopPropagation();return;
    }
    if(PICK.open){   // core picker modal owns the whole pad while open (docs/27 §3.10)
      if(k==="Escape"||k==="Backspace")closeCorePicker();
      else if(k==="ArrowDown")pickMove(1);
      else if(k==="ArrowUp")pickMove(-1);
      else if(k==="Enter"||k===" "||k==="ArrowRight")pickChoose();
      else return;
      e.preventDefault();e.stopPropagation();return;
    }
    if(k==="Escape"||k==="Backspace"){ if(zone==="pane")toRail(); else location.href="gose-home.html"; }
    else if(k==="["||k==="PageUp"){switchCat(-1);}      // global tab prev → land in content
    else if(k==="]"||k==="PageDown"){switchCat(1);}      // global tab next → land in content
    else if(k==="Tab"){switchCat(e.shiftKey?-1:1);}
    else if(zone==="rail"){
      if(k==="ArrowDown")moveCat(1);
      else if(k==="ArrowUp")moveCat(-1);
      else if(k==="ArrowRight"||k==="Enter"||k===" ")enterPane();
      else return;
    } else {  // pane
      const fr=CATS[cat].rows[foc];
      if(k==="ArrowDown")moveFoc(1);
      else if(k==="ArrowUp")moveFoc(-1);
      else if(fr&&fr.t==="slider"&&k==="ArrowLeft")adjSlider(fr,-1);   // ←/→ adjust a focused slider in place
      else if(fr&&fr.t==="slider"&&k==="ArrowRight")adjSlider(fr,1);
      else if(k==="ArrowLeft"){if(fr&&fr.t==="cycle")change(-1);}      // cycle back; left edge of anything else = nothing
      else if(k==="ArrowRight"||k==="Enter"||k===" ")change(1);
      else return;
    }
    e.preventDefault();});

  // No raw-gamepad poll — the bridge (gose-pad-nav.py) synthesizes the keys above;
  // a page-level getGamepads() loop is a second input path that double-fires (docs/27).

  render();
</script>
<script src="assets/a11y.js"></script>
