<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Library</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:12px;padding:18px 36px 6px}
  .top img{width:34px;height:34px}.top h1{font-size:20px;margin:0}
  .top .s{color:var(--muted);font-size:12px}
  .top .home{margin-left:auto;color:var(--muted);font-size:13px}
  .wrap{flex:1;display:flex;gap:16px;padding:6px 36px 0;min-height:0}
  .rail{width:210px;flex:none;overflow:auto;padding-top:4px}
  .sys{display:flex;align-items:center;justify-content:space-between;gap:8px;height:42px;padding:0 14px;
    border-radius:11px;border:2px solid transparent;color:var(--muted);cursor:pointer}
  .sys .n{font-weight:600;font-size:14px}.sys .c{font-size:11px;background:#ffffff12;border-radius:9px;padding:1px 7px}
  .sys.on{background:var(--surface2);color:var(--text)}
  .pane{flex:1;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;overflow:auto}
  .ph{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);padding:4px 4px 10px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .game{cursor:pointer}
  .game .art{position:relative;height:120px;border-radius:10px;border:2px solid transparent;display:flex;align-items:flex-end;
    padding:8px;font-weight:700;font-size:13px;color:#fff;text-shadow:0 1px 4px #000a}
  .game.focus .art{border-color:var(--accent);box-shadow:var(--focusglow)}
  .game .fav{position:absolute;top:5px;right:8px;color:#ffd23f;font-size:16px;text-shadow:0 1px 3px #000}
  .game .resume{position:absolute;top:6px;left:6px;font-size:10px;font-weight:700;color:#eaf0ff;
    background:#06121acc;border:1px solid #ffffff2a;border-radius:7px;padding:2px 6px}
  .game .sub{color:var(--muted);font-size:11px;margin-top:5px}
  .empty{color:var(--muted);font-size:14px;padding:30px}
  /* pad-reachable game actions (docs/27 §3.5 — X/Y/letters are keyboard-only): the tiles
     live at the END of the grid's focus space, act on the last-focused game */
  .acts{display:flex;gap:10px;margin-top:16px}
  .acts .ab{display:flex;align-items:center;gap:8px;background:var(--surface2);border:2px solid var(--line);
    border-radius:11px;padding:10px 14px;font-weight:600;font-size:13px;cursor:pointer;max-width:240px}
  .acts .ab .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acts .ab:hover{border-color:var(--accent)}
  .acts .ab.focus{border-color:var(--accent);box-shadow:var(--focusglow,0 0 0 2px var(--accent))}
  .foot{margin:8px 36px 14px;display:flex;gap:10px;color:var(--muted);font-size:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}.foot b{color:var(--text)}
  .toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--accent);border-radius:11px;padding:9px 16px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .gopt{position:fixed;inset:0;background:#06060cd8;display:none;align-items:center;justify-content:center;z-index:60;backdrop-filter:blur(6px)}
  .gopt.on{display:flex}
  .gopt .box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px;width:480px;max-width:92vw;max-height:84vh;overflow:auto}
  .gopt h3{margin:0 0 3px;font-size:17px}.gopt .gs{color:var(--muted);font-size:12px;margin-bottom:6px}
  .gopt .sec{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin:13px 0 5px}
  .gopt .opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border:2px solid transparent;border-radius:10px;background:#ffffff06}
  .gopt .opt.focus{border-color:var(--accent);background:#5cd0ff14}
  .gopt .opt .nm{flex:1;font-weight:600;font-size:14px}.gopt .opt .v{color:var(--accent);font-weight:700;font-size:13px}
  .gopt .opt .chk{color:#3fe0a0;font-weight:700;font-size:15px}
  .gopt .save{margin-top:14px;text-align:center;font-weight:700;background:var(--accent);color:#06121a;border-radius:10px;padding:10px;border:2px solid transparent}
  .gopt .save.focus{box-shadow:var(--focusglow);border-color:#fff}
</style></head>
<body>
  <div class="top"><img src="assets/brand/gose-crystal.png" alt="GOSE">
    <div><h1>Library</h1><div class="s" id="sub">scanning your games…</div></div>
    <div class="home"><span class="ic" data-i="library"></span> B / Esc — home</div>
  </div>
  <div class="wrap"><div class="rail" id="rail"></div><div class="pane" id="pane"></div></div>
  <div class="foot"><span class="ic" data-i="games"></span> GOSE Library
    <span class="h">D-pad move · <b>A</b> launch/activate · <b>L1/R1</b> system · <b>B</b> home · tiles: Fetch art · kbd: <b>F</b> fav · <b>O</b> options · <b>S</b> scrape all</span></div>
  <div class="toast" id="toast"></div>
  <div class="gopt" id="gopt"><div class="box" id="gopt-box"></div></div>
<script src="assets/platform.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const COLORS=["#3a5fb0","#7a4ab0","#5a6b3a","#3a86b0","#b0683a","#3ab08a","#b03a6b","#6a4dff"];
  const rail=document.getElementById("rail"),pane=document.getElementById("pane"),toast=document.getElementById("toast"),$=id=>document.getElementById(id);
  let SYS=[],cat=0,foc=0;
  function say(m){toast.textContent=m;toast.classList.add("show");clearTimeout(say._t);say._t=setTimeout(()=>toast.classList.remove("show"),1600);}
  function fmtPlay(s){if(!s)return"new";var m=Math.round(s/60);if(m<1)return"<1m";if(m<60)return m+"m played";return Math.floor(m/60)+"h "+(m%60)+"m played";}
  function fmtPlayDetail(s){if(!s||s<60)return"0h played";var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?""+h+"h "+m+"m played":""+m+"m played";}
  function fmtDate(t){if(!t)return"";var d=new Date(t*1000),n=new Date(),diff=n-d;if(diff<86400000)return"today";if(diff<172800000)return"yesterday";return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});}
  // Weekly total: sum sessions from the last 7 days is not tracked per-session, so we derive
  // an approximate from playtime_s per game vs last_played (honest: shows total, not weekly).
  function totalHours(games){var s=games.reduce((a,g)=>a+(g.playtime_s||0),0);return Math.round(s/360)/10;}
  function paint(){if(window.GICON){GICON.paint(document);return;}document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}
  function buildRail(){rail.innerHTML=SYS.map((s,i)=>
    `<div class="sys ${i===cat?'on':''}" data-i2="${i}"><span class="n">${s.logo?`<img src="${s.logo}" alt="" style="height:13px;width:auto;max-width:104px;vertical-align:-2px;margin-right:7px;opacity:.9" onerror="this.remove()">`:''}${s.name}</span><span class="c">${s.games.length}</span></div>`).join("");
    [...rail.children].forEach(el=>el.onclick=()=>{cat=+el.dataset.i2;foc=0;render();});}
  // focus space = games 0..N-1 then the action tiles (favorite=N, fetch-art=N+1, options=N+2,
  // scrape-all=N+3); the tiles act on the LAST-FOCUSED game (named on the tile so it's never ambiguous)
  let lastG=0;
  function nGames(){const s=SYS[cat];return s?s.games.length:0;}
  function total(){return nGames()+4;}
  function tgtGame(){const s=SYS[cat];if(!s)return null;return s.games[Math.min(lastG,s.games.length-1)]||null;}
  function buildPane(){const s=SYS[cat]; if(!s){pane.innerHTML='<div class="empty">No games found. Drop ROMs into /userdata/roms/&lt;system&gt;.</div>';return;}
    if(foc<s.games.length)lastG=foc;
    const gm0=tgtGame(), nm0=gm0?gm0.name:"";
    pane.innerHTML=`<div class="ph">${s.logo?`<img src="${s.logo}" alt="${s.name}" style="height:26px;width:auto;max-width:220px;vertical-align:-7px;margin-right:11px" onerror="this.replaceWith(document.createTextNode('${s.name.toUpperCase()} '))">`:s.name.toUpperCase()+' '}— ${s.games.length} GAME${s.games.length!=1?'S':''}</div><div class="grid" id="grid"></div>`+
      `<div class="acts">`+
      `<div class="ab ${foc===s.games.length?'focus':''}" id="a-fav">${gm0&&gm0.fav?'☆':'★'}<span class="t">${gm0&&gm0.fav?'Unfavorite':'Favorite'} — ${esc(nm0)}</span></div>`+
      `<div class="ab ${foc===s.games.length+1?'focus':''}" id="a-art"><span class="t">Fetch art — ${esc(nm0)}</span></div>`+
      `<div class="ab ${foc===s.games.length+2?'focus':''}" id="a-opt"><span class="t">Options — ${esc(nm0)}</span></div>`+
      `<div class="ab ${foc===s.games.length+3?'focus':''}" id="a-scr"><span class="t">Scrape all — ${esc(s.name)}</span></div></div>`;
    const g=$("grid");
    g.innerHTML=s.games.map((gm,i)=>{
      // a save-state thumbnail (the "where you left off" picture, task 53) beats cover art on
      // resume cards; cover art next; gradient + title last. Degrades cleanly when none exist.
      const artUrl=gm.state_thumb||(gm.img?('/fs/file?path='+encodeURIComponent(gm.img)):null);
      const artStyle=artUrl?`background:#0c0c1e url('${artUrl}') center/cover no-repeat`:`background:linear-gradient(135deg,${COLORS[i%COLORS.length]},#0c0c1e)`;
      const ps=gm.playtime_s||gm.secs||0,lp=gm.last_played||null;
      const playLine=ps?fmtPlayDetail(ps)+(lp?' · '+fmtDate(lp):''):(gm.plays?'▶ '+gm.plays+'×':null);
      return `<div class="game ${i===foc?'focus':''}" data-g="${i}">
      <div class="art" style="${artStyle}">${gm.fav?'<span class="fav">★</span>':''}${gm.state_thumb?'<span class="resume">▶ Resume</span>':''}${artUrl?'':gm.name}</div>
      <div class="sub">${playLine||gm.name}</div></div>`;}).join("");
    [...g.children].forEach(el=>el.onclick=()=>{foc=+el.dataset.g;render();launch();});
    $("a-fav").onclick=()=>{foc=s.games.length;render();toggleFav();};
    $("a-art").onclick=()=>{foc=s.games.length+1;render();fetchArt();};
    $("a-opt").onclick=()=>{foc=s.games.length+2;render();openOptions();};
    $("a-scr").onclick=()=>{foc=s.games.length+3;render();scrapeArt();};}
  function render(){buildRail();buildPane();paint();const f=pane.querySelector(".game.focus,.ab.focus");if(f)f.scrollIntoView({block:"nearest"});}
  function launch(){const s=SYS[cat];if(!s||!s.games[foc])return;const gm=s.games[foc];const g=gm.name;
    const sys=gm.system||s.system;
    say("Launching "+g+"…");
    fetch("/launch",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys,game:g})}).then(r=>r.json())
      .then(d=>say(d.ok?("Launching "+g+" — "+s.name):("Couldn't launch: "+(d.error||"?"))))
      .catch(e=>say("Launch failed"));}
  function toggleFav(){const s=SYS[cat],gm=tgtGame();if(!s||!gm)return;
    const sys=gm.system||s.system, game=gm.name, on=!gm.fav;
    say((on?"★ Favorited ":"☆ Removed ")+game);
    fetch("/game/favorite",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys,game:game,on:on})}).then(r=>r.json())
      .then(d=>{if(d.ok)loadAll(true);else say("Favorite failed");}).catch(()=>say("Favorite failed"));}
  // per-GAME manual fetch (the "Fetch art — <game>" tile / Enter on it). Honest about every outcome:
  // found → reload to show it; no match (homebrew) → say so plainly; can't reach server → say try again.
  function fetchArt(){const s=SYS[cat],gm=tgtGame();if(!s||!gm){say("Pick a game first");return;}
    const sys=gm.system||s.system, game=gm.name;
    say("Fetching art for "+game+"…");
    fetch("/game/scrape",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys,game:game})}).then(r=>r.json()).then(d=>{
        if(d.ok&&d.found){say("★ Art found for "+game);setTimeout(()=>loadAll(true),700);}
        else if(d.ok){say("No art found for "+game+(d.no_source?" — no database for "+sys:" (likely homebrew)"));}
        else if(d.net){say("Couldn't reach the art server — try again");}
        else say("Fetch failed: "+(d.error||"?"));
      }).catch(e=>say("Fetch failed (network?)"));}
  // bulk per-SYSTEM scrape (the "Scrape all — <system>" tile)
  function scrapeArt(){const s=SYS[cat];if(!s||s.system==="__recent"||s.system==="__fav"||s.system==="__most"){say("Pick a system to scrape");return;}
    say("Scraping cover art for "+s.name+"… (this can take a moment)");
    fetch("/scrape",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:s.system})})
      .then(r=>r.json()).then(d=>{
        if(d.ok){let msg="Art: +"+d.scraped+" found · "+d.had_art+" already had · "+d.missed+" not in database";
          if(d.net_errors)msg+=" · "+d.net_errors+" couldn't reach server";
          say(msg); if(d.scraped) setTimeout(()=>location.reload(),900);}
        else say("Scrape: "+(d.error||"failed"));}).catch(e=>say("Scrape failed (network?)"));}
  // ---- per-game options modal ----
  function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  let GOPT={open:false,foc:0,items:[],sys:"",game:"",data:null,cores:[],default:null,shadersets:["none"],shLabels:{none:"None"}};
  function openOptions(){const s=SYS[cat],gm=tgtGame();if(!s||!gm)return;
    const sys=gm.system||s.system, game=gm.name;
    const qs="system="+encodeURIComponent(sys)+"&game="+encodeURIComponent(game);
    Promise.all([
      fetch("/game/options?"+qs,{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
      // Shader lives on its OWN endpoint: /game/shader writes the REAL batocera key (.shaderset)
      // with REAL shaderset ids from available[]. The old library .shaders key + fabricated
      // ["scanlines","crt","lcd"] values were ignored by configgen entirely (task 79, docs/30).
      fetch("/game/shader?"+qs,{cache:"no-store"}).then(r=>r.json()).catch(()=>({}))
    ]).then(([d,sh])=>{ if(!d.ok||!(d.cores&&d.cores.length)){say("No options for this system");return;}
        const avail=(sh&&sh.ok&&Array.isArray(sh.available)&&sh.available.length)?sh.available:[{id:"none",label:"None"}];
        const shadersets=avail.map(a=>a.id), shLabels={}; avail.forEach(a=>{shLabels[a.id]=a.label||a.id;});
        let cur=(sh&&sh.ok&&sh.shaderset)?sh.shaderset:"none"; if(shadersets.indexOf(cur)<0)cur="none";
        GOPT={open:true,foc:0,items:[],sys:sys,game:game,cores:d.cores,default:d.default,
              shadersets:shadersets,shLabels:shLabels,
              data:{core:d.core,ratio:d.ratio,shaderset:cur,rewind:d.rewind}};
        renderOpt(); if(window.GOSE&&GOSE.modalPush)GOSE.modalPush();   // docs/27 §3.10
        $("gopt").classList.add("on");
      }).catch(()=>say("Options offline"));}
  const RATIOS=["auto","4/3","16/9","core"];
  function renderOpt(){
    GOPT.items=GOPT.cores.map(c=>({t:"core",val:c}));
    GOPT.items.push({t:"cycle",key:"ratio",vals:RATIOS,label:"Aspect ratio"});
    GOPT.items.push({t:"cycle",key:"shaderset",vals:GOPT.shadersets,label:"Shader",disp:GOPT.shLabels});
    GOPT.items.push({t:"cycle",key:"rewind",vals:["0","1"],label:"Rewind",disp:{"0":"Off","1":"On"}});
    GOPT.items.push({t:"save"});
    let h='<h3>'+esc(GOPT.game)+'</h3><div class="gs">'+esc(GOPT.sys)+' · per-game settings · applies next launch</div><div class="sec">Emulator core</div>';
    GOPT.items.forEach((it,i)=>{const f=i===GOPT.foc?' focus':'';
      if(it.t==="core") h+='<div class="opt'+f+'"><span class="nm">'+esc(it.val)+(it.val===GOPT.default?' · default':'')+'</span>'+(it.val===GOPT.data.core?'<span class="chk">●</span>':'')+'</div>';
      else if(it.t==="cycle"){ if(it.key==="ratio")h+='<div class="sec">Tweaks</div>'; var v=GOPT.data[it.key]||it.vals[0]; var disp=(it.disp&&it.disp[v])?it.disp[v]:v;
        h+='<div class="opt'+f+'"><span class="nm">'+it.label+'</span><span class="v">‹ '+disp+' ›</span></div>';}
      else h+='<div class="save'+f+'">Save &amp; close</div>';});
    $("gopt-box").innerHTML=h;
    const fe=$("gopt-box").querySelector(".focus"); if(fe)fe.scrollIntoView({block:"nearest"});
  }
  function goptMove(d){GOPT.foc=(GOPT.foc+d+GOPT.items.length)%GOPT.items.length;renderOpt();}
  function goptCycle(d){const it=GOPT.items[GOPT.foc];if(it&&it.t==="cycle"){let i=it.vals.indexOf(GOPT.data[it.key]||it.vals[0]);i=(i+d+it.vals.length)%it.vals.length;GOPT.data[it.key]=it.vals[i];renderOpt();}}
  function goptEnter(){const it=GOPT.items[GOPT.foc];if(!it)return;
    if(it.t==="core"){GOPT.data.core=it.val;renderOpt();}
    else if(it.t==="cycle")goptCycle(1);
    else saveOptions();}
  function goptClose(){if(GOPT.open&&window.GOSE&&GOSE.modalPop)GOSE.modalPop();GOPT.open=false;$("gopt").classList.remove("on");}
  function saveOptions(){
    // core/ratio/rewind via /game/options; shaderset via /game/shader (the real .shaderset key).
    const optP=fetch("/game/options",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:GOPT.sys,game:GOPT.game,core:GOPT.data.core,ratio:GOPT.data.ratio,rewind:GOPT.data.rewind})})
      .then(r=>r.json()).catch(()=>({ok:false}));
    const shP=fetch("/game/shader",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:GOPT.sys,game:GOPT.game,shaderset:GOPT.data.shaderset})})
      .then(r=>r.json()).catch(()=>({ok:false}));
    Promise.all([optP,shP]).then(([o,sh])=>{goptClose();
      say((o.ok&&sh.ok)?("Saved — "+GOPT.data.core+" · applies next launch"):"Save failed");})
      .catch(()=>{goptClose();say("Save failed");});}
  function moveCat(d){if(!SYS.length)return;cat=(cat+d+SYS.length)%SYS.length;foc=0;lastG=0;render();}
  function moveFoc(d){const s=SYS[cat];if(!s)return;const n=total();if(n<=0)return;
    if(Math.abs(d)>1&&foc<s.games.length){           // row jump from the grid
      const t=foc+d;
      if(t>=s.games.length&&d>0){foc=s.games.length;render();return;}   // off the bottom → actions
      if(t<0&&d<0){foc=s.games.length;render();return;}                  // off the top → actions (wrap)
    }else if(Math.abs(d)>1){foc=d>0?0:Math.max(0,s.games.length-1);render();return;}  // actions ↑↓ → grid
    foc=(foc+d+n)%n;render();}
  function activate(){const s=SYS[cat];if(!s)return;
    if(foc===s.games.length)toggleFav();
    else if(foc===s.games.length+1)fetchArt();
    else if(foc===s.games.length+2)openOptions();
    else if(foc===s.games.length+3)scrapeArt();
    else launch();}
  addEventListener("keydown",e=>{const k=e.key;
    if(GOPT.open){
      if(k==="ArrowDown")goptMove(1);else if(k==="ArrowUp")goptMove(-1);
      else if(k==="ArrowRight")goptCycle(1);else if(k==="ArrowLeft")goptCycle(-1);
      else if(k==="Enter"||k===" ")goptEnter();
      else if(k==="Escape"||k==="Backspace")goptClose();
      else return;e.preventDefault();return;}
    if(k==="ArrowRight")moveFoc(1);else if(k==="ArrowLeft")moveFoc(-1);
    else if(k==="ArrowDown")moveFoc(4);else if(k==="ArrowUp")moveFoc(-4);
    else if(k==="]"||k==="PageDown")moveCat(1);else if(k==="["||k==="PageUp")moveCat(-1);
    else if(k==="Enter"||k===" ")activate();
    else if(k==="s"||k==="S")scrapeArt();          // keyboard conveniences (tiles cover the pad)
    else if(k==="f"||k==="F")toggleFav();
    else if(k==="o"||k==="O")openOptions();
    else if(k==="Escape"||k==="Backspace"){location.href="gose-home.html";}
    else return;e.preventDefault();});
  // No raw-gamepad poll — the bridge (gose-pad-nav.py) synthesizes the keys above;
  // a page-level getGamepads() loop is a second input path that double-fires (docs/27).
  paint();
  function loadAll(keep){
    // remember the focused system+game (or action tile) so a reload — e.g. after a favorite
    // toggle fired FROM the tile — keeps your place instead of yanking focus to game 0 (§3.9)
    const cur=keep&&SYS[cat]?{sys:SYS[cat].system,game:(SYS[cat].games[foc]||{}).name,
      tile:foc>=SYS[cat].games.length?foc-SYS[cat].games.length:-1,lg:lastG}:null;
    return Promise.all([
      fetch("/games.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
      fetch("/recent.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
      fetch("/favorites.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
      fetch("/game/stats",{cache:"no-store"}).then(r=>r.json()).catch(()=>({}))
    ]).then(([d,rc,fv,stats])=>{
      SYS=(d.systems||[]);
      // inject playtime_s + last_played from /game/stats into the system game lists
      const statsMap={};
      ((stats&&stats.games)||[]).forEach(g=>{statsMap[g.key]={playtime_s:g.total_secs,last_played:g.last_played,sessions:g.sessions};});
      SYS.forEach(s=>s.games.forEach(g=>{const st=statsMap[s.system+"/"+g.name];if(st){g.playtime_s=st.playtime_s;g.last_played=st.last_played;g.sessions=st.sessions;}}));
      const recent=((rc&&rc.games)||[]).map(r=>({name:r.game,img:r.img,system:r.system,plays:r.plays,
        secs:r.secs,playtime_s:r.playtime_s||r.secs||0,last_played:r.last_played,sessions:r.sessions,fav:r.fav,state_thumb:r.state_thumb}));
      const favs=((fv&&fv.games)||[]).map(r=>{var _fk=(r.system||"")+"/"+(r.game||""),_fs=statsMap[_fk];
        return {name:r.game,img:r.img,system:r.system,fav:true,
        playtime_s:(_fs&&_fs.playtime_s)||0,last_played:(_fs&&_fs.last_played)||null};});
      // "Most Played" surface: top 10 by playtime_s (only games that have been played)
      const played=((stats&&stats.games)||[]).filter(g=>g.total_secs>0).slice(0,10);
      const mostPlayed=played.map(g=>{
        const sys=SYS.find(s=>s.system===g.system);
        return {name:g.game,system:g.system,img:sys?(sys.games.find(x=>x.name===g.game)||{}).img:null,
          playtime_s:g.total_secs,last_played:g.last_played,sessions:g.sessions};});
      if(mostPlayed.length) SYS.unshift({name:"🏆 Most Played",system:"__most",games:mostPlayed});
      if(recent.length) SYS.unshift({name:"▶ Continue Playing",system:"__recent",games:recent});
      if(favs.length) SYS.unshift({name:"★ Favorites",system:"__fav",games:favs});
      const totH=stats&&stats.total_secs?Math.round(stats.total_secs/360)/10:0;
      $("sub").textContent=d.ok?`${d.total||0} games · ${(d.systems||[]).length} systems${favs.length?" · "+favs.length+"★":""}${recent.length?" · "+recent.length+" recent":""}${totH?" · "+totH+"h played":""}`:"couldn't read games";
      if(cur){let ci=SYS.findIndex(s=>s.system===cur.sys);cat=ci<0?0:ci;
        if(cur.tile>=0){foc=SYS[cat].games.length+cur.tile;lastG=Math.min(cur.lg,Math.max(0,SYS[cat].games.length-1));}
        else{const gi=cur.game?SYS[cat].games.findIndex(g=>g.name===cur.game):-1;foc=gi<0?0:gi;}}
      render();
    }).catch(()=>{$("sub").textContent="library offline";render();});
  }
  loadAll(false);
</script>
<script src="assets/a11y.js"></script>
