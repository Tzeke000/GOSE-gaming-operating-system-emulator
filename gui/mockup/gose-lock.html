<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Lock</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:#eaf0ff;background:#07070f;display:flex;
    flex-direction:column;align-items:center;justify-content:center}
  canvas#bg{position:fixed;inset:0;z-index:0}
  .clock{position:relative;z-index:2;font-size:86px;font-weight:700;letter-spacing:-2px;text-shadow:0 2px 24px #000a}
  .date{position:relative;z-index:2;color:#aeb4d2;font-size:19px;margin-top:-6px}
  .user{position:relative;z-index:2;margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:11px}
  .av{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:700;color:#06121a;box-shadow:0 0 26px var(--accent)}
  .name{font-size:18px;font-weight:600}
  .pin{display:flex;gap:12px;margin-top:2px;min-height:14px}
  .pin .d{width:14px;height:14px;border-radius:50%;border:2px solid #ffffff55}
  .pin .d.on{background:var(--accent);border-color:var(--accent)}
  .pin.shake{animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  /* pad-drivable PIN pad — 3x4 digit grid (docs/27 §3.1: arrow focus + Enter/A; the
     numpad-as-controller translator turns numpad digits into arrows, so a focusable
     grid is the ONLY way a pad can enter digits) */
  .pad{position:relative;z-index:2;display:none;grid-template-columns:repeat(3,76px);gap:9px;margin-top:14px}
  .pad.on{display:grid}
  .pad .k{height:56px;border-radius:13px;background:#161826cc;border:2px solid #ffffff1e;
    display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:600;cursor:pointer;
    user-select:none;backdrop-filter:blur(8px)}
  .pad .k:hover{border-color:var(--accent)}
  .pad .k.focus{border-color:var(--accent);box-shadow:var(--focusglow,0 0 0 2px var(--accent));background:#1d2238}
  .pad .k.fn{font-size:15px;color:#aeb4d2}
  .pad.locked .k{opacity:.35;pointer-events:none}
  /* password sign-in (alternative to PIN) — a text field; the shared OSK drives it on a pad */
  .pwwrap{position:relative;z-index:2;margin-top:16px;display:flex;justify-content:center}
  .pwinp{width:300px;max-width:80vw;background:#161826cc;border:2px solid #ffffff2e;border-radius:13px;
    padding:13px 16px;font-size:18px;color:#eaf0ff;font-family:inherit;outline:none;text-align:center;
    letter-spacing:2px;backdrop-filter:blur(8px)}
  .pwinp:focus{border-color:var(--accent);box-shadow:var(--focusglow,0 0 0 2px var(--accent))}
  .pwinp:disabled{opacity:.4}
  .hint{position:fixed;bottom:42px;z-index:2;color:#8b92b0;font-size:14px;animation:pulse 2.4s infinite;
    max-width:80vw;text-align:center}
  .hint.err{color:#ff9e9e;animation:none}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .logo{position:fixed;top:30px;z-index:2;display:flex;align-items:center;gap:10px;color:#aeb4d2;font-weight:600;letter-spacing:.5px}
  .logo img{width:26px;height:26px}
</style></head>
<body>
  <canvas id="bg"></canvas>
  <div class="logo"><img src="assets/brand/gose-core-mark.png" alt="GOSE"><span>GOSE</span></div>
  <div class="clock" id="clock">--:--</div>
  <div class="date" id="date"></div>
  <div class="user">
    <div class="av" id="av">Z</div>
    <div class="name" id="name">Owner</div>
    <div class="pin" id="pin" style="display:none"></div>
  </div>
  <div class="pad" id="pad"></div>
  <div class="pwwrap" id="pwwrap" style="display:none"><input class="pwinp" id="pwinp" type="password"
    autocomplete="off" spellcheck="false" placeholder="Password"></div>
  <div class="hint" id="hint" data-i18n="lock.hint_any">Press any key or click to unlock</div>
<script src="assets/i18n.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const $=id=>document.getElementById(id);
  var _t=window.GOSE&&GOSE.t?GOSE.t.bind(GOSE):function(k,fb){return fb||k;};
  // clock honors the OS timezone + format
  function tick(){const fmt=localStorage.getItem("gose-clockfmt"),tz=localStorage.getItem("gose-tz");
    const o={hour:'numeric',minute:'2-digit',hour12:fmt!=="24"}; if(tz)o.timeZone=tz;
    try{$("clock").textContent=new Date().toLocaleTimeString('en-US',o);}catch(e){$("clock").textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
    const d={weekday:'long',month:'long',day:'numeric'}; if(tz)d.timeZone=tz;
    try{$("date").textContent=new Date().toLocaleDateString('en-US',d);}catch(e){$("date").textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}}
  tick(); setInterval(tick,10000);
  // accent: canonical = /ui/prefs (applied page-wide by a11y.js below); the avatar just
  // tracks the live token so a Settings accent change shows here too
  $("av").style.background="var(--accent)";
  // ambient nebula background
  const cv=$("bg"),ctx=cv.getContext("2d");let W,H;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;}size();addEventListener("resize",size);
  const ps=[];for(let i=0;i<6;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*240+140,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,hue:[200,250,275,190][i%4]});
  (function frame(){ctx.fillStyle="rgba(7,7,15,.2)";ctx.fillRect(0,0,W,H);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-p.r)p.x=W+p.r;if(p.x>W+p.r)p.x=-p.r;if(p.y<-p.r)p.y=H+p.r;if(p.y>H+p.r)p.y=-p.r;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,`hsla(${p.hue},70%,55%,.09)`);g.addColorStop(1,"transparent");
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});requestAnimationFrame(frame);})();
  // ---- unlock: REAL PIN (server-verified /auth/pin, scrypt-hashed) or any-key when none ----
  // Modes: free (no PIN) · enter (verify against the stored hash) · setup/confirm (the
  // migration path: a has_pin account that never stored a hash — older OOBE only sent the
  // boolean — finishes PIN setup HERE at its next unlock instead of being locked out) ·
  // locked (5 misses → 30s server lockout; counts down and re-enables itself, never bricks).
  // Honest scope: convenience lock, not encryption (recovery = edit accounts.json, docs/24 §1.5).
  // mode starts at "init": keys are inert until the server answers (closes the old race
  // where any-key-unlock was live before the account record loaded). The decide() promise
  // ALWAYS resolves (both fetches catch) and always lands on a real mode — never bricks.
  let mode="init", entered="", newPin="", pinLen=0, lockT=null;
  const MAXLEN=8, MINLEN=8;  // policy: PIN must be exactly 8 digits (Zeke, 2026-06-08)
  function unlock(){if(window.GOSE&&GOSE.modalPop)GOSE.modalPop();location.href="gose-home.html";}
  function hint(t,err){const h=$("hint");h.textContent=t;h.classList.toggle("err",!!err);}
  function dots(){const n=(mode==="enter"&&pinLen)?pinLen:Math.min(MAXLEN,Math.max(MINLEN,entered.length||MINLEN));
    $("pin").innerHTML=Array.from({length:n},(_,i)=>`<span class="d ${i<entered.length?'on':''}"></span>`).join("");}
  function shake(){const p=$("pin");p.classList.remove("shake");void p.offsetWidth;p.classList.add("shake");}
  // --- the 3x4 grid: 1-9, then back/0/OK. Arrow nav wraps; Enter/A activates. ---
  const KEYS=[["1","2","3"],["4","5","6"],["7","8","9"],[{k:"back",l:"⌫"},"0",{k:"ok",l:"OK"}]];
  let pr=0,pc=0;
  function buildPad(){$("pad").innerHTML=KEYS.map((row,ri)=>row.map((c,ci)=>{
      const k=typeof c==="string"?c:c.k, l=typeof c==="string"?c:c.l;
      return `<div class="k ${typeof c!=="string"?'fn':''}" data-k="${k}" data-r="${ri}" data-c="${ci}">${l}</div>`;
    }).join("")).join("");
    [...$("pad").children].forEach(el=>el.onclick=()=>{pr=+el.dataset.r;pc=+el.dataset.c;mark();act(el.dataset.k);});
    mark();}
  function mark(){[...$("pad").children].forEach(el=>el.classList.toggle("focus",+el.dataset.r===pr&&+el.dataset.c===pc));}
  function moveFocus(dr,dc){pr=(pr+dr+KEYS.length)%KEYS.length;pc=(pc+dc+3)%3;mark();}
  function showPad(m){const was=$("pad").classList.contains("on");
    mode=m;$("pad").classList.add("on");$("pin").style.display="flex";dots();
    if(!was&&window.GOSE&&GOSE.modalPush)GOSE.modalPush();   // modal layer signal (docs/27 §3.10)
    hint(m==="enter"?_t("lock.hint_pin","Enter your PIN"):(m==="confirm"?"Re-enter your PIN to confirm"
      :"Set a PIN ("+MINLEN+" digits) to finish setting up your lock"));}
  function digit(d){if(mode==="locked")return;
    if(entered.length>=MAXLEN)return;
    entered+=d;dots();
    if(mode==="enter"&&pinLen&&entered.length===pinLen)setTimeout(submit,150);}
  function back1(){if(mode==="locked")return;entered=entered.slice(0,-1);dots();}
  function act(k){if(/^[0-9]$/.test(k))digit(k);else if(k==="back")back1();else if(k==="ok")submit();}
  function lockout(s){mode="locked";entered="";dots();$("pad").classList.add("locked");
    let left=Math.ceil(s);clearInterval(lockT);
    const tickL=()=>{if(left<=0){clearInterval(lockT);$("pad").classList.remove("locked");mode="enter";
        hint(_t("lock.hint_pin","Enter your PIN"));return;}
      hint(_t("lock.error_locked","Too many attempts — wait 30 s").replace("30 s",left+"s"),true);left--;};
    tickL();lockT=setInterval(tickL,1000);}
  function submit(){
    if(mode==="locked"||!entered)return;
    if(mode==="setup"){
      if(entered.length<MINLEN){hint("PIN must be exactly "+MINLEN+" digits",true);shake();return;}
      newPin=entered;entered="";showPad("confirm");return;}
    if(mode==="confirm"){
      if(entered!==newPin){entered="";newPin="";shake();showPad("setup");hint("Didn't match — choose your PIN again",true);return;}
      const pin=newPin;entered="";newPin="";
      fetch("/auth/pin/set",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pin:pin})}).then(r=>r.json()).then(d=>{
          if(d&&d.ok){unlock();}else{dots();shake();hint((d&&d.error)||"Couldn't save the PIN — try again",true);showPadSoon("setup");}
        }).catch(()=>{dots();shake();hint("Can't reach sign-in — try again",true);showPadSoon("setup");});
      return;}
    // mode === "enter": verify server-side
    const pin=entered;entered="";
    fetch("/auth/pin",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pin:pin})}).then(r=>r.json()).then(d=>{
        if(d&&d.ok&&d.valid){unlock();return;}
        dots();shake();
        if(d&&d.locked_for>0){lockout(d.locked_for);return;}
        if(d&&d.ok===false&&d.set===false){showPad("setup");return;}   // hash vanished → re-setup
        hint(_t("lock.error_wrong","Wrong PIN — try again")+(d&&d.tries_left?" ("+d.tries_left+" left)":""),true);
      }).catch(()=>{dots();shake();hint("Can't reach sign-in — try again",true);});}
  // ---- password sign-in (alternative to PIN; the owner sets EXACTLY ONE at OOBE) ----
  function showPw(){
    mode="password";$("pwwrap").style.display="flex";$("pad").classList.remove("on");$("pin").style.display="none";
    if(window.GOSE&&GOSE.modalPush)GOSE.modalPush();
    hint(_t("lock.hint_password","Enter your password"));
    var inp=$("pwinp");inp.value="";inp.disabled=false;
    setTimeout(function(){try{inp.focus();}catch(e){}},60);   // focus opens the shared OSK (cursor.js)
  }
  function submitPw(){
    if(mode!=="password")return;
    var inp=$("pwinp"),pw=inp.value;if(!pw)return;
    fetch("/auth/password",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({password:pw})}).then(r=>r.json()).then(d=>{
        if(d&&d.ok&&d.valid){unlock();return;}
        inp.value="";
        if(d&&d.locked_for>0){lockoutPw(d.locked_for);return;}
        hint(_t("lock.error_wrong_password","Wrong password — try again")+(d&&d.tries_left?" ("+d.tries_left+" left)":""),true);
        try{inp.focus();}catch(e){}
      }).catch(function(){hint("Can't reach sign-in — try again",true);});
  }
  function lockoutPw(s){var left=Math.ceil(s);clearInterval(lockT);var inp=$("pwinp");inp.disabled=true;
    var tickL=function(){if(left<=0){clearInterval(lockT);inp.disabled=false;
        hint(_t("lock.hint_password","Enter your password"));try{inp.focus();}catch(e){}return;}
      hint(_t("lock.error_locked","Too many attempts — wait 30 s").replace("30 s",left+"s"),true);left--;};
    tickL();lockT=setInterval(tickL,1000);}
  let _padT=null;function showPadSoon(m){clearTimeout(_padT);_padT=setTimeout(()=>showPad(m),1400);}
  buildPad();
  addEventListener("keydown",e=>{
    if(mode==="init")return;                       // waiting on the server's answer
    if(mode==="password"){
      // the password field + shared OSK own input here; Enter (hardware or OSK chain) submits
      if(e.key==="Enter"){e.preventDefault();submitPw();}
      return;                                       // let the OSK/input handle typing + navigation
    }
    if(mode==="free"){unlock();return;}
    const k=e.key;
    if(k==="ArrowUp")moveFocus(-1,0);else if(k==="ArrowDown")moveFocus(1,0);
    else if(k==="ArrowLeft")moveFocus(0,-1);else if(k==="ArrowRight")moveFocus(0,1);
    else if(k==="Enter"||k===" ")act(KEYS[pr][pc].k||KEYS[pr][pc]);
    else if(/^[0-9]$/.test(k))digit(k);            // top-row digits (numpad digits arrive as arrows)
    else if(k==="Backspace"||k==="Escape")back1(); // B backs out one digit; empty = stays locked (it's a lock)
    else return;e.preventDefault();});
  addEventListener("click",e=>{if(mode==="free"&&!$("pad").contains(e.target))unlock();});
  // ---- decide the mode from the server (one Promise so it can't race the key handler) ----
  // /auth/pin says whether a PIN is wanted + whether a verifiable hash exists; /oobe/status
  // gives the display identity. Fetch failure = stay in free mode (the lock must never brick).
  Promise.all([
    fetch("/auth/pin",{cache:"no-store"}).then(r=>r.json()).catch(()=>null),
    fetch("/oobe/status",{cache:"no-store"}).then(r=>r.json()).catch(()=>null),
    fetch("/auth/password",{cache:"no-store"}).then(r=>r.json()).catch(()=>null)
  ]).then(([st,os,pst])=>{
    const o=os&&os.owner;
    if(o){const nm=o.username||o.display||"Owner";
      $("name").textContent=nm;$("av").textContent=(nm[0]||"?").toUpperCase();
      // owner accent = FALLBACK only (pre-ui_prefs installs); the canonical store wins
      if(o.accent&&!localStorage.getItem("gose-accent"))document.documentElement.style.setProperty("--accent",o.accent);}
    const wanted=(st&&st.enabled)||localStorage.getItem("gose-signin")==="PIN";
    const pwSet=!!(pst&&pst.set);
    if(wanted&&st&&st.set){pinLen=st.pin_len||0;   // PIN sign-in (the owner picks ONE: PIN xor password)
      if(st.locked_for>0){showPad("enter");lockout(st.locked_for);}else showPad("enter");}
    else if(pwSet){showPw();if(pst.locked_for>0)lockoutPw(pst.locked_for);}   // password sign-in
    else if(wanted&&st&&o)showPad("setup");        // migration: has_pin but no stored hash
    else mode="free";   // no credential wanted — or sign-in unreachable (availability over a
                        // theoretical bypass: it's a convenience lock and the page itself
                        // came from that same server; never strand the owner)
    if(location.hash.indexOf("dbg")>=0)console.log("[lock] mode="+mode+" pin_set="+(st&&st.set)+" pw_set="+pwSet);
  });
</script>
<script src="assets/a11y.js"></script>
</body></html>
