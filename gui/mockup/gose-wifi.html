<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Wi-Fi</title>
<link rel="stylesheet" href="assets/themes.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:12px;padding:18px 36px 6px}
  .top img{width:30px;height:30px}.top h1{font-size:19px;margin:0}
  .top .home{margin-left:auto;color:var(--muted);font-size:13px}
  .bar{display:flex;align-items:center;gap:12px;padding:8px 36px}
  .conn{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;flex:1}
  .conn .ic{font-size:20px;color:var(--accent)}.conn .nm{font-weight:700}.conn .sub{color:var(--muted);font-size:12px}
  .conn .st{margin-left:auto;font-size:12px;color:#3fe0a0;font-weight:700}
  .scan{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid transparent;color:var(--text);
    border-radius:12px;padding:12px 18px;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap}
  .scan.focus{border-color:var(--accent);box-shadow:var(--focusglow)}.scan.busy{opacity:.6}
  .wrap{flex:1;margin:10px 36px 0;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:auto;min-height:0}
  .ph{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);padding:12px 16px 4px}
  .net{display:flex;align-items:center;gap:13px;padding:11px 16px;border:2px solid transparent;cursor:pointer}
  .net.focus{border-color:var(--accent);background:#5cd0ff14}
  .net .ic{font-size:19px;color:#9fb8e8;flex:none}
  .net .nm{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .net .lock{color:var(--muted);font-size:13px}
  .net .sig{color:var(--muted);font-size:12px;width:42px;text-align:right}
  .net .st{color:#3fe0a0;font-size:12px;font-weight:700}
  .empty{color:var(--muted);padding:34px;text-align:center}
  .foot{margin:10px 36px 14px;display:flex;gap:10px;color:var(--muted);font-size:12px;
    background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}.foot b{color:var(--text)}
  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--accent);border-radius:11px;padding:9px 16px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .pw{position:fixed;inset:0;background:#06060cc8;display:none;align-items:center;justify-content:center;z-index:70}
  .pw.on{display:flex}
  .pw .box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px;width:440px;max-width:90vw}
  .pw h3{margin:0 0 4px;font-size:16px}.pw .s{color:var(--muted);font-size:12px;margin-bottom:12px}
  .pw input{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:9px;padding:10px 12px;color:#eaf0ff;font-size:15px;outline:none}
  .pw .btns{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
  .pw .btns button{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 16px;font-weight:600}
  .pw .btns .ok{background:var(--accent);color:#06121a;border:none}
</style></head>
<body>
  <div class="top"><img src="assets/brand/gose-core-mark.png" alt="GOSE">
    <h1>Wi-Fi</h1>
    <div class="home"><span class="ic" data-i="wifi"></span> B / Esc — back to Settings</div>
  </div>
  <div class="bar">
    <div class="conn" id="conn"><span class="ic" data-i="wifi"></span>
      <div><div class="nm" id="conn-nm">Wi-Fi</div><div class="sub" id="conn-sub">checking…</div></div>
      <span class="st" id="conn-st"></span></div>
    <div class="scan" id="scan"><span class="ic" data-i="search"></span><span id="scan-t">Scan</span></div>
  </div>
  <div class="wrap" id="wrap"><div class="empty">Loading…</div></div>
  <div class="foot"><span class="ic" data-i="wifi"></span> Networks on your laptop's wireless
    <span class="h"><b>↑↓</b> move · <b>Enter/A</b> connect · <b>X</b> disconnect · <b>Esc</b> back</span></div>
  <div class="toast" id="toast"></div>
  <div class="pw" id="pw"><div class="box"><h3 id="pw-t">Enter password</h3><div class="s" id="pw-s"></div>
    <input id="pw-in" type="password" spellcheck="false" autocomplete="off">
    <div class="btns"><button id="pw-cancel">Cancel</button><button class="ok" id="pw-ok">Connect</button></div></div></div>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const $=id=>document.getElementById(id);
  let nets=[], current=null, foc=1, busy=false;   // foc 0 = scan button, 1.. = networks
  function paint(){document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}
  function say(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(say._t);say._t=setTimeout(()=>t.classList.remove("show"),2100);}
  function nItems(){return 1+nets.length;}
  function sigWord(s){return s==null?"":s+"%";}
  function render(){
    $("conn-nm").textContent = current ? current : "Wi-Fi";
    $("conn-sub").textContent = current ? "Connected — your laptop's wireless" : "Not connected";
    $("conn-st").textContent = current ? "● online" : "";
    $("scan").className="scan"+(foc===0?" focus":"")+(busy?" busy":"");
    $("scan-t").textContent=busy?"Scanning…":"Scan";
    $("wrap").innerHTML='<div class="ph">NETWORKS</div>'+(nets.length?nets.map((n,i)=>{
      const on=n.ssid===current;
      return `<div class="net ${foc===i+1?'focus':''}" data-i2="${i+1}"><span class="ic" data-i="wifi"></span>
        <span class="nm">${n.ssid}</span>${n.secure?'<span class="lock ic" data-i="lock"></span>':''}
        ${on?'<span class="st">Connected</span>':''}<span class="sig">${sigWord(n.signal)}</span></div>`;
    }).join(""):'<div class="empty">No networks found — press Scan.</div>');
    [...$("wrap").querySelectorAll(".net")].forEach(el=>el.onclick=()=>{foc=+el.dataset.i2;render();act();});
    $("scan").onclick=()=>{foc=0;render();scan();};
    const f=$("wrap").querySelector(".net.focus"); if(f)f.scrollIntoView({block:"nearest"});
    paint();
  }
  function loadStatus(){fetch("/net/wifi",{cache:"no-store"}).then(r=>r.json()).then(d=>{
    if(d&&d.ok){current=d.connected?d.ssid:null;} render();}).catch(()=>{});}
  function scan(){busy=true;render();
    fetch("/net/scan",{cache:"no-store"}).then(r=>r.json()).then(d=>{busy=false;
      if(d&&d.ok){nets=d.networks||[];current=d.current||current;} else say(d&&d.error?d.error:"Scan failed");
      render();}).catch(e=>{busy=false;render();say("Wi-Fi bridge offline");});}
  function connect(ssid,password){say("Connecting to "+ssid+"…");busy=true;render();
    fetch("/net/connect",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ssid:ssid,password:password})})
      .then(r=>r.json()).then(d=>{busy=false;
        if(d&&d.ok){say("Connected to "+ssid);setTimeout(loadStatus,1500);}
        else say("Couldn't connect"+(d&&d.detail?": "+d.detail:""));render();}).catch(e=>{busy=false;render();say("Connect failed");});}
  function act(){const n=nets[foc-1];if(!n)return;
    if(n.ssid===current){say("Already connected");return;}
    if(n.secure)askPw(n); else connect(n.ssid,"");}
  function disconnect(){if(!current){say("Not connected");return;}
    fetch("/net/disconnect",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
      .then(r=>r.json()).then(()=>{say("Disconnected");current=null;render();}).catch(()=>{});}
  function askPw(n){const pw=$("pw"),inp=$("pw-in");$("pw-t").textContent="Connect to "+n.ssid;
    $("pw-s").textContent=n.auth||"Secured network";inp.value="";pw.classList.add("on");
    setTimeout(()=>inp.focus(),60);
    function done(ok){pw.classList.remove("on");inp.onkeydown=null;if(ok&&inp.value)connect(n.ssid,inp.value);}
    $("pw-ok").onclick=()=>done(true);$("pw-cancel").onclick=()=>done(false);
    inp.onkeydown=(ev)=>{ev.stopPropagation();if(ev.key==="Enter")done(true);else if(ev.key==="Escape")done(false);};}
  function move(n){foc=(foc+n+nItems())%nItems();render();}
  function activate(){if(foc===0)scan();else act();}
  addEventListener("keydown",e=>{if($("pw").classList.contains("on"))return;const k=e.key;
    if(k==="ArrowDown")move(1);else if(k==="ArrowUp")move(-1);
    else if(k==="Enter"||k===" ")activate();
    else if(k==="x"||k==="X"||k==="GoseR2"||k==="Delete")disconnect();
    else if(k==="Escape"||k==="Backspace")location.href="gose-settings.html#net";
    else return;e.preventDefault();});
  let prev={},primed=false;(function pad(){const gp=navigator.getGamepads&&[...navigator.getGamepads()].find(x=>x);
    if(gp){const t=i=>primed&&gp.buttons[i]&&gp.buttons[i].pressed&&!prev[i];
      if(!$("pw").classList.contains("on")){if(t(13))move(1);if(t(12))move(-1);if(t(0))activate();if(t(2))disconnect();
        if(t(1))location.href="gose-settings.html#net";}
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);primed=true;}requestAnimationFrame(pad);})();
  paint();loadStatus();scan();
</script>
</body></html>
