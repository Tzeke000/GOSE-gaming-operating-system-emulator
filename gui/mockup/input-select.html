<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Choose Navigation</title>
<link rel="stylesheet" href="assets/themes.css">
<script src="assets/platform.js"></script>
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);background-attachment:fixed;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .badge{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 14px}
  h1{font-size:32px;margin:18px 0 4px}.sub{color:var(--muted);font-size:15px;margin-bottom:30px}
  .cards{display:flex;gap:22px}
  .card{width:230px;padding:26px 22px;border-radius:18px;background:var(--surface);border:2px solid transparent;
    text-align:center;cursor:pointer;transition:.15s}
  .card .ic{font-size:54px;color:var(--accent)}
  .card .t{font-weight:700;font-size:19px;margin-top:14px}
  .card .d{color:var(--muted);font-size:13px;margin-top:6px;min-height:34px}
  .card .def{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;letter-spacing:.4px;
    color:var(--accent);background:#5cd0ff1c;border-radius:10px;padding:3px 10px}
  .card.focus{border-color:var(--accent);box-shadow:var(--focusglow);transform:translateY(-4px)}
  .note{margin-top:28px;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;max-width:560px;text-align:center}
  .rem{margin-top:18px;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px}
  .rem .box{width:18px;height:18px;border-radius:5px;border:1px solid var(--line);background:var(--surface);
    display:flex;align-items:center;justify-content:center}
  .rem.on .box{background:var(--accent);border-color:var(--accent)}
  .hint{position:absolute;bottom:22px;color:var(--muted);font-size:13px}
</style></head>
<body>
  <div class="badge"><span class="ic" id="pic"></span><span id="plat"></span></div>
  <h1>How do you want to navigate?</h1>
  <div class="sub">Choose your input. You can change it anytime in Settings.</div>
  <div class="cards" id="cards"></div>
  <div class="note" id="note"></div>
  <div class="rem focusable" id="rem"><span class="box"><span class="ic" data-i="check" style="font-size:14px;color:#06080e"></span></span> Remember my choice</div>
  <div class="hint" id="hint"></div>
<script>
  document.documentElement.dataset.theme = localStorage.getItem("gose-theme") || "onyx";
  const G = window.GOSE;
  const META = {
    native:    ["tablet-smartphone","Native Controls","Built-in Odin 2 buttons & sticks"],
    keyboard:  ["keyboard","Keyboard & Mouse","Type and click to navigate"],
    controller:["gamepad-2","Controller","Xbox · PS5 · 8BitDo — Bluetooth or wired"],
  };
  document.getElementById("plat").textContent = G.platform === "pc" ? "GOSE — PC App" : "AYN Odin 2";
  document.getElementById("pic").style.setProperty("--u",
    `url(assets/icons/${G.platform === "pc" ? "monitor" : "tablet-smartphone"}.svg)`);

  const cards = document.getElementById("cards");
  G.available.forEach(mode => {
    const [ic, t, d] = META[mode];
    const c = document.createElement("div");
    c.className = "card focusable" + (mode === G.inputMode() ? " focus" : "");
    c.dataset.mode = mode;
    c.innerHTML = `<span class="ic" data-i="${ic}"></span><div class="t">${t}</div>`+
      `<div class="d">${d}</div>`+ (mode === G.default ? `<span class="def">DEFAULT</span>` : "");
    cards.appendChild(c);
  });

  document.getElementById("note").innerHTML = G.autoAccepts
    ? `<span class="ic" data-i="usb"></span> Peripherals auto-connect — plug in a keyboard or pair a controller anytime; it just works alongside native.`
    : `<span class="ic" data-i="plug-zap"></span> Connect a controller (Bluetooth or USB) first, then pick Controller. Otherwise it falls back to keyboard.`;

  let remember = true; const rem = document.getElementById("rem");
  function paintRem(){ rem.classList.toggle("on", remember); }
  paintRem();
  document.getElementById("hint").textContent =
    (G.platform==="pc" ? "Arrow keys / mouse · Enter to select" : "D-pad · A to select") + " — auto-continues with default";

  // focus-nav over cards + remember toggle
  const items = () => [...document.querySelectorAll(".focusable")];
  const cur = () => document.querySelector(".focus");
  function setF(el){ const c=cur(); if(c) c.classList.remove("focus"); el.classList.add("focus"); }
  function move(d){ const a=items(), i=a.indexOf(cur()); setF(a[(i+d+a.length)%a.length]); }
  function act(){ const el=cur(); if(!el) return;
    if(el.id==="rem"){ remember=!remember; paintRem(); return; }
    const mode=el.dataset.mode; if(remember) G.setInput(mode);
    location.href="login.html"; }
  addEventListener("keydown",e=>{ const k=e.key;
    if(k==="ArrowRight"||k==="ArrowDown")move(1); else if(k==="ArrowLeft"||k==="ArrowUp")move(-1);
    else if(k==="Enter")act(); else return; e.preventDefault(); });
  addEventListener("click",e=>{ const f=e.target.closest&&e.target.closest(".focusable"); if(f){ setF(f); act(); } });
  let prev={};(function pad(){ const gp=navigator.getGamepads&&[...navigator.getGamepads()].find(x=>x);
    if(gp){ const tap=i=>gp.buttons[i]&&gp.buttons[i].pressed&&!prev[i];
      if(tap(14)||tap(12))move(-1); if(tap(15)||tap(13))move(1); if(tap(0))act();
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);} requestAnimationFrame(pad);})();

  // auto-continue with the default if the user does nothing (POST-style)
  let auto=setTimeout(()=>{ if(remember) G.setInput(G.inputMode()); location.href="login.html"; }, 12000);
  ["keydown","click","mousemove"].forEach(ev=>addEventListener(ev,()=>{clearTimeout(auto);},{once:true}));

  document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));
</script>
</body></html>
