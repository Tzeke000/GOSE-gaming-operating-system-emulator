<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — BIOS Check</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:12px;padding:18px 36px 4px}
  .top img{width:34px;height:34px}.top h1{font-size:20px;margin:0}
  .top .s{color:var(--muted);font-size:12px}
  .top .home{margin-left:auto;color:var(--muted);font-size:13px}
  /* filter tabs */
  .tabs{display:flex;gap:8px;margin:8px 36px 0}
  .tab{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid transparent;
    border-radius:11px;padding:8px 14px;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer}
  .tab.on{color:var(--text);background:var(--surface2);border-color:var(--accent)}
  .tab .ct{font-size:11px;font-weight:700;color:var(--muted);background:#ffffff10;border-radius:7px;padding:1px 6px}
  .wrap{flex:1;display:flex;gap:16px;padding:10px 36px 0;min-height:0}
  .rail{width:300px;flex:none;overflow:auto;padding-top:2px;border-radius:12px}
  .sys{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:44px;padding:6px 13px;
    border-radius:11px;border:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:4px}
  .sys .n{font-weight:600;font-size:14px;color:var(--text)}
  .sys.sel{background:var(--surface2)}
  .sys.focus{border-color:var(--accent);box-shadow:var(--focusglow)}
  .pill{font-size:11px;font-weight:700;border-radius:9px;padding:2px 8px;white-space:nowrap}
  .pill.ok{color:#3fe0a0;background:#3fe0a01a}
  .pill.miss{color:#ffb27a;background:#ffb27a1a}
  .pill.none{color:#9aa0c0;background:#ffffff10}
  .pane{flex:1;min-width:0;background:var(--surface);border:2px solid var(--line);border-radius:14px;
    padding:16px 18px;overflow:auto}
  .pane.focus{border-color:var(--accent);box-shadow:var(--focusglow)}
  .pane h2{margin:0 0 2px;font-size:18px}
  .pane .ps{color:var(--muted);font-size:12px;margin-bottom:12px}
  .frow{display:flex;align-items:flex-start;gap:12px;padding:11px 12px;border-radius:10px;background:#ffffff06;margin-bottom:8px}
  .frow .mk{font-size:16px;font-weight:800;line-height:1.3;flex:none;width:18px;text-align:center}
  .frow .mk.y{color:#3fe0a0}.frow .mk.n{color:#ff7a7a}
  .frow .fn{font-weight:700;font-size:14px;word-break:break-all}
  .frow .meta{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.5}
  .frow .meta code{background:#ffffff10;border-radius:6px;padding:1px 6px;font-size:11px}
  .frow .md{font-size:11px;font-weight:700;margin-top:4px}
  .frow .md.ok{color:#3fe0a0}.frow .md.bad{color:#ff7a7a}.frow .md.unk{color:#9aa0c0}
  .none-card{text-align:center;padding:30px 16px;color:var(--muted)}
  .none-card .big{font-size:34px;color:#3fe0a0;margin-bottom:8px}
  .empty{color:var(--muted);font-size:14px;padding:30px}
  .foot{margin:8px 36px 14px;display:flex;gap:10px;color:var(--muted);font-size:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}.foot b{color:var(--text)}
</style></head>
<body>
  <div class="top"><img src="assets/brand/gose-crystal.png" alt="GOSE">
    <div><h1>BIOS Check</h1><div class="s" id="sub">reading your systems…</div></div>
    <div class="home"><span class="ic" data-i="hard-drive"></span> B / Esc — back</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="wrap"><div class="rail" id="rail"></div><div class="pane" id="pane"></div></div>
  <div class="foot"><span class="ic" data-i="cpu"></span> BIOS files live in <b>/userdata/bios</b>
    <span class="h">D-pad ↑↓ system · <b>→</b> read details · <b>L1/R1</b> filter · <b>B</b> back</span></div>
<script src="assets/icons.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const rail=document.getElementById("rail"),pane=document.getElementById("pane"),$=id=>document.getElementById(id);
  function esc(s){return (s==null?"":(""+s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function paint(){if(window.GICON){GICON.paint(document);return;}document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}

  // ---- data ----
  let ALL=[], biosDir="/userdata/bios", manifestOk=true;
  // filter tabs (tab-like structure → [ ]/L1R1 per docs/27 §3.3)
  const TABS=[["needs","Needs setup"],["yours","Your systems"],["all","All systems"]];
  let tab=0, sel=0, zone="rail";   // zone: rail (pick a system) | pane (scroll details)

  function filtered(){
    const t=TABS[tab][0];
    if(t==="yours") return ALL.filter(s=>s.has_games);
    if(t==="needs") return ALL.filter(s=>s.required>0 && !s.complete);
    return ALL.slice();
  }
  function buildTabs(){
    const needs=ALL.filter(s=>s.required>0&&!s.complete).length;
    const yours=ALL.filter(s=>s.has_games).length;
    const cts=[needs,yours,ALL.length];
    $("tabs").innerHTML=TABS.map(([id,lbl],i)=>
      `<div class="tab ${i===tab?'on':''}" data-t="${i}">${esc(lbl)} <span class="ct">${cts[i]}</span></div>`).join("");
    [...$("tabs").children].forEach(el=>el.onclick=()=>{tab=+el.dataset.t;sel=0;zone="rail";render();});
  }
  function buildRail(){
    const list=filtered();
    if(!list.length){rail.innerHTML='<div class="empty">Nothing here.</div>';return;}
    if(sel>=list.length)sel=list.length-1; if(sel<0)sel=0;
    rail.innerHTML=list.map((s,i)=>{
      let pill;
      if(s.none_needed||s.required===0) pill='<span class="pill none">No BIOS</span>';
      else if(s.complete) pill='<span class="pill ok">Ready</span>';
      else pill='<span class="pill miss">'+s.missing.length+' missing</span>';
      return `<div class="sys ${i===sel?'sel':''} ${i===sel&&zone==='rail'?'focus':''}" data-i2="${i}">
        <span class="n">${esc(s.name)}</span>${pill}</div>`;
    }).join("");
    [...rail.children].forEach(el=>el.dataset.i2!==undefined&&(el.onclick=()=>{sel=+el.dataset.i2;zone="rail";render();}));
  }
  function buildPane(){
    const list=filtered(), s=list[sel];
    pane.classList.toggle("focus",zone==="pane");
    if(!s){pane.innerHTML='<div class="empty">Select a system on the left.</div>';return;}
    if(s.none_needed||s.required===0){
      pane.innerHTML=`<h2>${esc(s.name)}</h2><div class="ps">${esc(s.system)}</div>
        <div class="none-card"><div class="big">✓</div><div>This system needs <b>no BIOS</b> files.<br>Just add games and play.</div></div>`;
      return;
    }
    const head=`<h2>${esc(s.name)}</h2><div class="ps">${esc(s.system)} · ${s.present_count}/${s.required} file${s.required!=1?'s':''} present`
      + (s.complete?' · <b style="color:#3fe0a0">ready to play</b>':' · <b style="color:#ffb27a">needs files</b>')+`</div>`;
    const rows=s.files.map(f=>{
      const mk=f.present?'<span class="mk y">✓</span>':'<span class="mk n">✗</span>';
      let md='';
      if(f.present){
        if(f.archive) md='<div class="md unk">archive — members not individually checked</div>';
        else if(f.md5_ok===true) md='<div class="md ok">md5 verified</div>';
        else if(f.md5_ok===false) md='<div class="md bad">present, but md5 does NOT match — wrong/corrupt file</div>';
        else md='<div class="md unk">present'+(f.md5_expected?' (not verified)':'')+'</div>';
      }
      const where=f.present?'Found in <code>'+esc(f.drop)+'</code>'
                           :'Drop the file <code>'+esc(f.file)+'</code> into <code>'+esc(f.drop)+'</code>';
      return `<div class="frow">${mk}<div><div class="fn">${esc(f.file)}</div>
        <div class="meta">${where}</div>${md}</div></div>`;
    }).join("");
    pane.innerHTML=head+rows;
    pane.scrollTop=0;
  }
  function render(){buildTabs();buildRail();buildPane();paint();
    const f=rail.querySelector(".sys.focus");if(f)f.scrollIntoView({block:"nearest"});}

  function moveSel(d){const n=filtered().length;if(!n)return;sel=(sel+d+n)%n;render();}
  function switchTab(d){tab=(tab+d+TABS.length)%TABS.length;sel=0;zone="rail";render();}
  function paneScrollable(){return pane.scrollHeight-pane.clientHeight>4;}

  // ONE input path: the bridge synthesizes these keys (docs/27 §2.1) — no getGamepads poll.
  addEventListener("keydown",e=>{const k=e.key;
    // tab-like filter switch (works in either zone)
    if(k==="["||k==="PageUp"){switchTab(-1);e.preventDefault();return;}
    if(k==="]"||k==="PageDown"){switchTab(1);e.preventDefault();return;}
    if(zone==="pane"){
      // pane zone: ↑↓ scroll the details, Left/B back to the rail (one level — §3.2/§3.10)
      if(k==="ArrowDown"||k==="Down"){pane.scrollTop+=80;}
      else if(k==="ArrowUp"||k==="Up"){pane.scrollTop-=80;}
      else if(k==="ArrowLeft"||k==="Left"||k==="Escape"||k==="Backspace"){zone="rail";render();}
      else return;e.preventDefault();return;
    }
    // rail zone
    if(k==="ArrowDown"||k==="Down")moveSel(1);
    else if(k==="ArrowUp"||k==="Up")moveSel(-1);
    else if(k==="ArrowRight"||k==="Right"||k==="Enter"||k===" "){
      if(paneScrollable()){zone="pane";render();}   // step into the details to read/scroll them
    }
    else if(k==="ArrowLeft"||k==="Left"){/* already at the leftmost zone — no-op */}
    else if(k==="Escape"||k==="Backspace"){location.href="gose-settings.html";}
    else return;e.preventDefault();});

  paint();
  function load(){
    fetch("/bios/status",{cache:"no-store"}).then(r=>r.json()).then(d=>{
      ALL=(d&&d.systems)||[]; biosDir=(d&&d.bios_dir)||biosDir; manifestOk=!!(d&&d.manifest_ok);
      // sort: systems you OWN games for first, then needs-setup, then alphabetical — most relevant on top
      ALL.sort((a,b)=>{
        if(a.has_games!==b.has_games)return a.has_games?-1:1;
        const am=(a.required>0&&!a.complete), bm=(b.required>0&&!b.complete);
        if(am!==bm)return am?-1:1;
        return (a.name||"").toLowerCase()<(b.name||"").toLowerCase()?-1:1;
      });
      const needs=ALL.filter(s=>s.required>0&&!s.complete).length;
      $("sub").textContent=!manifestOk
        ? "BIOS manifest unavailable on this image"
        : (ALL.length+" systems · "+needs+" need BIOS files · checked against /userdata/bios");
      if(!manifestOk){rail.innerHTML='';pane.innerHTML='<div class="empty">Could not read the Batocera BIOS manifest (/usr/bin/batocera-systems). Nothing to check.</div>';return;}
      sel=0; render();
    }).catch(()=>{$("sub").textContent="BIOS check offline";
      pane.innerHTML='<div class="empty">Could not reach the GOSE server.</div>';});
  }
  load();
</script>
<script src="assets/a11y.js"></script>
</body></html>
