<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Boot</title>
<link rel="stylesheet" href="assets/themes.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .logo{width:128px;height:128px;border-radius:32px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,var(--accent),var(--accent2));color:#06080e;font-weight:700;font-size:78px;
    box-shadow:0 20px 60px #0008;animation:pop .6s ease}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  h1{font-weight:700;font-size:54px;margin:18px 0 0;letter-spacing:1px}
  .sub{color:var(--muted);font-size:16px}
  .bar{width:320px;height:6px;border-radius:3px;background:var(--surface2);margin-top:40px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--accent);border-radius:3px;animation:load 3.2s ease forwards}
  @keyframes load{to{width:100%}}
  .status{color:var(--muted);font-size:13px;margin-top:12px}
  .foot{position:absolute;bottom:40px;color:#6b7080;font-size:13px}
</style></head>
<body>
  <div class="logo">G</div>
  <h1>GOSE</h1>
  <div class="sub">Gaming Operating System Emulator</div>
  <div class="bar"><i></i></div>
  <div class="status" id="status">Starting services…</div>
  <div class="foot">v0.1 · ROCKNIX · Snapdragon 8 Gen 2</div>
<script>
  // theme from saved preference
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const steps=["Starting services…","Loading controllers…","Mounting game library…","Launching desktop…"];
  let i=0;const s=document.getElementById("status");
  const t=setInterval(()=>{i++;if(i<steps.length)s.textContent=steps[i];},800);
  // after boot, go to login (comment out if you just want the splash)
  setTimeout(()=>{clearInterval(t);location.href="login.html";},3400);
</script>
</body></html>
