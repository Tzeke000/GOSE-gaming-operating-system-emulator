<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Home</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<link rel="stylesheet" href="assets/widget.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-500-normal.woff2) format('woff2');font-weight:500}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:#eaf0ff;position:relative;
    background:
      radial-gradient(58% 46% at 50% 36%, #2c2168aa, transparent 68%),
      radial-gradient(38% 16% at 50% 71%, #7b5cffcc, transparent 70%),
      radial-gradient(120% 70% at 50% 120%, #1a1340, transparent 60%),
      linear-gradient(180deg,#08080f 0%,#0d0b22 46%,#15103a 63%,#0a0a18 100%)}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  /* horizon glow line */
  .horizon{position:absolute;left:0;right:0;top:63%;height:1px;background:linear-gradient(90deg,transparent,#8f7bff88,transparent)}
  /* top bar */
  .top{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;gap:10px;padding:0 18px;z-index:5}
  .top img{width:26px;height:26px}
  .top .b{font-weight:700;font-size:15px;letter-spacing:.5px}
  .top .s{color:#9aa0c0;font-size:11px}
  .top .tray{margin-left:auto;display:flex;align-items:center;gap:14px;color:#c4cae6;font-size:13px}
  .top .tray .ic{font-size:16px;color:#c4cae6}
  /* left sidebar */
  .side{position:absolute;left:0;top:46px;bottom:0;width:92px;display:flex;flex-direction:column;gap:6px;
    padding:14px 8px;backdrop-filter:blur(6px);background:#0a0a16aa;border-right:1px solid #ffffff12;z-index:5}
  .nav{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:12px;color:#9aa0c0;cursor:pointer;
    background:var(--icon-tile);box-shadow:inset 0 0 0 1px var(--icon-tile-bd)}
  .nav .ic{font-size:21px}.nav span{font-size:11px}
  .nav.on{background:#6a4dff2e;color:#fff}.nav.on .ic{color:var(--accent)}
  /* centerpiece core + reflection */
  .stage{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;pointer-events:none}
  .core{width:240px;height:240px;margin:0;filter:drop-shadow(0 0 40px #7b5cff66);animation:fl 6s ease-in-out infinite;opacity:.55}
  .refl{position:relative;transform:scaleY(-1);width:184px;height:184px;margin-top:-22px;
    opacity:.14;filter:blur(2px);-webkit-mask:linear-gradient(#000,transparent 70%);mask:linear-gradient(#000,transparent 70%)}
  @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  /* bottom dock */
  .dock{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;
    background:#0c0c1ed0;border:1px solid #ffffff16;border-radius:16px;padding:8px 12px;backdrop-filter:blur(10px);z-index:6}
  .dock .d{width:44px;height:44px;border-radius:12px;background:var(--icon-tile);box-shadow:inset 0 0 0 1px var(--icon-tile-bd);display:flex;align-items:center;justify-content:center}
  .dock .d .ic{font-size:22px;color:#cdd2ea}.dock .d.on{background:#6a4dff3a}.dock .d.on .ic{color:#fff}
  .dock img{width:26px;height:26px}
  /* notifications tray bell + slide-in center */
  .tray .bell{cursor:pointer}
  .tray .badge{display:none;background:#ff5a6e;color:#fff;font-size:10px;font-weight:700;border-radius:9px;
    padding:0 5px;margin-left:-7px;margin-right:3px;position:relative;top:-7px}
  .tray .badge.on{display:inline-block}
  .ncenter{position:absolute;top:0;right:0;bottom:0;width:340px;max-width:90vw;background:#0c0c1ef2;
    border-left:1px solid #ffffff1f;backdrop-filter:blur(14px);z-index:30;transform:translateX(100%);
    transition:transform .22s ease;display:flex;flex-direction:column;padding:18px 16px}
  .ncenter.on{transform:translateX(0)}
  .ncenter .nh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .ncenter .nh h3{margin:0;font-size:16px}.ncenter .nh .clr{margin-left:auto;color:#8b92b0;font-size:12px;cursor:pointer}
  .ncenter .nlist{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .ncard{background:#ffffff0d;border:1px solid #ffffff14;border-radius:12px;padding:12px 14px;display:flex;gap:11px}
  .ncard .ni{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:#6a4dff33;color:#dfe5f5}
  .ncard .nt{font-weight:700;font-size:14px}.ncard .nb{color:#aeb4d2;font-size:12px;line-height:1.4;margin-top:2px}
  .ncenter .empty{color:#8b92b0;font-size:13px;text-align:center;margin-top:30px}
  /* hub (focal) inner display */
  .hub-clock{font-size:30px;font-weight:700;color:#eaf0ff;line-height:1.05}
  .hub-date{font-size:12px;color:#aeb4d2;margin:2px 0 8px}
  /* system widget stat rows (non-focusable display body) */
  .sys-row{display:flex;justify-content:space-between;font-size:12px;color:#aeb4d2;margin:5px 0}
  .sys-row b{color:#eaf0ff;font-weight:600}
  .dotw{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:0}
</style></head>
<body>
  <div class="horizon"></div>

  <div class="top">
    <img src="assets/brand/gose-crystal.png" alt="GOSE">
    <div><div class="b">GOSE</div></div><span class="s">Game Operating System Emulator</span>
    <div class="tray"><span class="ic bell" id="t-bell" data-i="bell" title="Notifications"></span><span id="t-badge" class="badge"></span><span class="ic" id="t-wifi" data-i="wifi" title="network"></span><span class="ic" id="t-bat" data-i="battery" title="battery"></span><span id="t-batpct"></span><span id="t-clock"></span></div>
  </div>

  <div class="side" id="side"></div>

  <div class="stage">
    <img class="core" src="assets/brand/gose-crystal.png" alt="GOSE Core">
    <img class="refl" src="assets/brand/gose-crystal.png" alt="">
  </div>

  <!-- desktop widgets are created + placed by the widget base (assets/widget.js)
       from the GW.define() declarations below — nothing is hand-placed here. -->

  <div class="ncenter" id="ncenter">
    <div class="nh"><span class="ic" data-i="bell"></span><h3>Notifications</h3><span class="clr" id="n-clear">Clear all</span></div>
    <div class="nlist" id="nlist"></div>
  </div>

  <div class="dock" id="dock"></div>

<script src="assets/icons.js"></script>
<script src="assets/notify.js"></script>
<script src="assets/sound.js"></script>
<script src="assets/cursor.js"></script>
<script src="assets/widget.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  var esc=GW.esc, fmtPlay=GW.fmtPlay;

  /* ---------- page chrome: side menu + dock (navigable as nav zones) ---------- */
  const NAV=[["library","Library","gose-library.html"],["files","Files","gose-files.html"],
             ["terminal-app","Terminal","gose-term.html"],["emulators","Emulators","gose-library.html"],
             ["ai","AI Players","gose-ai.html"],["settings-app","Settings","gose-settings.html"]];
  document.getElementById("side").innerHTML=NAV.map(([i,l,h],x)=>
    `<div class="nav ${x===0?'on':''}" data-go="${h}"><span class="ic" data-i="${i}"></span><span>${l}</span></div>`).join("");
  document.getElementById("dock").innerHTML=
    `<div class="d on" data-go="gose-apps.html" title="Apps"><span class="ic" data-i="apps"></span></div>`+
    [["store","Store","gose-store.html"],["cpu","Task Manager","gose-taskman.html"],["palette","Widgets","gose-widgets.html"],["power","Lock","gose-lock.html"]]
      .map(([i,l,h])=>`<div class="d" data-go="${h}" title="${l}"><span class="ic" data-i="${i}"></span></div>`).join("");
  // dock items use data-go; the widget-base nav handles activation, but mouse-clicks
  // outside the nav zones should still work, so give them a direct fallback too:
  document.querySelectorAll('#dock .d,#side .nav').forEach(el=>{ if(el.dataset.go)el.addEventListener('click',e=>{location.href=el.dataset.go;}); });
  GW.paintIcons(document);

  /* ===========================================================================
     WIDGET DECLARATIONS — every desktop widget, built on the ONE base.
     Default layout (1920×1080): Hub is the top-centre focal point; the content
     widgets are grouped in a left/centre block; the status widgets are grouped
     as a right-edge dock; Terminal sits under the launcher. All non-overlapping.
     =========================================================================== */

  // ---- HUB (focal, top-centre): clock + date + quick shortcuts ----
  GW.define({ id:"hub", title:"Hub", icon:"layout-grid", size:{w:320}, pos:{x:800,y:54},
    render:()=>({ body:'<div class="hub-clock" id="gw-hub-time"></div><div class="hub-date" id="gw-hub-date"></div>',
      pins:[ {icon:"apps",label:"All Apps",go:"gose-apps.html"},
             {icon:"games",label:"Games",go:"gose-library.html"},
             {icon:"settings-app",label:"Settings",go:"gose-settings.html"} ] }) });

  // ---- APPS & GAMES (content, tall left column): pins + recent games + recent apps ----
  const PAL=["#3a5fb0","#7a4ab0","#5a6b3a","#3a86b0","#b0683a","#c2a23a"];
  GW.define({ id:"appsgames", title:"Apps & Games", icon:"apps", size:{w:300}, pos:{x:110,y:180}, poll:10000,
    load:()=>Promise.all([
        fetch("/recent.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
        fetch("/games.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
        fetch("/apps.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({}))
      ]).then(([rc,g,ap])=>{
        const games=[], recent=((rc&&rc.games)||[]);
        if(recent.length) recent.slice(0,4).forEach((r,ci)=>games.push({label:r.game,sub:r.sysname,img:r.img||null,icon:"gamepad-2",color:PAL[ci%PAL.length],go:"gose-library.html"}));
        else { let ci=0; ((g&&g.systems)||[]).forEach(s=>s.games.slice(0,2).forEach(x=>{ if(games.length<4)games.push({label:x.name,sub:s.name,img:x.img||null,icon:"gamepad-2",color:PAL[ci++%PAL.length],go:"gose-library.html"}); })); }
        const apps=((ap&&ap.apps)||[]).slice(0,6).map(a=>({label:a.id,icon:"layout-grid",img:"/appicon?id="+a.id,cmd:"flatpak run "+a.id}));
        return {games,apps};
      }),
    render:(d)=>{ d=d||{}; const secs=[];
      if((d.games||[]).length) secs.push({label:"RECENT GAMES",items:d.games});
      if((d.apps||[]).length)  secs.push({label:"RECENT APPS", items:d.apps});
      return { pins:[ {icon:"apps",label:"All Apps",go:"gose-apps.html"},
                      {icon:"games",label:"All Games",go:"gose-library.html"},
                      {icon:"gallery",label:"Gallery",go:"gose-gallery.html"} ],
        sections:secs,
        footer:{icon:"search",label:"Search apps & games…",go:"gose-apps.html"},
        empty:"No games yet — open Library to add ROMs." }; } });

  // ---- EMULATORS (content): most-played & recent systems ----
  GW.define({ id:"wemulators", title:"Emulators", icon:"emulators", size:{w:300}, pos:{x:440,y:180}, poll:6000,
    load:()=>fetch('/widgets/emulators',{cache:'no-store'}).then(r=>r.json()),
    empty:"No emulator history yet — play a game to populate this.",
    render:(d)=>{ d=d||{}; const tile=e=>({icon:"gamepad-2",
        img:e.system?("/syslogo?system="+encodeURIComponent(e.system)):null,
        label:e.name,sub:(e.core||e.system)+" · "+fmtPlay(e.playtime_s),launch:(e.launch_hint||{system:e.system})});
      const secs=[]; if((d.top||[]).length)secs.push({label:"MOST PLAYED",items:d.top.slice(0,5).map(tile)});
      if((d.recent||[]).length)secs.push({label:"RECENT",items:d.recent.slice(0,3).map(tile)});
      return {sections:secs}; } });

  // ---- LIBRARY (content): recent & most-played games ----
  GW.define({ id:"wlibrary", title:"Library", icon:"library", size:{w:300}, pos:{x:770,y:180}, poll:6000,
    load:()=>fetch('/widgets/library',{cache:'no-store'}).then(r=>r.json()),
    empty:"No games played yet. Open the Library to add ROMs.",
    render:(d)=>{ d=d||{}; const tile=g=>({icon:"gamepad-2",img:g.img?("/fs/file?path="+encodeURIComponent(g.img)):null,
        label:g.name,sub:(g.sysname||g.system)+" · "+fmtPlay(g.playtime_s),launch:{system:g.system,game:g.game}});
      const secs=[]; if((d.recent||[]).length)secs.push({label:"RECENT",items:d.recent.slice(0,3).map(tile)});
      if((d.top||[]).length)secs.push({label:"MOST PLAYED",items:d.top.slice(0,4).map(tile)});
      return {sections:secs}; } });

  // ---- STORE (content): sample apps / emulators / games ----
  GW.define({ id:"wstore", title:"Store", icon:"store", size:{w:300}, pos:{x:1100,y:180}, poll:6000,
    load:()=>fetch('/widgets/store',{cache:'no-store'}).then(r=>r.json()),
    empty:"Store unavailable.",
    render:(d)=>{ d=d||{}; const t=(name,sub,tab,icon,img)=>({icon,img:img||null,label:name,sub:sub||tab,go:"gose-store.html?tab="+tab});
      const secs=[];
      // APPS: the app's real flatpak logo (/appicon) when present, else its named icon.
      if((d.apps||[]).length)secs.push({label:"APPS",items:d.apps.slice(0,2).map(a=>t(a.name,a.cat,'apps',a.icon||'download',a.id?("/appicon?id="+encodeURIComponent(a.id)):null))});
      // EMULATORS: per-system white logo (/syslogo), gamepad-2 fallback if a system has none.
      if((d.emulators||[]).length)secs.push({label:"EMULATORS",items:d.emulators.slice(0,2).map(e=>t(e.name,e.system,'emulators','gamepad-2',e.system?("/syslogo?system="+encodeURIComponent(e.system)):null))});
      // GAMES: a clear gamepad icon (no per-title art in the store sample).
      if((d.games||[]).length)secs.push({label:"GAMES",items:d.games.slice(0,2).map(g=>t(g.name,g.sysname||g.cat,'games','gamepad-2'))});
      return {sections:secs, footer:{icon:"store",label:"Open Store",go:"gose-store.html"}}; } });

  // ---- AI PLAYERS (content): Wren / Ava / Iris — status + tier + revoke ----
  const AIS=['Wren','Ava','Iris'], TC={observe:'#9aa3b8',play:'#5cd0ff',admin:'#ffb74d'}, TL={observe:'Observe',play:'Play',admin:'Admin'};
  GW.define({ id:"aiplayers", title:"AI Players", icon:"ai", size:{w:300}, pos:{x:770,y:440}, poll:5000,
    load:()=>Promise.all([fetch('/ai/grants',{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
                          fetch('/ai/players',{cache:'no-store'}).then(r=>r.json()).catch(()=>({}))])
            .then(([g,p])=>({grants:(g&&g.grants)||{},live:((p&&p.players)||[])})),
    render:(d)=>{ d=d||{grants:{},live:[]};
      const items=AIS.map(n=>{ const tier=(d.grants[n]&&d.grants[n].tier)||'observe', on=d.live.some(x=>x.name===n&&x.online);
        const it={icon:"ai",label:n,go:"gose-ai.html",
          chip:{text:TL[tier],color:TC[tier]} };
        it._dot=on; return it; });
      // online dot is drawn into the sub line via a tiny inline marker
      items.forEach(it=>{ it.sub=(it._dot?'● online':'○ offline'); });
      // revoke is a second action — expose as a per-row chip when tier>observe
      AIS.forEach((n,i)=>{ const tier=(d.grants[n]&&d.grants[n].tier)||'observe';
        if(tier!=='observe') items[i].chip={text:'Revoke',onActivate:()=>{
          fetch('/ai/revoke',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})})
            .then(()=>{ if(window.GOSE&&GOSE.notify)GOSE.notify({title:'AI access',body:n+' revoked → Observe only'}); GW.refresh('aiplayers'); }).catch(()=>{}); }};
      });
      const online=d.live.filter(x=>x.online).length;
      return {items, badge: online?{text:online+' live',dot:true}:null}; } });

  // ---- STEAM (content, opt-in): status + recent library ----
  GW.define({ id:"steam", title:"Steam", icon:"gamepad-2", size:{w:300}, pos:{x:1100,y:440}, poll:6000,
    load:()=>fetch('/widgets/steam',{cache:'no-store'}).then(r=>r.json()),
    render:(d)=>{ d=d||{};
      if(d.running&&d.logged_in){ const rg=(d.recent_games||[]);
        const items=rg.slice(0,5).map(g=>{const nm=g&&g.name?g.name:(''+g);return {icon:"gamepad-2",label:nm};});
        return {sections:[{label:"SIGNED IN"+(d.user?' · '+(''+d.user).toUpperCase():''),items}],
          footer:{icon:"gamepad-2",label:"Open Steam",launch:{app:"steam"}},
          empty:"Steam is running — open it for your library."}; }
      const why=!d.installed?'Steam isn’t installed':(d.running?'Steam is running — not signed in':'Steam — not running / not signed in');
      return { body:'<div class="gw-empty">'+esc(why)+'.</div>',
        footer: d.installed?{icon:"gamepad-2",label:"Launch Steam",launch:{app:"steam"}}
                           :{icon:"download",label:"Get Steam from the Store",go:"gose-store.html?tab=apps"} }; } });

  // ---- TERMINAL (content): single-action quick launch ----
  GW.define({ id:"wterminal", title:"Terminal", icon:"terminal-app", size:{w:300}, pos:{x:110,y:600},
    render:()=>({items:[{icon:"terminal-app",label:"Open Terminal",go:"gose-term.html"}]}) });

  // ---- CONTROLLERS (status dock): connected gamepads — COUNT BADGE, not a glow ----
  GW.define({ id:"controllers", title:"Controllers", icon:"gamepad-2", size:{w:250}, pos:{x:1650,y:54}, poll:6000,
    load:()=>fetch('/controllers',{cache:'no-store'}).then(r=>r.json()),
    empty:"No controllers connected.",
    render:(d)=>{ const cs=((d&&d.controllers)||[]);
      const items=cs.map(c=>({icon:"gamepad-2",label:c.name,sub:c.source||"connected",
        chip:c.is_os_admin?{text:"OS",color:"#ffb74d"}:null}));
      return {items, badge: cs.length?{text:String(cs.length),dot:true}:null}; } });

  // ---- NOTIFICATIONS (status dock): recent — UNREAD-COUNT BADGE, not a glow ----
  GW.define({ id:"notifs", title:"Notifications", icon:"notifications", size:{w:250}, pos:{x:1650,y:196}, poll:4000,
    empty:"No notifications.",
    render:()=>{ const a=(window.GOSE?GOSE.notifs():[]).slice(0,5);
      const items=a.map(n=>({icon:n.icon||"bell",label:n.title,sub:n.body}));
      const unread=window.GOSE&&GOSE.unread?GOSE.unread():0;
      return {items, badge: unread?{text:unread+" new",dot:true,muted:false}:null}; } });

  // ---- SYSTEM (status dock): live laptop telemetry; whole-widget opens Task Manager ----
  GW.define({ id:"system", title:"System", icon:"system", size:{w:250}, pos:{x:1650,y:430}, poll:2000,
    onActivate:()=>{ location.href='gose-taskman.html'; },
    load:()=>fetch("/sys/perf",{cache:"no-store"}).then(r=>r.json()).catch(()=>({ok:false})),
    render:(p)=>{ p=p||{ok:false};
      if(!p.ok) return {body:'<div class="gw-empty">Host telemetry unreachable.</div>', badge:{text:"offline",muted:true}};
      const gb=v=>(v/1024).toFixed(1);
      const temp=(p.cpu_temp_c!=null?Math.round(p.cpu_temp_c)+"°C":"—")+(p.gpu_temp_c!=null?"  ·  GPU "+Math.round(p.gpu_temp_c)+"°C":"");
      const optimal=(p.cpu_pct<85&&p.mem_pct<90);
      const rows=[["CPU",Math.round(p.cpu_pct)+"%"],["GPU",(p.gpu_pct!=null?Math.round(p.gpu_pct)+"%":"—")],
        ["Temp",temp],["Memory",gb(p.mem_used_mb)+" / "+gb(p.mem_total_mb)+" GB ("+p.mem_pct+"%)"],["Uptime",fmtUp(p.uptime_s)]];
      const body='<div>'+rows.map(r=>'<div class="sys-row"><span>'+r[0]+'</span><b>'+esc(r[1])+'</b></div>').join('')+
        '<div class="sys-row" style="margin-top:6px"><span><span class="dotw" style="background:'+(optimal?'#3fe0a0':'#ffb74d')+'"></span>Status</span><b>'+(optimal?'Optimal':'Busy')+'</b></div>'+
        '<div style="color:#7f86a6;font-size:11px;margin-top:6px;text-align:right">A — open Task Manager ›</div></div>';
      return {body, badge:{text:"live",dot:true}}; } });

  function fmtUp(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h?`${h}h ${m}m`:`${m}m`;}
  function fmtETA(s){ if(s==null||s<0)return null; const h=Math.floor(s/3600),m=Math.floor(s%3600/60); return h?`${h}h ${m}m`:`${m}m`; }

  // ---- BATTERY & POWER (status dock): real charge + suspend/restart/shutdown ----
  // Body shows the live charge (local /sys/class/power_supply on hardware, else the
  // laptop's real battery via the host bridge — battery_source is always honest).
  // Items are the pad-navigable power actions. Real ACPI-suspend is [needs hardware].
  // Direct, pad-navigable power action (handheld-style: the chosen action fires on A).
  // A pad-navigable confirm step for the destructive two is a future refinement.
  function powerAct(action,label){
    return ()=>{
      if(window.GOSESOUND)GOSESOUND.play(action==='suspend'?'sleep':action,{force:true});
      fetch('/sys/power',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action})}).then(r=>r.json()).then(j=>{
        if(window.GOSE&&GOSE.notify)GOSE.notify({title:'Power',icon:'power',
          body:(j&&j.simulated)?(label+' — '+(j.note||'simulated')):(label+(j&&j.ok?' requested':' failed'))});
      }).catch(()=>{}); }; }
  GW.define({ id:"battery", title:"Battery & Power", icon:"battery", size:{w:250}, pos:{x:1650,y:300}, poll:5000,
    load:()=>fetch('/sys/battery',{cache:'no-store'}).then(r=>r.json()).catch(()=>({ok:false})),
    render:(b)=>{ b=b||{};
      const items=[
        {icon:"moon",      label:"Suspend",  sub:"Sleep (resume on input)", onActivate:powerAct("suspend","Suspend")},
        {icon:"rotate-ccw",label:"Restart",  sub:"Reboot the system",       onActivate:powerAct("restart","Restart")},
        {icon:"power",     label:"Shut Down", sub:"Power off",              onActivate:powerAct("shutdown","Shut Down")}];
      if(!b.has_battery)
        return {body:'<div class="sys-row"><span>Battery</span><b>No battery</b></div>'+
                     '<div style="color:#7f86a6;font-size:11px;margin:4px 0 2px">Plugged-in / desktop</div>',
                items, badge:{text:"AC",muted:true}};
      const pct=(b.battery_pct==null?"—":b.battery_pct+"%");
      const state=b.charging?"Charging":"On battery";
      const eta=(!b.charging?fmtETA(b.secs_left):null);
      const rows=[["Charge",pct],["State",state]];
      if(eta)rows.push(["Time left",eta]);
      const src=b.battery_source?('<div style="color:#7f86a6;font-size:10px;margin-top:5px;text-align:right">src: '+esc(b.battery_source)+'</div>'):'';
      const low=(!b.charging&&b.battery_pct!=null&&b.battery_pct<=20);
      const body='<div>'+rows.map(r=>'<div class="sys-row"><span>'+r[0]+'</span><b>'+esc(r[1])+'</b></div>').join('')+src+'</div>';
      const badge=b.charging?{text:"AC",dot:true}:(low?{text:"low"}:{text:b.battery_pct+"%",muted:true});
      return {body, items, badge}; } });

  // mount everything (creates panels, places them, starts data loops, wires nav)
  GW.mount();

  /* ---------- hub + tray clock tick (updates text only — keeps focus stable) ---------- */
  function tick(){
    const fmt=localStorage.getItem("gose-clockfmt"), tz=localStorage.getItem("gose-tz");
    const opt={hour:'numeric', minute:'2-digit', hour12: fmt!=="24"}; if(tz)opt.timeZone=tz;
    const now=new Date(); let ts;
    try{ ts=now.toLocaleTimeString('en-US',opt); }catch(e){ ts=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
    const tc=document.getElementById("t-clock"); if(tc)tc.textContent=ts;
    const ht=document.getElementById("gw-hub-time"); if(ht)ht.textContent=ts;
    const hd=document.getElementById("gw-hub-date"); if(hd)hd.textContent=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }
  tick(); setInterval(tick, 5000);
  // keep the notifications widget fresh the moment something arrives
  window.addEventListener('gose-notify',()=>GW.refresh('notifs'));

  /* ---------- tray: real battery + wifi/online from host laptop (via /status.json) ---------- */
  const $=id=>document.getElementById(id);
  function setIcon(el,name){el.style.setProperty("--u",`url(assets/icons/${name}.svg)`);}
  // play the charging chime once when AC is plugged in (false->true edge)
  let _wasCharging=null;
  function chargeChime(d){ if(!d||!d.has_battery){_wasCharging=null;return;}
    if(_wasCharging===false && d.charging===true && window.GOSESOUND)GOSESOUND.play("charging");
    _wasCharging=!!d.charging; }
  function updateTray(d){
    chargeChime(d);
    const wifi=$("t-wifi"); wifi.style.opacity=d.online?1:.32; wifi.title=d.online?"Connected":"No internet";
    const bat=$("t-bat"),pct=$("t-batpct");
    if(d.has_battery){ bat.style.display=pct.style.display="";
      setIcon(bat,d.charging?"plug-zap":"battery"); bat.title=d.charging?"Charging":"On battery";
      pct.textContent=(d.battery_pct==null?"":d.battery_pct+"%");
    } else { bat.style.display=pct.style.display="none"; }
    lowBatteryCheck(d);
  }
  // Non-blocking low-battery warnings at 20% then 10% while discharging (docs/25 §5.1).
  // Each threshold fires once per discharge episode; re-arms when charging or recovered.
  const BAT_THRESHOLDS=[20,10]; let _batArmed={20:true,10:true};
  function lowBatteryCheck(d){
    if(!d||!d.has_battery||d.battery_pct==null){ return; }
    if(d.charging){ _batArmed={20:true,10:true}; return; }   // re-arm on charge
    BAT_THRESHOLDS.forEach(t=>{
      if(d.battery_pct>t){ _batArmed[t]=true; }               // re-arm when above threshold
      else if(_batArmed[t]){ _batArmed[t]=false;
        if(window.GOSE&&GOSE.notify)GOSE.notify({title:"Low battery",icon:"triangle-alert",
          sound:(t<=10?"battery-critical":"battery-low"),
          body:d.battery_pct+"% remaining — plug in soon."+(t<=10?" Critical.":"")});
      }
    });
  }
  async function pollTray(){ try{ const d=await (await fetch("/status.json",{cache:"no-store"})).json(); updateTray(d); }catch(e){} }
  pollTray(); setInterval(pollTray, 2000);

  /* ---------- wallpaper chosen in Settings ---------- */
  (function(){const WALLS=[
    "radial-gradient(120% 90% at 50% -10%, #1a1f3a 0%, #0c0c1e 55%, #07070f 100%)",
    "radial-gradient(120% 90% at 70% 0%, #161033 0%, #0a0a18 60%, #050509 100%)",
    "linear-gradient(160deg, #241634 0%, #131127 50%, #0a0a16 100%)",
    "linear-gradient(160deg, #1c1c22 0%, #121216 60%, #0a0a0c 100%)",
    "linear-gradient(165deg, #2a1730 0%, #1a1330 45%, #0c0c1e 100%)",
    "linear-gradient(160deg, #122318 0%, #0d1820 55%, #080c10 100%)"];
    const i=parseInt(localStorage.getItem("gose-wp")||"-1",10);
    if(i>=0&&i<WALLS.length){document.body.style.background=WALLS[i];document.body.style.backgroundAttachment="fixed";}
  })();
  /* ---------- live (animated) wallpaper ---------- */
  (function(){const mode=((location.hash.match(/live=(\w+)/)||[])[1])||localStorage.getItem("gose-live")||"off"; if(mode==="off")return;
    const cv=document.createElement("canvas"); cv.style.cssText="position:fixed;inset:0;z-index:0;pointer-events:none";
    document.body.insertBefore(cv,document.body.firstChild);
    const ctx=cv.getContext("2d"); let W,H;
    function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;} size(); addEventListener("resize",size);
    const N=mode==="starfield"?140:mode==="particles"?70:mode==="nebula"?5:0, ps=[], HUE=[180,210,260,280];
    for(let i=0;i<N;i++)ps.push({x:Math.random()*W,y:Math.random()*H,z:Math.random(),
      r:Math.random()*(mode==="nebula"?240:2.2)+(mode==="nebula"?120:.4),
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,hue:HUE[i%4]});
    let t=0;
    function frame(){t+=.005;
      if(mode==="aurora"){const g=ctx.createLinearGradient(0,0,W,H),a=(Math.sin(t)+1)/2,b=(Math.cos(t*.7)+1)/2;
        g.addColorStop(0,`hsl(${250+a*40},60%,${8+a*6}%)`);g.addColorStop(.5,`hsl(${200+b*60},55%,${6+b*5}%)`);
        g.addColorStop(1,`hsl(${280-a*30},50%,5%)`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
      else if(mode==="nebula"){ctx.fillStyle="rgba(7,7,15,.16)";ctx.fillRect(0,0,W,H);
        ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-p.r)p.x=W+p.r;if(p.x>W+p.r)p.x=-p.r;if(p.y<-p.r)p.y=H+p.r;if(p.y>H+p.r)p.y=-p.r;
          const rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);rg.addColorStop(0,`hsla(${p.hue},70%,55%,.10)`);rg.addColorStop(1,"transparent");
          ctx.fillStyle=rg;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});}
      else{ctx.fillStyle="rgba(7,7,15,.35)";ctx.fillRect(0,0,W,H);
        ps.forEach(p=>{if(mode==="starfield"){p.y+=.2+p.z*.6;if(p.y>H){p.y=0;p.x=Math.random()*W;}}
          else{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=`hsla(${p.hue},80%,75%,${.4+p.z*.5})`;ctx.fill();});}
      requestAnimationFrame(frame);}
    frame();
  })();

  /* ---------- notification center (bell in the tray) ---------- */
  (function(){ if(!window.GOSE)return; GOSE.seed&&GOSE.seed();
    const bell=document.getElementById("t-bell"),badge=document.getElementById("t-badge"),
          center=document.getElementById("ncenter"),nlist=document.getElementById("nlist");
    function refresh(){const u=GOSE.unread();badge.textContent=u;badge.classList.toggle("on",u>0);}
    function renderList(){const a=GOSE.notifs();
      nlist.innerHTML=a.length?a.map(n=>`<div class="ncard"><div class="ni"><span class="ic" data-i="${n.icon}"></span></div>
        <div><div class="nt">${n.title}</div><div class="nb">${n.body}</div></div></div>`).join("")
        :'<div class="empty">No notifications</div>';
      nlist.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));}
    function toggle(){const open=!center.classList.contains("on");center.classList.toggle("on",open);
      if(open){renderList();GOSE.markAllRead();refresh();}}
    if(bell)bell.onclick=toggle;
    const cl=document.getElementById("n-clear"); if(cl)cl.onclick=()=>{GOSE.clearNotifs();renderList();refresh();};
    addEventListener("keydown",e=>{if(e.key==="Escape"&&center.classList.contains("on")){center.classList.remove("on");e.preventDefault();}});
    window.addEventListener("gose-notify",refresh);
    refresh();
    if(location.hash.indexOf("notif")>=0)setTimeout(toggle,300);
  })();
</script>
