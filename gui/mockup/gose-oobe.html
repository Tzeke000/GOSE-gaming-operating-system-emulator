<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — First-time setup</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-500-normal.woff2) format('woff2');font-weight:500}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column;align-items:center}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .brand{display:flex;align-items:center;gap:12px;margin-top:42px}
  .brand img{width:40px;height:40px;filter:drop-shadow(0 0 8px #9a5bff55)}
  .brand .t{font-size:15px;color:var(--muted);font-weight:600;letter-spacing:.4px}
  .card{width:760px;max-width:92vw;margin-top:26px;background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:34px 38px;min-height:360px}
  .step-eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase}
  h1{font-size:30px;margin:8px 0 6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.5}
  /* account-type cards */
  .cards{display:flex;gap:16px}
  .pick{flex:1;background:var(--surface2);border:2px solid var(--line);border-radius:14px;padding:22px;cursor:pointer}
  .pick.sel{border-color:var(--accent);box-shadow:var(--focusglow)}
  .pick .ic{font-size:30px;color:var(--accent)}
  .pick h3{margin:12px 0 4px;font-size:18px}
  .pick p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
  .pick .badge{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;color:var(--accent);
    background:#5cd0ff1c;border:1px solid var(--line);border-radius:9px;padding:3px 9px}
  /* form fields */
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .input{display:flex;align-items:center;gap:10px;background:var(--surface2);border:2px solid var(--accent);
    border-radius:11px;padding:12px 14px;font-size:16px}
  .input.idle{border-color:var(--line)}
  .input .ph{color:var(--muted)}
  .input .ic{margin-left:auto;color:var(--muted);font-size:18px}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  /* identity swatches */
  .swatches{display:flex;gap:12px;margin-top:8px}
  .sw{width:46px;height:46px;border-radius:50%;border:3px solid transparent;cursor:pointer}
  .sw.sel{border-color:#fff}
  /* AI link rows */
  .row{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--line);
    border-radius:11px;padding:12px 14px;margin:8px 0}
  .row .ic{font-size:18px;color:var(--accent)}
  .row .nm{font-weight:600}.row .sub2{color:var(--muted);font-size:12px}
  .row .val{margin-left:auto;color:var(--accent);font-weight:600;font-size:14px}
  .agentpick{display:flex;gap:10px;margin-top:8px}
  .agentpick b{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:2px solid var(--line);
    border-radius:11px;padding:8px 14px;font-weight:600;font-size:14px;cursor:pointer}
  .agentpick b.sel{border-color:var(--accent);box-shadow:var(--focusglow)}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  /* done */
  .done-i{font-size:54px;color:var(--accent)}
  .summary{margin-top:16px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .summary div{display:flex;gap:10px;font-size:14px;margin:6px 0}
  .summary .k{color:var(--muted);width:130px}
  /* footer */
  .foot{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:16px;
    padding:16px 40px;color:var(--muted);font-size:13px}
  .dots{display:flex;gap:7px}
  .dots i{width:8px;height:8px;border-radius:50%;background:#ffffff22;display:inline-block}
  .dots i.on{background:var(--accent)}
  .foot .h{margin-left:auto}
  .btn{background:var(--accent);color:#06121a;border-radius:11px;padding:9px 20px;font-weight:700;font-size:14px}
  .btn.ghost{background:#ffffff10;color:var(--text)}
</style></head>
<body>
  <div class="brand"><img src="assets/brand/gose-core-mark.png" alt="GOSE Core"><span class="t">GOSE · first-time setup</span></div>
  <div class="card" id="card"></div>
  <div class="foot">
    <span class="dots" id="dots"></span>
    <span id="stepname"></span>
    <span class="h">D-pad move · <b>A</b> select · <b>B</b> back · on-screen keyboard for text</span>
  </div>
<script src="assets/platform.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const ACCENTS=["#5cd0ff","#7d8cff","#37d39b","#ff7a9c","#ffce5c","#b388ff"];
  // time zones — label -> IANA id (same set as desktop Settings)
  const TZONES=[
    ["Eastern — New York","America/New_York"],["Central — Chicago","America/Chicago"],
    ["Mountain — Denver","America/Denver"],["Pacific — Los Angeles","America/Los_Angeles"],
    ["UTC","UTC"],["London — GMT","Europe/London"],["Helsinki — EET","Europe/Helsinki"],
    ["Tokyo — JST","Asia/Tokyo"]];
  // The flow. AI-only steps are tagged so a Human account skips them.
  const STEPS=[
    {id:"welcome", name:"Welcome"},
    {id:"timezone",name:"Time zone"},
    {id:"type",    name:"Account type"},
    {id:"password",name:"Password"},
    {id:"username",name:"Username"},
    {id:"identity",name:"Identity"},
    {id:"ailink",  name:"AI link", aiOnly:true},
    {id:"role",    name:"Role"},
    {id:"done",    name:"Finish"},
  ];
  const state={type:"human", aiName:"", accent:"#5cd0ff",
    conn:{MCP:true, SSH:false, Console:false}, useHuman:true,
    tz: localStorage.getItem("gose-tz")||"America/New_York", tzAuto: localStorage.getItem("gose-tzauto")==="1"};
  const CONN=[
    {k:"MCP", sub:"Model Context Protocol — how Claude-style agents drive tools"},
    {k:"SSH", sub:"Shell over the network — scripts, files, console access"},
    {k:"Console", sub:"Direct local/serial console on the device"},
  ];

  function render(){
    const s=STEPS[idx], c=document.getElementById("card");
    let h="";
    if(s.id==="welcome"){
      h=`<div class="step-eyebrow">First ever boot</div>
        <h1>Welcome to GOSE</h1>
        <p class="sub">This device hasn't been set up yet. Let's create the first account.
        On GOSE, an account can belong to a <b>person</b> or to an <b>AI</b> — both log in the
        same way and share the device.</p>
        <span class="btn">Get started &nbsp;›</span>`;
    } else if(s.id==="timezone"){
      h=`<div class="step-eyebrow">Before we start — region</div>
        <h1>Pick your time zone</h1>
        <p class="sub">GOSE sets the clock from this. Turn on <b>automatic</b> to use your location when you're online — if there's no internet, GOSE keeps the last zone you used.</p>
        <div class="row" data-toggle="tzAuto" style="cursor:pointer"><span class="ic" data-i="globe"></span>
          <div><div class="nm">Set time zone automatically</div>
          <div class="sub2">From your location when online; otherwise keep the last zone</div></div>
          <span class="val">${state.tzAuto?'On':'Off'}</span></div>
        <label style="font-size:13px;color:var(--muted);display:block;margin:14px 0 7px">${state.tzAuto?'Current zone (auto)':'Choose your zone'}</label>
        <div style="max-height:168px;overflow:auto;display:flex;flex-direction:column;gap:6px;${state.tzAuto?'opacity:.45;pointer-events:none':''}">`+
        TZONES.map(z=>`<div class="row" data-tz="${z[1]}" style="cursor:pointer;margin:0">
          <span class="ic" data-i="clock"></span><div><div class="nm">${z[0]}</div></div>
          <span class="val">${state.tz===z[1]?'Selected ✓':''}</span></div>`).join("")+`</div>`;
    } else if(s.id==="type"){
      h=`<div class="step-eyebrow">Step 1 — who is this account for?</div>
        <h1>Human or AI?</h1>
        <p class="sub">Every GOSE user can be a human or one of your AI agents. You can add more later.</p>
        <div class="cards">
          <div class="pick ${state.type==='human'?'sel':''}"><span class="ic" data-i="user"></span>
            <h3>Human</h3><p>A person who plays with a controller or keyboard/mouse.</p>
            ${state.type==='human'?'<span class="badge">Selected</span>':''}</div>
          <div class="pick ${state.type==='ai'?'sel':''}"><span class="ic" data-i="sparkles"></span>
            <h3>AI</h3><p>Any agent you bring — you'll name it and pick how it connects. It can drive the OS or play games, on its own or alongside you.</p>
            ${state.type==='ai'?'<span class="badge">Selected</span>':''}</div>
        </div>`;
    } else if(s.id==="password"){
      h=`<div class="step-eyebrow">Step 2 — secure the account</div>
        <h1>Set a password</h1>
        <p class="sub">Used at the lock screen. ${state.type==='ai'?'For an AI account this is the human-side password; the AI itself connects with a pairing token (next).':'You can also set a short PIN for quick controller login.'}</p>
        <div class="field"><label>Password</label>
          <div class="input"><span>••••••••••</span><span class="ic" data-i="lock"></span></div></div>
        <div class="field"><label>Confirm password</label>
          <div class="input idle"><span>••••••••••</span><span class="ic" data-i="check"></span></div></div>
        <div class="field"><label>Quick PIN (optional)</label>
          <div class="input idle"><span class="ph">4–6 digits for fast login</span><span class="ic" data-i="keyboard"></span></div></div>`;
    } else if(s.id==="username"){
      h=`<div class="step-eyebrow">Step 3 — name the account</div>
        <h1>Choose a username</h1>
        <p class="sub">A short handle to log in with, plus a display name shown on the device.</p>
        <div class="field"><label>Username</label>
          <div class="input"><span>${state.type==='ai'?'wren':'zeke'}</span><span class="ic" data-i="user"></span></div></div>
        <div class="field"><label>Display name</label>
          <div class="input idle"><span>${state.type==='ai'?'Wren':'Zeke'}</span><span class="ic" data-i="keyboard"></span></div></div>`;
    } else if(s.id==="identity"){
      h=`<div class="step-eyebrow">Step 4 — make it yours</div>
        <h1>Pick an accent color</h1>
        <p class="sub">Your color marks your presence dot in the taskbar and your tile on the lock screen.</p>
        <div class="swatches">`+ACCENTS.map(a=>`<span class="sw ${state.accent===a?'sel':''}" style="background:${a}" data-acc="${a}"></span>`).join("")+`</div>
        <p class="hint">Avatar can be set later from a photo or an agent glyph.</p>`;
    } else if(s.id==="ailink"){
      h=`<div class="step-eyebrow">Step 5 — connect the agent</div>
        <h1>Set up the AI</h1>
        <p class="sub">Name your agent and choose how it connects. Works with any AI — not tied to a brand.</p>
        <div class="field"><label>AI name</label>
          <div class="input"><span>${state.aiName||'<span class="ph">e.g. Wren, Aria, Atlas…</span>'}</span><span class="ic" data-i="sparkles"></span></div></div>
        <label style="font-size:13px;color:var(--muted);display:block;margin:14px 0 7px">How it connects — select all that apply</label>
        <div class="agentpick">
          ${CONN.map(c=>`<b class="${state.conn[c.k]?'sel':''}" data-conn="${c.k}"><span class="dot" style="background:${state.conn[c.k]?'var(--accent)':'#3a3e4c'}"></span>${c.k}</b>`).join("")}
        </div>
        <div class="row" data-toggle="useHuman" style="cursor:pointer"><span class="ic" data-i="users"></span><div><div class="nm">Let this AI use a human's account</div>
          <div class="sub2">Sign in to a person's profile and act as them (e.g. your own agent on your account)</div></div>
          <span class="val">${state.useHuman?'On':'Off'}</span></div>
        <div class="row"><span class="ic" data-i="lock"></span><div><div class="nm">Pairing token</div>
          <div class="sub2">The agent presents this to connect</div></div><span class="val">Generate ›</span></div>
        <div class="row"><span class="ic" data-i="target"></span><div><div class="nm">Default control scope</div>
          <div class="sub2">What it can drive when it joins</div></div><span class="val">Whole OS ▸</span></div>`;
    } else if(s.id==="role"){
      h=`<div class="step-eyebrow">Step 6 — permissions</div>
        <h1>Account role</h1>
        <p class="sub">The first account is the <b>Owner</b>. Owners can change system settings, add users, and grant other accounts (human or AI) access. You can add Standard or Guest users afterward.</p>
        <div class="row"><span class="ic" data-i="shield"></span><div><div class="nm">Owner</div>
          <div class="sub2">Full control of the device — this account</div></div><span class="val">Selected</span></div>
        <div class="row"><span class="ic" data-i="user"></span><div><div class="nm">Standard / Guest</div>
          <div class="sub2">Play + personal settings only — add these later</div></div><span class="val">Later</span></div>`;
    } else if(s.id==="done"){
      h=`<div style="text-align:center"><span class="ic done-i" data-i="check"></span></div>
        <h1 style="text-align:center">You're all set</h1>
        <p class="sub" style="text-align:center">First account created. GOSE will boot to the lock screen from now on.</p>
        <div class="summary">
          <div><span class="k">Time zone</span><span>${state.tzAuto?'Automatic (from location)':((TZONES.find(z=>z[1]===state.tz)||['—'])[0])}</span></div>
          <div><span class="k">Type</span><span>${state.type==='ai'?'AI — '+(state.aiName||'unnamed agent'):'Human'}</span></div>
          <div><span class="k">Username</span><span>${state.type==='ai'?'(the AI name)':'zeke'}</span></div>
          <div><span class="k">Role</span><span>Owner</span></div>
          ${state.type==='ai'?`<div><span class="k">Connects via</span><span>${Object.keys(state.conn).filter(k=>state.conn[k]).join(', ')||'none yet'}</span></div>
          <div><span class="k">Use human account</span><span>${state.useHuman?'Allowed':'No'}</span></div>`:''}
          <div><span class="k">Sign-in</span><span>Password${state.type==='ai'?' + pairing token':' + optional PIN'}</span></div>
          <div><span class="k">Accent</span><span><span class="dot" style="display:inline-block;background:${state.accent}"></span></span></div>
        </div>
        <div style="text-align:center;margin-top:20px"><span class="btn">Enter GOSE &nbsp;›</span></div>`;
    }
    c.innerHTML=h;
    // dots
    const vis=STEPS.filter(st=>!st.aiOnly||state.type==='ai');
    document.getElementById("dots").innerHTML=vis.map(st=>`<i class="${st.id===s.id?'on':''}"></i>`).join("");
    document.getElementById("stepname").textContent=s.name;
    document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));
    // interactions
    c.querySelectorAll(".pick").forEach((el,i)=>el.onclick=()=>{state.type=i===0?'human':'ai';render();});
    c.querySelectorAll(".sw").forEach(el=>el.onclick=()=>{state.accent=el.dataset.acc;render();});
    c.querySelectorAll("[data-conn]").forEach(el=>el.onclick=()=>{const k=el.dataset.conn;state.conn[k]=!state.conn[k];render();});
    c.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>{const k=el.dataset.toggle;state[k]=!state[k];
      if(k==="tzAuto")localStorage.setItem("gose-tzauto",state.tzAuto?"1":"0");render();});
    c.querySelectorAll("[data-tz]").forEach(el=>el.onclick=()=>{state.tz=el.dataset.tz;localStorage.setItem("gose-tz",state.tz);render();});
    const next=c.querySelector(".btn"); if(next) next.onclick=()=>step(1);
  }

  let idx=0;
  function visibleSteps(){return STEPS.map((s,i)=>i).filter(i=>!STEPS[i].aiOnly||state.type==='ai');}
  function step(d){
    const vis=visibleSteps(); let pos=vis.indexOf(idx);
    if(pos<0){ // current step hidden (e.g. left AI flow) -> snap to nearest
      idx=vis[Math.min(vis.length-1,Math.max(0,pos))]||0; pos=vis.indexOf(idx);
    }
    let np=Math.min(vis.length-1,Math.max(0,pos+d));
    idx=vis[np];
    if(d>0 && idx===STEPS.findIndex(s=>s.id==="done")+0 && np===vis.length-1 && STEPS[vis[pos]].id==="done"){
      location.href="login.html"; return; // past the end
    }
    render();
  }
  // deep-link to a step for screenshots: gose-oobe.html#username  (or #ailink&ai)
  (function initHash(){
    const hash=(location.hash||"").replace("#","");
    const parts=hash.split("&");
    if(parts.includes("ai")) state.type="ai";
    const want=STEPS.findIndex(s=>s.id===parts[0]);
    if(want>=0) idx=want;
  })();

  addEventListener("keydown",e=>{
    if(e.key==="ArrowRight"||e.key==="Enter") step(1);
    else if(e.key==="ArrowLeft") step(-1);
    else return; e.preventDefault();});
  let prev={};(function pad(){const gp=navigator.getGamepads&&[...navigator.getGamepads()].find(x=>x);
    if(gp){const tap=i=>gp.buttons[i]&&gp.buttons[i].pressed&&!prev[i];
      if(tap(0))step(1); if(tap(1))step(-1); if(tap(14))step(-1); if(tap(15))step(1);
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);}requestAnimationFrame(pad);})();

  render();
</script>
<script src="assets/a11y.js"></script>
</body></html>
