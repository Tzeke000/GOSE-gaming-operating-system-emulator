<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Set up your device</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-500-normal.woff2) format('woff2');font-weight:500}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-attachment:fixed;display:flex;flex-direction:column;align-items:center}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .brand{display:flex;align-items:center;gap:12px;margin-top:34px}
  .brand img{width:36px;height:36px;filter:drop-shadow(0 0 8px #9a5bff55)}
  .brand .t{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:.4px}
  .card{width:780px;max-width:92vw;margin-top:20px;background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:30px 36px;min-height:392px;max-height:74vh;display:flex;flex-direction:column;
    position:relative;overflow:hidden}
  html:not([data-motion=reduce]) .card.anim{animation:cardin .34s cubic-bezier(.2,.8,.2,1) both}
  @keyframes cardin{0%{opacity:0;transform:translateY(12px) scale(.985)}100%{opacity:1;transform:none}}
  .step-eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase}
  /* per-step required/optional/default badges */
  .badges{display:flex;gap:8px;align-items:center;margin-bottom:6px;min-height:22px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1px solid;white-space:nowrap}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
  .badge.req{color:#ffce5c;border-color:#ffce5c5c;background:#ffce5c16}
  .badge.def{color:#37d39b;border-color:#37d39b5c;background:#37d39b16}
  .badge.opt{color:var(--muted);border-color:var(--line);background:#ffffff08}
  .badge.rec{color:var(--accent);border-color:#5cd0ff4d;background:#5cd0ff12}
  h1{font-size:27px;margin:7px 0 5px}
  .sub{color:var(--muted);font-size:14.5px;margin-bottom:18px;line-height:1.5}
  .scroll{overflow:auto;flex:1;margin:-4px -6px;padding:4px 6px}
  /* generic focusable rows / options */
  .opt{display:flex;align-items:center;gap:12px;background:var(--surface2);border:2px solid var(--line);
    border-radius:12px;padding:12px 15px;margin:8px 0;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .opt .ic{font-size:18px;color:var(--accent)}
  .opt .nm{font-weight:600;font-size:14.5px}.opt .sub2{color:var(--muted);font-size:12px;line-height:1.4;margin-top:2px}
  .opt .val{margin-left:auto;color:var(--accent);font-weight:700;font-size:13px;white-space:nowrap}
  .opt.sel{border-color:var(--accent);background:#5cd0ff12}
  .opt.focus{border-color:var(--accent);box-shadow:var(--focusglow);background:#5cd0ff14}
  .opt.focus .nm{color:var(--accent)}
  .opt.danger.focus{border-color:#ff8e8e;box-shadow:0 0 0 3px #ff8e8e33}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid2 .opt{margin:0}
  /* account fields */
  .field{margin:12px 0}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px}
  .inp{width:100%;background:var(--surface2);border:2px solid var(--line);border-radius:11px;padding:12px 14px;
    font-size:16px;color:var(--text);font-family:inherit;outline:none}
  .inp::placeholder{color:var(--muted)}
  .inp.focus,.inp:focus{border-color:var(--accent);box-shadow:var(--focusglow)}
  /* accent / theme swatches */
  .swatches{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
  .sw{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer}
  .sw.sel{border-color:#fff}.sw.focus{box-shadow:var(--focusglow);border-color:var(--accent)}
  /* toggle pill */
  .pill{margin-left:auto;width:46px;height:26px;border-radius:14px;background:#3a3e4c;position:relative;flex:none;transition:background .15s}
  .pill>i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s}
  .opt.on .pill{background:var(--accent)}.opt.on .pill>i{left:23px}
  /* license box */
  .terms{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    font-size:13px;color:var(--muted);line-height:1.6;max-height:184px;overflow:auto}
  .terms h4{color:var(--text);margin:10px 0 4px;font-size:13.5px}.terms h4:first-child{margin-top:0}
  /* token reveal */
  .token{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0c0f1c;border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;color:#7cffb0;font-size:13px;word-break:break-all;margin-top:8px}
  .pairok{display:flex;align-items:center;gap:8px;color:#37d39b;font-weight:600;font-size:13.5px;margin-top:10px}
  /* finale */
  .finale{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
  .ring{width:74px;height:74px;border-radius:50%;border:5px solid #ffffff18;border-top-color:var(--accent)}
  html:not([data-motion=reduce]) .ring{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .finale .logo{width:64px;height:64px;filter:drop-shadow(0 0 16px #6a4dffaa)}
  html:not([data-motion=reduce]) .finale .logo{animation:glow 2s ease-in-out infinite}
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 12px #6a4dff88)}50%{filter:drop-shadow(0 0 26px #5cd0ffcc)}}
  .checklist{margin-top:14px;text-align:left;font-size:13.5px;color:var(--muted);display:flex;flex-direction:column;gap:7px}
  .checklist .li{display:flex;align-items:center;gap:9px;opacity:.35;transition:opacity .3s}
  .checklist .li.on{opacity:1;color:var(--text)}
  .checklist .li .ic{color:#37d39b}
  /* step-complete flash overlay */
  .flash{position:absolute;inset:0;background:var(--surface);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;z-index:5}
  .flash .chk{width:90px;height:90px;border-radius:50%;background:#37d39b1f;border:2px solid #37d39b;
    display:flex;align-items:center;justify-content:center;color:#37d39b;font-size:46px}
  html:not([data-motion=reduce]) .flash .chk{animation:pop .42s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .flash .lbl{color:var(--text);font-weight:600;font-size:15px}
  /* footer */
  .foot{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:12px;
    padding:14px 40px;color:var(--muted);font-size:13px}
  .dots{display:flex;gap:6px}
  .dots i{width:7px;height:7px;border-radius:50%;background:#ffffff22;display:inline-block;transition:background .2s,width .2s}
  .dots i.on{background:var(--accent);width:16px;border-radius:4px}
  .dots i.done{background:#37d39b}
  .foot .keys{margin-left:auto;font-size:12px}
  .btns{display:flex;gap:10px}
  .btn{background:var(--accent);color:#06121a;border-radius:11px;padding:10px 22px;font-weight:700;font-size:14px;
    border:2px solid var(--accent);cursor:pointer}
  .btn.ghost{background:transparent;color:var(--text);border-color:var(--line)}
  .btn.focus{box-shadow:var(--focusglow)}
  .btn.ghost.focus{border-color:var(--accent)}
  .btn[disabled]{opacity:.45}
  .hint{color:#ffce5c;font-size:12.5px;margin-top:8px;min-height:16px}
  /* controller step: source chips + supported-families strip + keyboard fallback */
  .chip{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.5px;
    text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid;margin-left:8px;
    vertical-align:1px;white-space:nowrap}
  .chip.ai{color:#b388ff;border-color:#b388ff55;background:#b388ff14}
  .chip.hum{color:#37d39b;border-color:#37d39b55;background:#37d39b14}
  .fam{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;
    margin-top:12px;font-size:12.5px;color:var(--muted);line-height:1.55}
  .fam b{color:var(--text);font-weight:600}
  .fam .ic{font-size:14px;color:var(--accent);margin-right:7px}
  .kbline{color:var(--muted);font-size:12px;margin-top:9px}
  .kbline b{color:var(--text)}
</style></head>
<body>
  <div class="brand"><img src="assets/brand/gose-crystal.png" alt="GOSE"><span class="t">GOSE · set up your device</span></div>
  <div class="card" id="card"></div>
  <div class="foot">
    <span class="dots" id="dots"></span>
    <span id="stepname"></span>
    <span class="btns" id="footbtns"></span>
    <span class="keys">D-pad move · <b>A</b> select · <b>B</b> back · <b>R1</b> next · <b>L1</b> back</span>
  </div>
<script src="assets/platform.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/cursor.js"></script>
<script>
(function(){
  document.documentElement.dataset.theme = localStorage.getItem("gose-theme") || "onyx";
  var ACCENTS = ["#5cd0ff","#7d8cff","#37d39b","#ff7a9c","#ffce5c","#b388ff"];
  var THEMES = [["onyx","Onyx (dark)"],["midnight","Midnight"],["neon","Neon"],["aurora","Aurora (light)"]];
  var LANGS = [["en-US","English (United States)"],["en-GB","English (UK)"],["es-ES","Español"],
    ["fr-FR","Français"],["de-DE","Deutsch"],["pt-BR","Português (Brasil)"],["it-IT","Italiano"],
    ["ja-JP","日本語"],["zh-CN","简体中文"],["fi-FI","Suomi"]];
  var KBDS = [["us","US QWERTY"],["uk","UK QWERTY"],["es","Spanish"],["fr","French (AZERTY)"],
    ["de","German (QWERTZ)"],["pt","Portuguese"],["it","Italian"],["jp","Japanese"],["fi","Finnish"],
    ["intl","US International"]];

  // collected answers
  var S = {
    locale:"en-US", keyboard:"us", net:null,
    license:false,
    account:{username:"", display:"", password:"", pin:"", accent:"#5cd0ff", has_password:false, has_pin:false},
    privacy:{boxart_scrape:false, telemetry:false, online:false},
    theme: localStorage.getItem("gose-theme")||"onyx",
    device_name:"GOSE",
    ai:{name:"", token:null, paired:false}
  };

  // kind: "required" (no skip, Continue gated until satisfied) |
  //       "default"  (pre-selected sensible default, one-button Continue) |
  //       "optional" (clear Skip + "Optional" badge; skipping has no side effects)
  var STEPS = [
    {id:"welcome", name:"Welcome"},
    {id:"language", name:"Language", kind:"default"},
    {id:"keyboard", name:"Keyboard", kind:"default"},
    {id:"controller", name:"Controller", kind:"default"},
    {id:"network", name:"Network", kind:"optional", skip:true, skipLabel:"Skip for now", recommended:true},
    {id:"license", name:"License", kind:"required"},
    {id:"account", name:"Account", kind:"required"},
    {id:"privacy", name:"Privacy", kind:"optional", skip:true},
    {id:"customize", name:"Personalize", kind:"optional", skip:true},
    {id:"ai", name:"AI companion", kind:"optional", skip:true},
    {id:"ready", name:"Finish"}
  ];
  var idx = 0;
  var card = document.getElementById("card");
  // The shared on-screen keyboard (cursor.js, #osk) owns input WHILE IT IS VISIBLE. Key off its
  // actual visibility — NOT mere field focus — so closing the OSK (it doesn't blur the field)
  // instantly hands navigation back instead of trapping focus in a closed keyboard.
  function oskVisible(){ var o=document.getElementById("osk"); return !!(o&&o.classList.contains("on")); }

  function reduce(){ return document.documentElement.getAttribute("data-motion")==="reduce"; }
  function api(path, body){ return fetch(path, body?{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)}:{cache:"no-store"}).then(function(r){return r.json();}).catch(function(){return {ok:false};}); }
  function ico(n){ return '<span class="ic" data-i="'+n+'"></span>'; }
  function paintIcons(){ if(window.GICON){ GICON.paint(document); return; }
    document.querySelectorAll("[data-i]").forEach(function(e){
      e.style.setProperty("--u","url(assets/icons/"+e.dataset.i+".svg)"); }); }

  // ---- spatial roving focus over .focusable (login.html idiom; layout-agnostic) ----
  function focusables(){ return [].slice.call(document.querySelectorAll(".focusable"))
    .filter(function(el){ return el.offsetParent!==null; }); }
  function cur(){ return document.querySelector(".focus"); }
  function setF(el){ if(!el) return; var c=cur(); if(c)c.classList.remove("focus");
    el.classList.add("focus"); el.scrollIntoView({block:"nearest"});
    try{ GOSE&&GOSE.sound&&GOSE.sound("nav"); }catch(e){} }
  function move(d){
    var a=cur()||focusables()[0]; if(!a) return; var r=a.getBoundingClientRect();
    var best=null, bd=1e9, list=focusables();
    for(var i=0;i<list.length;i++){ var el=list[i]; if(el===a) continue;
      var b=el.getBoundingClientRect();
      var dx=(b.left+b.width/2)-(r.left+r.width/2), dy=(b.top+b.height/2)-(r.top+r.height/2);
      var ok={right:dx>6,left:dx<-6,down:dy>6,up:dy<-6}[d]; if(!ok) continue;
      var al=(d==="left"||d==="right")?Math.abs(dx):Math.abs(dy);
      var of=(d==="left"||d==="right")?Math.abs(dy):Math.abs(dx);
      var dd=al+of*2; if(dd<bd){ bd=dd; best=el; } }
    if(best){ if(document.activeElement&&document.activeElement.blur)document.activeElement.blur(); setF(best); }
  }

  // ---- per-step renderers ----
  function render(){
    var s=STEPS[idx];
    if(padPoll){ clearInterval(padPoll); padPoll=null; padSig=""; }   // controller-step poll ends with the step
    var h="";
    if(s.id==="welcome"){
      h='<div class="step-eyebrow">First-time setup</div>'+
        '<h1>Welcome to GOSE</h1>'+
        '<p class="sub">A controller-first gaming OS. We\'ll set up your language, controller, '+
        'account, and a few preferences. It only takes a minute — everything here can be changed later '+
        'in Settings, and GOSE works fully offline.</p>'+
        '<div class="opt focusable" data-act="continue"><span class="ic" data-i="play"></span>'+
        '<div><div class="nm">Get started</div><div class="sub2">Set up this device now</div></div>'+
        '<span class="val">A ›</span></div>';
    } else if(s.id==="language"){
      h='<div class="step-eyebrow">Step 1 — region</div><h1>Choose your language</h1>'+
        '<p class="sub">GOSE will use this for menus and the clock format.</p>'+
        '<div class="scroll">'+LANGS.map(function(l){
          return '<div class="opt focusable'+(S.locale===l[0]?' sel':'')+'" data-opt="locale" data-v="'+l[0]+'">'+
            ico("globe")+'<div class="nm">'+l[1]+'</div>'+
            '<span class="val">'+(S.locale===l[0]?"Selected ✓":"")+'</span></div>'; }).join("")+'</div>';
    } else if(s.id==="keyboard"){
      h='<div class="step-eyebrow">Step 2 — input</div><h1>Keyboard layout</h1>'+
        '<p class="sub">Used by the on-screen keyboard and any physical keyboard you connect.</p>'+
        '<div class="scroll">'+KBDS.map(function(k){
          return '<div class="opt focusable'+(S.keyboard===k[0]?' sel':'')+'" data-opt="keyboard" data-v="'+k[0]+'">'+
            ico("keyboard")+'<div class="nm">'+k[1]+'</div>'+
            '<span class="val">'+(S.keyboard===k[0]?"Selected ✓":"")+'</span></div>'; }).join("")+'</div>';
    } else if(s.id==="controller"){
      h='<div class="step-eyebrow">Step 3 — controller</div>'+
        '<h1>Press any button on the controller you want to use</h1>'+
        '<p class="sub">Every connected pad can drive first-time setup — if a controller moves this '+
        'screen, it already works. The <b>highlighted</b> one below becomes this device\'s owner when '+
        'you continue. Recognized pads are translated to one standard layout automatically — '+
        'no mapping needed.</p>'+
        '<div class="scroll"><div id="pads"><div class="opt"><span class="ic" data-i="gamepad-2"></span>'+
        '<div class="nm">Looking for controllers…</div></div></div>'+
        '<div class="fam">'+ico("gamepad-2")+'<b>Works out of the box:</b> Xbox · PlayStation 4 / 5 · '+
        'Switch Pro &amp; Joy-Con · 8BitDo · Steam — <span id="dbcount">and hundreds more</span> '+
        '(USB, Bluetooth, or 2.4&nbsp;GHz dongle). New pads appear here within a couple of seconds.</div>'+
        '<div class="kbline">No controller? A <b>keyboard</b> always works — arrow keys move, '+
        '<b>Enter</b> selects, <b>Esc</b> goes back.</div>'+
        '<div class="hint" id="padhint"></div></div>';
    } else if(s.id==="network"){
      h='<div class="step-eyebrow">Step 4 — network (optional)</div><h1>Connect to Wi-Fi</h1>'+
        '<p class="sub">Wi-Fi enables updates and optional online features. GOSE works fully offline — '+
        'you can <b>skip</b> this and connect later.</p>'+
        '<div class="scroll" id="nets"><div class="opt"><span class="ic" data-i="wifi"></span>'+
        '<div class="nm">Scanning for networks…</div></div></div>'+
        '<div class="hint" id="nethint"></div>';
    } else if(s.id==="license"){
      h='<div class="step-eyebrow">Step 5 — terms</div><h1>License agreement</h1>'+
        '<p class="sub">Please review and accept to continue.</p>'+
        '<div class="terms" tabindex="0">'+
        '<h4>GOSE End-User Terms (summary)</h4>'+
        'GOSE is provided as-is, without warranty. It is built on open-source software (Batocera and the '+
        'Linux kernel); the corresponding source and component licenses are available in '+
        '<b>Apps → Licenses</b>.'+
        '<h4>Emulation & your content</h4>'+
        'GOSE plays game files you provide. You are responsible for ensuring you have the right to use any '+
        'games, BIOS, or media you add. Some optional emulator cores are licensed for personal use only and '+
        'are offered as separate, user-initiated installs from the Store.'+
        '<h4>Privacy</h4>'+
        'GOSE collects no analytics by default and makes no automatic outbound connections. Every online '+
        'feature is opt-in — you choose them on the next screen.'+
        '</div>'+
        '<div class="opt focusable'+(S.license?' on sel':'')+'" data-toggle="license" style="margin-top:12px">'+
        ico("check")+'<div class="nm">I have read and accept the terms</div>'+
        '<span class="pill"><i></i></span></div>';
    } else if(s.id==="account"){
      h='<div class="step-eyebrow">Step 6 — your account</div><h1>Create your account</h1>'+
        '<p class="sub">This first account is the device <b>owner</b>. Select a field and the on-screen '+
        'keyboard appears — type with the controller, then press <b>B</b> to close it.</p>'+
        '<div class="scroll">'+
        '<div class="field"><label>Username</label>'+
          '<input class="inp focusable" data-field="username" placeholder="e.g. alex" value="'+esc(S.account.username)+'"></div>'+
        '<div class="field"><label>Display name (optional)</label>'+
          '<input class="inp focusable" data-field="display" placeholder="Shown on the lock screen" value="'+esc(S.account.display)+'"></div>'+
        '<div class="grid2">'+
          '<div class="field"><label>Password (optional)</label>'+
            '<input class="inp focusable" data-field="password" type="password" placeholder="••••••" value="'+esc(S.account.password)+'"></div>'+
          '<div class="field"><label>Quick PIN (optional)</label>'+
            '<input class="inp focusable" data-field="pin" inputmode="numeric" placeholder="4–6 digits" value="'+esc(S.account.pin)+'"></div>'+
        '</div>'+
        '<div class="field"><label>Your color</label>'+
          '<div class="swatches">'+ACCENTS.map(function(a){
            return '<span class="sw focusable'+(S.account.accent===a?' sel':'')+'" data-acc="'+a+'" style="background:'+a+'"></span>'; }).join("")+'</div></div>'+
        '</div>';
    } else if(s.id==="privacy"){
      var P=[["boxart_scrape","image","Download missing cover art","Looks up box art online (sends game names to thumbnails.libretro.com). Off by default."],
             ["telemetry","cpu","Share anonymous diagnostics","Help improve GOSE. Nothing is sent unless you turn this on."],
             ["online","cloud","Allow online features","Lets features like updates reach the internet when you use them."]];
      h='<div class="step-eyebrow">Step 7 — privacy</div><h1>Privacy choices</h1>'+
        '<p class="sub">Everything is <b>off</b> by default — GOSE sends nothing unless you opt in here. '+
        'You can change any of these later in Settings → Privacy.</p>'+
        '<div class="scroll">'+P.map(function(p){
          return '<div class="opt focusable'+(S.privacy[p[0]]?' on':'')+'" data-toggle="'+p[0]+'">'+
            ico(p[1])+'<div><div class="nm">'+p[2]+'</div><div class="sub2">'+p[3]+'</div></div>'+
            '<span class="pill"><i></i></span></div>'; }).join("")+'</div>';
    } else if(s.id==="customize"){
      h='<div class="step-eyebrow">Step 8 — personalize</div><h1>Make it yours</h1>'+
        '<p class="sub">Pick a theme and name your device. (Optional — tweak more in Settings.)</p>'+
        '<div class="field"><label>Theme</label><div class="grid2">'+THEMES.map(function(t){
          return '<div class="opt focusable'+(S.theme===t[0]?' sel':'')+'" data-opt="theme" data-v="'+t[0]+'">'+
            ico("palette")+'<div class="nm">'+t[1]+'</div>'+
            '<span class="val">'+(S.theme===t[0]?"✓":"")+'</span></div>'; }).join("")+'</div></div>'+
        '<div class="field"><label>Device name</label>'+
          '<input class="inp focusable" data-field="device_name" placeholder="GOSE" value="'+esc(S.device_name)+'"></div>';
    } else if(s.id==="ai"){
      h='<div class="step-eyebrow">Step 9 — AI companion (optional)</div><h1>Pair an AI companion</h1>'+
        '<p class="sub">GOSE can pair with an AI agent that observes and (with your later permission) helps '+
        'out. Pairing issues a token at the safe <b>Observe</b> tier — read-only. You grant more anytime in '+
        'the <b>AI Hub</b>. This is optional — you can <b>skip</b> and pair later.</p>'+
        '<div class="field"><label>AI name</label>'+
          '<input class="inp focusable" data-field="ai_name" placeholder="e.g. Nova, Aria, Atlas…" value="'+esc(S.ai.name)+'"></div>'+
        '<div class="opt focusable" data-act="pair"><span class="ic" data-i="sparkles"></span>'+
          '<div><div class="nm">'+(S.ai.paired?"Re-issue pairing token":"Pair this AI (Observe)")+'</div>'+
          '<div class="sub2">Creates an entry in the AI Hub with a read-only token</div></div>'+
          '<span class="val">A</span></div>'+
        '<div id="pairout">'+(S.ai.paired?pairBlock():"")+'</div>';
    } else if(s.id==="ready"){
      h='<div class="finale" id="finale">'+
        '<img class="logo" src="assets/brand/gose-crystal.png" alt="">'+
        '<div class="ring" id="ring"></div>'+
        '<h1 style="margin-top:10px">Getting things ready…</h1>'+
        '<p class="sub" id="finlbl">Finishing setup</p>'+
        '<div class="checklist" id="chk"></div></div>';
    }
    card.innerHTML = badgeRow(s) + h;
    if(!reduce()) card.classList.remove("anim"), void card.offsetWidth, card.classList.add("anim");
    paintIcons();
    buildFooter();
    buildDots();
    document.getElementById("stepname").textContent = s.name;
    wireStep(s);
    // initial focus: first focusable in the card (or the primary footer button)
    var first = card.querySelector(".focusable") || document.querySelector("#footbtns .focusable");
    setF(first);
  }

  // per-step badge row: makes Required vs Optional vs Default-ready unmistakable
  function badgeRow(s){
    if(s.id==="welcome"||s.id==="ready") return "";  // intro + finale carry no badge
    var b=[];
    if(s.kind==="required")      b.push('<span class="badge req"><span class="dot"></span>Required</span>');
    else if(s.kind==="default")  b.push('<span class="badge def"><span class="dot"></span>Default ready</span>');
    else if(s.kind==="optional"){ b.push('<span class="badge opt">Optional</span>');
      if(s.recommended) b.push('<span class="badge rec"><span class="dot"></span>Recommended</span>'); }
    return '<div class="badges">'+b.join("")+'</div>';
  }
  function esc(v){ return String(v||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
  function pairBlock(){ return '<div class="pairok">'+ico("check")+'Paired — added to the AI Hub (Observe tier)</div>'+
    (S.ai.token?'<div class="token">Pairing token: '+S.ai.token+'</div>':''); }

  function buildDots(){
    document.getElementById("dots").innerHTML = STEPS.map(function(st,i){
      return '<i class="'+(i<idx?"done":(i===idx?"on":""))+'"></i>'; }).join("");
  }
  function buildFooter(){
    var s=STEPS[idx], fb=document.getElementById("footbtns");
    if(s.id==="welcome"||s.id==="ready"){ fb.innerHTML=""; return; }
    var last = (idx===STEPS.length-2); // step before "ready"
    var contLbl = last ? "Finish ›" : "Continue ›";
    var html='<span class="btn ghost focusable" data-act="back">‹ Back</span>';
    if(s.skip) html+='<span class="btn ghost focusable" data-act="skip">'+(s.skipLabel||"Skip")+' ›</span>';
    html+='<span class="btn focusable" data-act="continue" id="contbtn">'+contLbl+'</span>';
    fb.innerHTML=html;
    refreshGate();  // required steps start with Continue disabled until satisfied
  }
  // Required steps gate the Continue button; default/optional steps never block it.
  function refreshGate(){
    var cb=document.getElementById("contbtn"); if(!cb) return;
    if(STEPS[idx].kind==="required" && canAdvance()){ cb.setAttribute("disabled",""); return; }
    cb.removeAttribute("disabled");
    // a required step that just became satisfied: drop any stale "please do X" hint so it
    // never sits next to an enabled Continue button.
    if(STEPS[idx].kind==="required"){ var h=card.querySelector(".hint"); if(h) h.textContent=""; }
  }

  function wireStep(s){
    if(s.id==="controller"){ loadDbCount(); padFresh=true; loadControllers();
      // live list: the host hot-plugs new pads in ~1s; poll the registry while this step shows
      padPoll=setInterval(loadControllers, 2000); }
    if(s.id==="network") loadNetworks();
    if(s.id==="ready") runFinale();
    // live-capture text fields so the required-account gate updates as you type (incl. via the OSK)
    [].slice.call(card.querySelectorAll("input[data-field]")).forEach(function(inp){
      inp.addEventListener("input", function(){ captureInputs(); refreshGate(); }); });
    wireClicks();
  }
  // mouse support (preview): click activates — re-run after any partial re-render adds focusables
  function wireClicks(){
    [].slice.call(document.querySelectorAll(".focusable")).forEach(function(el){
      el.onclick=function(){ if(document.activeElement&&document.activeElement.blur&&el.tagName!=="INPUT")document.activeElement.blur();
        setF(el); activate(el); }; });
  }

  // ---- controller step: live registry list + supported-families count ----
  // All controller knowledge comes from the SERVER (GET /controllers) per docs/27 §2 — the
  // bridge/registry is the single input authority; this page never reads the pad itself.
  var padPoll=null, padSig="", padFresh=true;
  var SRC_LABEL={virtual:"AI virtual controller", passthrough:"wireless / USB",
                 bluetooth:"Bluetooth", native:"USB / built-in"};
  function loadControllers(){
    api("/controllers").then(function(d){
      var box=document.getElementById("pads"); if(!box) return;
      var pads=(d&&d.controllers)||[];
      var admin=(d&&d.admin)||null;
      // skip identical re-renders so the 2 s poll never disturbs focus (docs/27 §3.9)
      var sig=pads.map(function(p){ return p.id+"|"+p.name+"|"+p.source+"|"+(p.id===admin?1:0); }).join(";");
      if(sig===padSig) return;
      var focusedPad=null, c=cur();
      if(c&&c.dataset&&c.dataset.pad!==undefined&&box.contains(c)) focusedPad=c.dataset.pad;
      padSig=sig;
      if(!pads.length){
        box.innerHTML='<div class="opt"><span class="ic" data-i="gamepad-2"></span>'+
          '<div><div class="nm">No controller detected yet</div><div class="sub2">Plug one in (USB) or pair '+
          'over Bluetooth — it shows up here automatically. You can also finish setup on the keyboard.</div></div></div>';
      } else {
        box.innerHTML=pads.map(function(p){
          var isAdmin=(p.id===admin), isAI=(p.source==="virtual");
          return '<div class="opt focusable'+(isAdmin?' sel':'')+'" data-pad="'+esc(p.id)+'" data-admin="'+(isAdmin?1:0)+'">'+
            '<span class="ic" data-i="gamepad-2"></span>'+
            '<div><div class="nm">'+esc(p.name||"Controller")+
              '<span class="chip '+(isAI?"ai":"hum")+'">'+(isAI?"AI":"Player")+'</span></div>'+
            '<div class="sub2">'+esc(SRC_LABEL[p.source]||p.source||"connected")+' · recognized — standard layout applied</div></div>'+
            '<span class="val">'+(isAdmin?"Sets up this device ✓":"Connected ✓")+'</span></div>'; }).join("");
      }
      paintIcons(); wireClicks();
      // FIRST population only: the step renders before this async fetch, so initial focus fell
      // to the footer — move it onto the would-be-owner card (A there = confirm + continue).
      // Found by pad-drive 2026-06-07: Return right after entering the step hit footer "Back".
      // Later refreshes never steal focus (docs/27 §3.9).
      if(padFresh && pads.length){ padFresh=false;
        if(focusedPad===null) setF(box.querySelector('[data-admin="1"]')||box.querySelector(".focusable"));
        return; }
      // keep (or recover) focus across the refresh — never reset to 0 mid-navigation
      if(focusedPad!==null && !document.querySelector('[data-pad="'+focusedPad+'"]')){
        setF(box.querySelector(".focusable")||document.querySelector("#footbtns .focusable"));
      } else if(focusedPad!==null){
        var keep=document.querySelector('[data-pad="'+focusedPad+'"]');
        if(keep&&!keep.classList.contains("focus")) setF(keep);
      }
    });
  }
  // honest supported-models count: count platform:Linux rows in the DEPLOYED controller DB
  // (the same file the bridge's Normalizer loads) instead of hardcoding a marketing number.
  var dbTried=false;
  function loadDbCount(){
    if(dbTried){ return; } dbTried=true;
    fetch("gamecontrollerdb.txt",{cache:"no-store"}).then(function(r){ return r.ok?r.text():""; })
      .then(function(t){
        var n=0, lines=t.split("\n");
        for(var i=0;i<lines.length;i++){ var l=lines[i];
          if(l && l.charAt(0)!=="#" && l.indexOf("platform:Linux")>=0) n++; }
        if(n>0){ var el=document.getElementById("dbcount");
          if(el) el.textContent="and a built-in database recognizes "+n+" controller models"; }
      }).catch(function(){ /* keep the honest static fallback text */ });
  }

  function loadNetworks(){
    api("/net/scan").then(function(d){
      var box=document.getElementById("nets"); var hint=document.getElementById("nethint"); if(!box) return;
      var nets=(d&&(d.networks||d.aps||d.results))||[];
      // normalize a few possible shapes
      if(d&&d.ok&&Array.isArray(d.list)) nets=d.list;
      if(!Array.isArray(nets)) nets=[];
      if(!nets.length){ box.innerHTML='<div class="opt"><span class="ic" data-i="wifi"></span>'+
        '<div><div class="nm">No networks found</div><div class="sub2">You can skip — GOSE works fully offline.</div></div></div>';
        if(hint) hint.textContent="Tip: press Skip to continue without Wi-Fi."; paintIcons();
        var s=card.querySelector(".focusable"); return; }
      box.innerHTML=nets.map(function(n){ var ssid=n.ssid||n.name||n.SSID||String(n);
        return '<div class="opt focusable" data-net="'+esc(ssid)+'"><span class="ic" data-i="wifi"></span>'+
          '<div class="nm">'+esc(ssid)+'</div>'+
          '<span class="val">'+((S.net===ssid)?"Connected ✓":"Connect ›")+'</span></div>'; }).join("");
      paintIcons();
      wireStep({id:"network-list"});  // attach click handlers to new rows
    });
  }
  function joinNetwork(ssid){
    var hint=document.getElementById("nethint"); if(hint) hint.textContent="Connecting to "+ssid+"…";
    api("/net/connect",{ssid:ssid}).then(function(d){
      if(d&&d.ok){ S.net=ssid; if(hint) hint.textContent="Connected to "+ssid+" ✓"; }
      else { if(hint) hint.textContent="Couldn't connect — you can skip and set it up later."; }
      loadNetworks();
    });
  }

  function doPair(){
    var name=(S.ai.name||"").trim(); var out=document.getElementById("pairout");
    if(!name){ if(out) out.innerHTML='<div class="hint" style="color:#ffce5c">Enter an AI name first.</div>'; return; }
    if(out) out.innerHTML='<div class="sub2" style="margin-top:8px">Pairing '+esc(name)+'…</div>';
    api("/ai/grant",{name:name, tier:"observe", pair:true, via:"oobe"}).then(function(d){
      if(d&&d.ok&&d.token){ S.ai.paired=true; S.ai.token=d.token; if(out) out.innerHTML=pairBlock(); paintIcons(); }
      else { if(out) out.innerHTML='<div class="hint" style="color:#ff8e8e">Pairing failed — you can skip and pair later.</div>'; }
    });
  }

  // ---- finale: persist everything, then go to the desktop with a flourish ----
  function runFinale(){
    // setup complete -> the welcome flourish (docs/26)
    try{ if(window.GOSESOUND)GOSESOUND.play("welcome",{force:true}); }catch(e){}
    // theme + locale to localStorage so the desktop reflects the choices immediately
    localStorage.setItem("gose-theme", S.theme);
    document.documentElement.dataset.theme = S.theme;
    var steps=["Creating your account","Applying privacy choices","Personalizing GOSE","Preparing the desktop"];
    var chk=document.getElementById("chk");
    if(chk) chk.innerHTML=steps.map(function(t,i){ return '<div class="li" data-li="'+i+'">'+ico("check")+t+'</div>'; }).join("");
    paintIcons();
    var payload={
      account:{username:(S.account.username||"owner"), display:S.account.display,
               has_password:!!S.account.password, has_pin:!!S.account.pin, accent:S.account.accent},
      privacy:S.privacy, locale:S.locale, keyboard:S.keyboard, timezone:null,
      theme:S.theme, device_name:(String(S.device_name||"").trim()||"GOSE"),
      ai: S.ai.paired?{name:S.ai.name}:{}
    };
    var done=false;
    function tick(i){ var li=document.querySelector('[data-li="'+i+'"]'); if(li) li.classList.add("on"); }
    // animate the checklist; complete on the server in parallel
    var delays = reduce()?[0,0,0,0]:[350,850,1350,1900];
    delays.forEach(function(ms,i){ setTimeout(function(){ tick(i); }, ms); });
    api("/oobe/complete", payload).then(function(d){ done=(d&&d.ok); }).catch(function(){});
    var wait = reduce()?500:2500;
    setTimeout(function(){
      var f=document.getElementById("finlbl"); if(f) f.textContent="All set — welcome to GOSE";
      var r=document.getElementById("ring"); if(r) r.style.borderTopColor="#37d39b";
      setTimeout(function(){ location.href="gose-home.html"; }, reduce()?200:900);
    }, wait);
  }

  // ---- step gating + advance with completion flash ----
  function canAdvance(){
    var s=STEPS[idx];
    if(s.id==="license" && !S.license) return "Please accept the terms to continue.";
    if(s.id==="account" && !String(S.account.username||"").trim())
      return "Enter a username — this first account is the device owner.";
    return null;
  }
  function flashDone(cb){
    if(reduce()){ cb(); return; }
    var f=document.createElement("div"); f.className="flash";
    f.innerHTML='<div class="chk">'+ico("check")+'</div><div class="lbl">'+STEPS[idx].name+' done</div>';
    card.appendChild(f); paintIcons();
    try{ if(window.GOSESOUND){ GOSESOUND.play("step-done"); } else if(GOSE&&GOSE.sound){ GOSE.sound("select"); } }catch(e){}
    setTimeout(cb, 480);
  }
  function next(){
    captureInputs();
    var block=canAdvance();
    if(block){ flashHint(block); refreshGate(); return; }
    if(idx>=STEPS.length-1) return;
    if(STEPS[idx].id==="welcome"){ idx++; render(); return; } // no flash on welcome
    // account created/confirmed -> the login chime (docs/26)
    if(STEPS[idx].id==="account"){ try{ if(window.GOSESOUND)GOSESOUND.play("login"); }catch(e){} }
    flashDone(function(){ idx++; render(); });
  }
  function skip(){ captureInputs(); if(idx<STEPS.length-1){ idx++; render(); } }
  function back(){ if(idx>0){ captureInputs(); idx--; render(); } }
  function flashHint(msg){
    var s=STEPS[idx]; // show inline hint under the card content
    var h=card.querySelector(".hint"); if(!h){ h=document.createElement("div"); h.className="hint"; card.appendChild(h); }
    h.style.color="#ffce5c"; h.textContent=msg; try{ GOSE&&GOSE.sound&&GOSE.sound("error"); }catch(e){}
  }
  function captureInputs(){
    [].slice.call(card.querySelectorAll("input[data-field]")).forEach(function(inp){
      var f=inp.dataset.field, v=inp.value;
      if(f==="username") S.account.username=v;
      else if(f==="display") S.account.display=v;
      else if(f==="password") S.account.password=v;
      else if(f==="pin") S.account.pin=v;
      else if(f==="device_name") S.device_name=v;
      else if(f==="ai_name") S.ai.name=v;
    });
  }

  // ---- activate the focused element ----
  function activate(el){
    if(!el) return;
    if(el.dataset.act){ var a=el.dataset.act;
      if(a==="continue") next(); else if(a==="back") back(); else if(a==="skip") skip();
      else if(a==="pair"){ captureInputs(); doPair(); }
      return; }
    if(el.dataset.opt){ var grp=el.dataset.opt, v=el.dataset.v;
      S[grp]=v;
      if(grp==="theme"){ document.documentElement.dataset.theme=v; }
      // update siblings' selected state without a full re-render (keeps focus stable)
      [].slice.call(document.querySelectorAll('[data-opt="'+grp+'"]')).forEach(function(o){
        var on=o.dataset.v===v; o.classList.toggle("sel",on);
        var val=o.querySelector(".val"); if(val) val.textContent=on?(grp==="theme"?"✓":"Selected ✓"):""; });
      try{ GOSE&&GOSE.sound&&GOSE.sound("select"); }catch(e){}
      return; }
    if(el.dataset.toggle){ var k=el.dataset.toggle;
      if(k==="license"){ S.license=!S.license; el.classList.toggle("on",S.license); el.classList.toggle("sel",S.license);
        var hh=card.querySelector(".hint"); if(hh) hh.textContent=""; refreshGate(); }
      else { S.privacy[k]=!S.privacy[k]; el.classList.toggle("on",S.privacy[k]); }
      try{ GOSE&&GOSE.sound&&GOSE.sound("select"); }catch(e){}
      return; }
    if(el.dataset.acc!==undefined){ S.account.accent=el.dataset.acc;
      [].slice.call(document.querySelectorAll("[data-acc]")).forEach(function(o){ o.classList.toggle("sel",o===el); });
      return; }
    if(el.dataset.pad!==undefined){
      // A on the highlighted (would-be owner) pad = confirm it and move on — same as Continue.
      if(el.dataset.admin==="1"){ next(); return; }
      var ph=document.getElementById("padhint");
      if(ph) ph.textContent="Any connected pad can drive setup. The highlighted controller becomes "+
        "the owner when you continue — change it anytime in Settings.";
      return; }
    if(el.dataset.net!==undefined){ joinNetwork(el.dataset.net); return; }
    if(el.tagName==="INPUT"){ el.focus(); /* opens the shared OSK (cursor.js) */ return; }
  }

  // ---- keyboard (the pad-nav daemon synthesizes these in the kiosk) ----
  document.addEventListener("keydown", function(e){
    if(oskVisible()) return;      // the on-screen keyboard owns input while it is open
    var k=e.key;
    if(k==="ArrowRight") move("right");
    else if(k==="ArrowLeft") move("left");
    else if(k==="ArrowDown") move("down");
    else if(k==="ArrowUp") move("up");
    else if(k==="Enter"||k===" ") activate(cur());
    else if(k==="Escape"||k==="Backspace"){ try{ GOSE&&GOSE.sound&&GOSE.sound("back"); }catch(e2){} back(); }
    // L1/R1 ([ / ]) = previous / next step. docs/27 §3.3 reserves [ ] for TAB-LIKE structures;
    // reasoned call (2026-06-07): a linear wizard IS tab-like — the steps are sibling panes in a
    // fixed sequence (the footer dots are the tab strip), so [/]=prev/next-step matches the
    // vocabulary rather than repurposing it. next() still respects required-step gating.
    else if(k==="]"||k==="PageDown"){ next(); }   // R1 = continue (accelerator from anywhere)
    else if(k==="["||k==="PageUp"){ back(); }      // L1 = back
    else return;
    e.preventDefault();
  });
  // NOTE (docs/27 §2.1): no raw gamepad-API reads or polls may exist on this page. The bridge
  // (gose-pad-nav.py) is the single input authority; this page only consumes synthesized keys.
  // (The old "browser preview only" raw poll was removed in the step-3 rebuild, 2026-06-07.)

  // deep-link to a step for screenshots:  gose-oobe.html#account
  (function initHash(){ var want=(location.hash||"").replace("#","");
    var i=STEPS.map(function(s){return s.id;}).indexOf(want); if(i>=0) idx=i; })();

  render();
})();
</script>
<script src="assets/a11y.js"></script>
