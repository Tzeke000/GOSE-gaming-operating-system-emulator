<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Boot Menu</title>
<link rel="stylesheet" href="assets/themes.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);background-attachment:fixed}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .top{display:flex;align-items:center;gap:14px;padding:24px 40px}
  .lg{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 0 8px #9a5bff55)}
  .top h1{font-size:22px;margin:0}.top .s{color:var(--muted);font-size:12px}
  .post{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--accent);border-radius:11px;padding:8px 14px;font-size:13px}
  .list{width:620px;margin:8px auto 0}
  .sec{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.6px;margin:14px 2px 8px}
  .row{display:flex;align-items:center;gap:14px;height:50px;padding:0 18px;border-radius:12px;
    background:#ffffff08;border:2px solid transparent;margin-bottom:8px;cursor:pointer}
  .row .ic{font-size:22px;color:#b8becc}.row .nm{font-weight:600}.row .sub{color:var(--muted);font-size:12px}
  .row .tag{margin-left:auto;background:var(--surface2);border:1px solid var(--line);border-radius:11px;
    padding:3px 10px;font-size:12px;font-weight:600;color:var(--accent)}
  .row.focus{border-color:var(--accent);background:#5cd0ff1c;box-shadow:var(--focusglow)}
  .row.focus .ic,.row.focus .nm{color:var(--accent)}
  .row.power .ic{color:#ff7a6e}
  .foot{width:620px;margin:10px auto 0;display:flex;align-items:center;gap:10px;color:var(--muted);
    font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 16px}
  .foot .h{margin-left:auto}
</style></head>
<body>
  <div class="top"><img class="lg" src="assets/brand/gose-core-mark.png" alt="GOSE Core">
    <div><h1>GOSE Boot Menu</h1><div class="s">Snapdragon 8 Gen 2 · abl-mod · firmware v0.1</div></div>
    <div class="post"><span class="ic" data-i="triangle-alert" style="color:var(--accent)"></span>
      <span id="post">Auto-boot ROCKNIX in <b id="cd">5</b>s — hold L1+R1 / press a key to stay</span></div>
  </div>
  <div class="list" id="list"></div>
  <div class="foot"><span class="ic" data-i="hard-drive"></span> AYN Odin 2 · 256 GB · Battery 82%
    <span class="h">D-pad move · A select · auto-boot 5s</span></div>
<script>
  document.documentElement.dataset.theme=localStorage.getItem("gose-theme")||"onyx";
  const ENTRIES=[
    ["BOOT DEVICE"],
    ["play","ROCKNIX","microSD · Linux","Default","boot"],
    ["smartphone","Android","internal storage","","boot"],
    ["TOOLS"],
    ["rotate-ccw","Recovery","system repair & factory reset","","tool"],
    ["shield","Safe Mode","software render · no overclock","","tool"],
    ["download","Fastboot / Flash","firmware bootloader over USB-C","","tool"],
    ["settings","GOSE Setup","BIOS — boot order, timeout, theme","","tool"],
    ["power","Power Off","","","power"]];
  const list=document.getElementById("list");
  ENTRIES.forEach(e=>{
    if(e.length===1){const s=document.createElement("div");s.className="sec";s.textContent=e[0];list.appendChild(s);return;}
    const[ic,nm,sub,tag,kind]=e;const r=document.createElement("div");
    r.className="row focusable"+(kind==="power"?" power":"")+(nm==="ROCKNIX"?" focus":"");r.dataset.nm=nm;r.dataset.kind=kind;
    r.innerHTML=`<span class="ic" data-i="${ic}"></span><div><div class="nm">${nm}</div>`+
      (sub?`<div class="sub">${sub}</div>`:"")+`</div>`+(tag?`<span class="tag">${tag}</span>`:"");
    list.appendChild(r);});

  let auto=true,left=5;const cd=document.getElementById("cd"),post=document.getElementById("post");
  const timer=setInterval(()=>{if(!auto)return;left--;cd.textContent=left;
    if(left<=0){clearInterval(timer);boot("ROCKNIX");}},1000);
  function stopAuto(){if(auto){auto=false;post.textContent="Use D-pad to choose · A to select";}}

  const rows=()=>[...document.querySelectorAll(".row")];
  const cur=()=>document.querySelector(".row.focus");
  function setF(el){const c=cur();if(c)c.classList.remove("focus");el.classList.add("focus");
    el.scrollIntoView({block:"nearest"});}
  function move(d){const r=rows(),i=r.indexOf(cur());setF(r[(i+d+r.length)%r.length]);}
  function boot(nm){post.textContent="Booting "+nm+"…";setTimeout(()=>location.href="boot.html",500);}
  function act(){const el=cur();if(!el)return;const nm=el.dataset.nm,k=el.dataset.kind;
    if(k==="boot")return boot(nm);
    if(k==="power"){document.body.style.transition="opacity .4s";document.body.style.opacity=.15;return;}
    post.textContent=nm+" — selected (demo)";}
  addEventListener("keydown",e=>{stopAuto();const k=e.key;
    if(k==="ArrowDown")move(1);else if(k==="ArrowUp")move(-1);else if(k==="Enter")act();else return;e.preventDefault();});
  addEventListener("click",e=>{const f=e.target.closest&&e.target.closest(".row");if(f){stopAuto();setF(f);act();}});
  let prev={};(function pad(){const gp=navigator.getGamepads&&[...navigator.getGamepads()].find(x=>x);
    if(gp){const held=i=>gp.buttons[i]&&gp.buttons[i].pressed,tap=i=>held(i)&&!prev[i];
      if(held(4)&&held(5))stopAuto();           // L1+R1 cancels auto-boot
      if(tap(13))(stopAuto(),move(1));if(tap(12))(stopAuto(),move(-1));if(tap(0))(stopAuto(),act());
      gp.buttons.forEach((b,i)=>prev[i]=b.pressed);}requestAnimationFrame(pad);})();
  document.querySelectorAll("[data-i]").forEach(e=>e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`));
</script>
</body></html>
