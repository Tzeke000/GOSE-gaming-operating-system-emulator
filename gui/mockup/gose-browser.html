<!doctype html>
<html lang="en" data-theme="onyx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOSE — Browser</title>
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/a11y.css">
<style>
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-400-normal.woff2) format('woff2');font-weight:400}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-600-normal.woff2) format('woff2');font-weight:600}
  @font-face{font-family:Inter;src:url(assets/fonts/inter-latin-700-normal.woff2) format('woff2');font-weight:700}
  *{box-sizing:border-box}
  html{background:#07070f}html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);
    display:flex;flex-direction:column;align-items:center}
  .ic{display:inline-block;width:1em;height:1em;background:currentColor;vertical-align:-.16em;
    -webkit-mask:var(--u) center/contain no-repeat;mask:var(--u) center/contain no-repeat}
  .wrap{width:860px;max-width:95vw;margin-top:6vh;display:flex;flex-direction:column;gap:0;flex:1;min-height:0}
  .head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .head img{width:30px;height:30px}
  .head h1{font-size:18px;margin:0;font-weight:700}
  .head .badge{font-size:11px;background:var(--surface2);border:1px solid var(--line);
    border-radius:8px;padding:2px 8px;color:var(--muted)}
  .head .back{margin-left:auto;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:5px}

  /* URL bar */
  .urlwrap{display:flex;gap:10px;margin-bottom:16px}
  .urlbar{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface);
    border:2px solid var(--line);border-radius:14px;padding:13px 16px;transition:border-color .15s}
  .urlbar:focus-within{border-color:var(--accent);box-shadow:var(--focusglow)}
  .urlbar .ic{color:var(--muted);font-size:18px;flex:none}
  .urlbar input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font-size:16px;
    font-family:inherit}
  .urlbar input::placeholder{color:var(--muted)}
  .go-btn{flex:none;background:var(--accent);color:#06121a;border:none;border-radius:13px;
    padding:0 22px;height:54px;font-size:15px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:opacity .15s}
  .go-btn:hover{opacity:.88}
  .go-btn.focus{box-shadow:0 0 0 3px #5cd0ff55;outline:none}
  .go-btn:disabled{opacity:.4;cursor:default}

  /* quick tiles */
  .sec{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);margin:0 0 10px 2px}
  .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
  .tile{background:var(--surface);border:2px solid transparent;border-radius:13px;
    padding:14px 10px 12px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:8px;min-height:86px}
  .tile:hover{background:var(--surface2)}
  .tile.focus{border-color:var(--accent);box-shadow:var(--focusglow);background:var(--surface2)}
  .tile .ti{width:36px;height:36px;border-radius:10px;background:var(--icon-tile);
    border:1px solid var(--icon-tile-bd);display:flex;align-items:center;justify-content:center}
  .tile .ti .ic{font-size:20px;color:#dfe5f5}
  .tile .tn{font-size:12px;font-weight:600;text-align:center;line-height:1.3;color:var(--text)}
  .tile .tu{font-size:10px;color:var(--muted);text-align:center;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis;max-width:100%}

  /* recent */
  .recent-list{flex:1;overflow:auto;min-height:0}
  .recent-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:11px;
    border:2px solid transparent;cursor:pointer}
  .recent-row:hover{background:var(--surface)}
  .recent-row.focus{background:var(--surface2);border-color:var(--accent)}
  .recent-row .ic{color:var(--muted);flex:none}
  .recent-row .ru{flex:1;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .recent-row .rdel{color:var(--muted);font-size:11px;padding:2px 7px;border-radius:7px;border:1px solid var(--line)}
  .recent-row .rdel:hover{border-color:var(--accent);color:var(--text)}
  .empty-msg{color:var(--muted);font-size:13px;padding:16px 12px}

  .foot{margin:10px 0 16px;color:var(--muted);font-size:13px;text-align:center}
  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--accent);border-radius:11px;
    padding:9px 16px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img src="assets/brand/gose-crystal.png" alt="GOSE">
    <h1>Browser</h1>
    <span class="badge" id="browser-badge">Firefox</span>
    <span class="back"><span class="ic" data-i="arrow-left"></span> Esc — Apps</span>
  </div>

  <div class="urlwrap">
    <div class="urlbar">
      <span class="ic" data-i="globe"></span>
      <input id="url" type="url" placeholder="Enter a URL or search…" autocomplete="off" spellcheck="false">
    </div>
    <button class="go-btn" id="go-btn" data-focus-id="go">
      <span class="ic" data-i="arrow-right"></span> Go
    </button>
  </div>

  <div class="sec">QUICK ACCESS</div>
  <div class="tiles" id="tiles"></div>

  <div class="sec" id="recent-sec" style="display:none">RECENT</div>
  <div class="recent-list" id="recent-list"></div>
</div>
<div class="foot"><b>↑↓←→</b> navigate · <b>Enter</b> go / open · <b>Esc</b> Apps · type URL then <b>Go</b></div>
<div class="toast" id="toast"></div>

<script src="assets/icons.js"></script>
<script src="assets/cursor.js"></script>
<script>
  document.documentElement.dataset.theme = localStorage.getItem("gose-theme") || "onyx";
  const $ = id => document.getElementById(id);

  // ---- quick-access bookmarks --------------------------------------------------
  const QUICK = [
    {nm:"YouTube",  url:"https://www.youtube.com",     ic:"play-circle"},
    {nm:"Twitch",   url:"https://www.twitch.tv",        ic:"video"},
    {nm:"Wikipedia",url:"https://www.wikipedia.org",    ic:"book-open"},
    {nm:"GitHub",   url:"https://github.com",           ic:"code-2"},
    {nm:"Reddit",   url:"https://www.reddit.com",       ic:"message-circle"},
  ];

  // ---- recent URLs (localStorage) ---------------------------------------------
  const RECENT_KEY = "gose-browser-recent";
  const MAX_RECENT  = 12;
  function loadRecent()  { try{return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]")}catch{return []} }
  function saveRecent(a) { localStorage.setItem(RECENT_KEY, JSON.stringify(a.slice(0,MAX_RECENT))) }
  function addRecent(url){ const a=loadRecent().filter(u=>u!==url); a.unshift(url); saveRecent(a); }
  function delRecent(url){ saveRecent(loadRecent().filter(u=>u!==url)); renderRecent(); }

  // ---- browser detection -------------------------------------------------------
  // Probe /browser/status to see what's installed, update badge.
  let BROWSER_CMD = "flatpak run org.mozilla.firefox";  // sensible default
  fetch("/browser/status",{cache:"no-store"}).then(r=>r.json()).then(d=>{
    if(d && d.browser){
      BROWSER_CMD = d.cmd || BROWSER_CMD;
      $("browser-badge").textContent = d.browser;
    }
  }).catch(()=>{});

  // ---- launch ------------------------------------------------------------------
  function launch(url){
    if(!url) return;
    url = normalizeUrl(url);
    $("url").value = url;
    addRecent(url);
    renderRecent();
    say("Opening " + url + "…");
    // Firefox cmd: open with URL arg. --new-window ensures a fresh window each time.
    const cmd = BROWSER_CMD + " --new-window " + JSON.stringify(url);
    fetch("/launch",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({cmd})}).then(r=>r.json()).then(d=>{
        if(!d.ok) say("Couldn't open: " + (d.error||"unknown error"));
    }).catch(()=>say("Couldn't reach the shell server."));
  }

  function normalizeUrl(raw){
    const s = raw.trim();
    if(!s) return s;
    // If it looks like a plain domain or URL, make it http(s)
    if(/^https?:\/\//i.test(s)) return s;
    if(/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(s)) return s; // other scheme
    // Looks like a domain (has a dot, no spaces)
    if(!s.includes(" ") && s.includes(".")) return "https://" + s;
    // Treat as search query
    return "https://www.google.com/search?q=" + encodeURIComponent(s);
  }

  // ---- render tiles ------------------------------------------------------------
  function renderTiles(){
    $("tiles").innerHTML = QUICK.map((q,i)=>
      `<div class="tile" data-qi="${i}" tabindex="-1">
        <div class="ti"><span class="ic" data-i="${q.ic}"></span></div>
        <div class="tn">${q.nm}</div>
        <div class="tu">${q.url.replace(/^https?:\/\//,"")}</div>
      </div>`).join("");
    [...$("tiles").children].forEach(el=>
      el.addEventListener("click",()=>launch(QUICK[+el.dataset.qi].url)));
    paint();
  }

  // ---- render recent -----------------------------------------------------------
  function renderRecent(){
    const a = loadRecent();
    $("recent-sec").style.display = a.length ? "" : "none";
    if(!a.length){ $("recent-list").innerHTML=""; return; }
    $("recent-list").innerHTML = a.map((u,i)=>
      `<div class="recent-row" data-ri="${i}" tabindex="-1">
        <span class="ic" data-i="clock"></span>
        <span class="ru">${u}</span>
        <span class="rdel" data-rd="${i}">remove</span>
      </div>`).join("");
    [...$("recent-list").querySelectorAll(".recent-row")].forEach(el=>{
      el.addEventListener("click",e=>{
        if(e.target.classList.contains("rdel")){delRecent(a[+e.target.dataset.rd]);return;}
        launch(a[+el.dataset.ri]);});});
    paint();
  }

  // ---- icon paint pass ---------------------------------------------------------
  function paint(){ if(window.GICON){GICON.paint(document);return;}
    document.querySelectorAll("[data-i]").forEach(e=>
      e.style.setProperty("--u",`url(assets/icons/${e.dataset.i}.svg)`)); }

  // ---- toast -------------------------------------------------------------------
  function say(m){ const t=$("toast"); t.textContent=m; t.classList.add("show");
    clearTimeout(say._t); say._t=setTimeout(()=>t.classList.remove("show"),2200); }

  // ---- pad / keyboard nav ------------------------------------------------------
  // Focus model:
  //   zone 0 = URL input (+ Go button)
  //   zone 1 = QUICK tiles
  //   zone 2 = recent list
  // Left stick (synthesized arrows) + Enter navigates.
  // When the URL input has DOM focus, OSK auto-shows (cursor.js handles this).
  // When Go button is focused, Enter fires it.
  // When a tile or recent row is focused, Enter opens it.

  // We track a "soft focus" for the tiles/recent grid since they use DOM focus via
  // direct element.focus(), which the OSK's focusin listener will suppress for non-
  // text elements (it only shows on INPUT/TEXTAREA/contentEditable).

  // Three regions, enumerated left-to-right then top-to-bottom:
  // region A: url input, region B: go button, region C[0..4]: tiles, region D[0..N]: recent

  let REGION = "url";  // "url" | "go" | "tile" | "recent"
  let TILE_I  = 0;
  let REC_I   = 0;

  function setRegion(r){ REGION = r; syncFocus(); }

  function syncFocus(){
    // URL input focus
    if(REGION==="url")  { $("url").focus(); markTile(-1); markRecent(-1); return; }
    $("url").blur();
    // Go button
    if(REGION==="go")   { $("go-btn").classList.add("focus"); markTile(-1); markRecent(-1); return; }
    $("go-btn").classList.remove("focus");
    // tile
    if(REGION==="tile"){
      markRecent(-1);
      markTile(TILE_I);
      const el=$("tiles").querySelector(`[data-qi="${TILE_I}"]`);
      if(el) el.focus();
      return;
    }
    markTile(-1);
    // recent
    markRecent(REC_I);
    const el=$("recent-list").querySelector(`[data-ri="${REC_I}"]`);
    if(el){ el.focus(); el.scrollIntoView({block:"nearest"}); }
  }

  function markTile(i){
    [...$("tiles").children].forEach(el=>{
      el.classList.toggle("focus", +el.dataset.qi===i);
    });
  }
  function markRecent(i){
    [...$("recent-list").querySelectorAll(".recent-row")].forEach(el=>{
      el.classList.toggle("focus", +el.dataset.ri===i);
    });
  }

  function enter(){
    if(REGION==="url")  { launch($("url").value); return; }
    if(REGION==="go")   { launch($("url").value); return; }
    if(REGION==="tile") { launch(QUICK[TILE_I].url); return; }
    if(REGION==="recent"){
      const a=loadRecent();
      if(a[REC_I]) launch(a[REC_I]);
    }
  }

  function recLen(){ return $("recent-list").querySelectorAll(".recent-row").length; }
  function tileLen(){ return QUICK.length; }

  addEventListener("keydown",e=>{
    const k = e.key;
    if(k==="Escape"){
      // If OSK is open, cursor.js handles it (capture phase, higher prio).
      // Otherwise, go to Apps.
      if(document.body.dataset.goseModal) return;
      location.href = "gose-apps.html"; return;
    }

    // When URL field has DOM focus, let normal text input happen;
    // only intercept non-typing keys.
    const inUrl = (document.activeElement === $("url"));

    if(k==="Tab"){
      // Tab cycles: url -> go -> tiles -> recent -> url
      if(REGION==="url") setRegion("go");
      else if(REGION==="go") { TILE_I=0; setRegion("tile"); }
      else if(REGION==="tile"){ if(recLen()>0){REC_I=0;setRegion("recent");}else setRegion("url"); }
      else setRegion("url");
      e.preventDefault(); return;
    }

    if(k==="Enter"){
      if(inUrl){ enter(); e.preventDefault(); return; }
      enter(); e.preventDefault(); return;
    }

    if(k==="ArrowDown"){
      if(REGION==="url"||REGION==="go"){ TILE_I=0; setRegion("tile"); e.preventDefault(); return; }
      if(REGION==="tile"){
        // Bottom row of tiles? Go to recent if any.
        if(recLen()>0 && TILE_I >= tileLen()-5){ REC_I=0; setRegion("recent"); }
        else if(TILE_I+5 < tileLen()) { TILE_I+=5; syncFocus(); }
        e.preventDefault(); return;
      }
      if(REGION==="recent"){
        if(REC_I < recLen()-1){ REC_I++; syncFocus(); }
        e.preventDefault(); return;
      }
    }

    if(k==="ArrowUp"){
      if(REGION==="tile"){
        if(TILE_I < 5){ setRegion("url"); }
        else { TILE_I = Math.max(0, TILE_I-5); syncFocus(); }
        e.preventDefault(); return;
      }
      if(REGION==="recent"){
        if(REC_I>0){ REC_I--; syncFocus(); }
        else { TILE_I=Math.max(0,tileLen()-5); setRegion("tile"); }
        e.preventDefault(); return;
      }
      if(REGION==="go"){ setRegion("url"); e.preventDefault(); return; }
    }

    if(k==="ArrowRight"){
      if(REGION==="url"){ setRegion("go"); e.preventDefault(); return; }
      if(REGION==="go"){ /* nothing to the right */ e.preventDefault(); return; }
      if(REGION==="tile"){
        if(TILE_I<tileLen()-1){ TILE_I++; syncFocus(); }
        e.preventDefault(); return;
      }
    }

    if(k==="ArrowLeft"){
      if(REGION==="go"){ setRegion("url"); e.preventDefault(); return; }
      if(REGION==="tile"){
        if(TILE_I>0){ TILE_I--; syncFocus(); }
        e.preventDefault(); return;
      }
    }

    // Any printable char while NOT in URL field -> focus URL bar and let it type
    if(!inUrl && k.length===1 && !e.ctrlKey && !e.metaKey){
      setRegion("url");
      // Don't consume — let the char land in the now-focused input.
    }
  });

  // ---- init -------------------------------------------------------------------
  renderTiles();
  renderRecent();
  // Start with URL bar focused so the user can type immediately.
  setTimeout(()=>{ setRegion("url"); $("url").focus(); }, 50);
</script>
<script src="assets/a11y.js"></script>
</body>
</html>
